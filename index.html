        SWAP_DIE:'Next turn: randomly swap 1 die with opponent',

        SELF_MULTIPLY:'End of turn: your pts ×1.2 (after other effects)',
        WEAKEN_OPPONENT:"Next turn: 2 of opponent's dice become 1",
      },
      configTitle:'Settings', configStart:'Start Game!',
      cfgTurns:'Turns', cfgAIChar:'Choose Opponent',
      cfgPDice:'Player Dice / Turn', cfgADice:'AI Dice / Turn',
      cfgCards:'Market Cards / Turn', cfgKeepLimit:'Keep Limit',
      keepLimitLabels:['3','5','8','16'],
      aiCharNames:['Elder','Stella','Shadow','Noir'],
      aiCharFaces:['(^_^)','(>_<)','(-_-)','(*_*)'],
      aiCharDescs:['Distributes evenly','All-in on best','Top-2 focus','Adapts to state'],
      aiTBD:'(Coming Soon)',
      you:'You', opp:'Opp.', turnLabel:'Turn',
      dicePerTurn:n=>`Dice ${n}/turn`,
      keepFull:n=>`Keep: ${n}`,
      incomeLabel:n=>`Income +${n}/turn`, oppIncome:n=>`Income +${n}/turn`,
      rolling:'Rolling dice...',
      instrNone:'Click or drag-select dice → click a card to assign',
      instrSel:n=>`${n} selected — click a card / blank to deselect`,
      swapSelectInstr:'Select 1 die to give — a random opponent die comes back',
      tapContinue:'Click to continue',
      confirmBtn:'Confirm Bids', nextBtn:'Next Turn', resultBtn:'View Results',
      specialLabel:'Special',
      tbTitle:name=>`"${name}" Tied — Tiebreaker!`,
      tbYouScore:n=>`You: ${n} pts`, tbOppScore:n=>`Opp: ${n} pts`,
      tbWinP:'You win! Card acquired!', tbWinA:'Opponent wins…', tbAgain:'Tied again!',
      tbContinue:'Continue', tbRetry:'Roll Again!',
      wonLabel:'Won!', oppWon:'Opp. won', tieLabel:'Tied',
      resultWin:'Victory!', resultLose:'Defeat…', resultDraw:'Draw',
      resultYou:n=>`You: ${n} pts`, resultOpp:n=>`Opp: ${n} pts`,
      resultDiff:(n,w)=>w==='p'?`Won by ${n} pts`:w==='a'?`Lost by ${n} pts`:`Even score`,
      resultInc:(pp,a)=>`Income: You +${pp}/turn  Opp +${a}/turn`,
      retryBtn:'Play Again',
      cardEffect:{income:v=>`+${v} pts/turn`,invest:()=>'+1 Die/turn',instant:v=>`+${v} pts now`},
      cardNames:{'農場':'Farm','市場':'Market','鉱山':'Mine','港湾':'Port','神殿':'Temple','農地':'Field','傭兵団':'Mercenary','鍛冶屋':'Forge','工房':'Workshop','宝箱':'Treasure','略奪':'Raid','祭典':'Festival','遺跡':'Ruins','交易所':'Exchange'},
      eggPull:'Pull it back and release!',
    }
  };
  let lang='ja', L=LANG.ja;
  function setLang(l){lang=l;L=LANG[l];EGG.reset();}

  // ══════════════════════════════════════════
  // CARD POOLS & AI CHARACTERS
  // ══════════════════════════════════════════
  const CARD_POOL=[
    {key:'農場',type:'income',val:2},{key:'市場',type:'income',val:3},{key:'鉱山',type:'income',val:4},
    {key:'港湾',type:'income',val:3},{key:'神殿',type:'income',val:5},{key:'農地',type:'income',val:2},
    {key:'傭兵団',type:'invest',val:1},{key:'鍛冶屋',type:'invest',val:1},{key:'工房',type:'invest',val:1},
    {key:'宝箱',type:'instant',val:6},{key:'略奪',type:'instant',val:8},{key:'祭典',type:'instant',val:5},
    {key:'遺跡',type:'instant',val:10},{key:'交易所',type:'instant',val:4},
  ];
  const SPECIAL_TYPES=['SWAP_DIE','BOOST_DICE','OPPONENT_MINUS','SELF_MULTIPLY','WEAKEN_OPPONENT'];
  const AI_CHARS=[
    {style:'balanced',keepProb:0.28,neutralFace:'(^_^)'},
    {style:'allin',   keepProb:0.12,neutralFace:'(>_<)'},
    {style:'twofocus',keepProb:0.38,neutralFace:'(-_-)'},
    {style:'adaptive',keepProb:0.44,neutralFace:'(*_*)'},
  ];
  let CFG={turns:10,pDice:3,aDice:3,aiChar:0,marketCards:3,keepLimit:1};
  const KEEP_LIMIT_VALS=[3,5,8,16];
  const TURN_OPTIONS=[5,8,10,15,20];
  const CARD_OPTIONS=[2,3,4,5,6];

  // ══════════════════════════════════════════
  // HELPERS
  // ══════════════════════════════════════════
  const rng=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const sum=arr=>arr.reduce((s,v)=>s+v,0);
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
  function hov(x,y,w,h){return p.mouseX>x&&p.mouseX<x+w&&p.mouseY>y&&p.mouseY<y+h;}

  // ══════════════════════════════════════════
  // EASTER EGG
  // ══════════════════════════════════════════
  const EGG={
    words:[],dice:[],heldIdx:-1,
    SPAWN:[{x:160,y:575},{x:1120,y:575}],
    glow:0,thankYou:false,tyAlpha:0,tyScale:0,particles:[],titleHitW:700,
    reset(){this.words=[];this.dice=[];this.heldIdx=-1;this.thankYou=false;this.tyAlpha=0;this.tyScale=0;this.particles=[];this.glow=0;},
    _mw(txt,sz,font){p.push();p.textFont(font==='mochiy'?'Mochiy Pop One, sans-serif':'sans-serif');p.textSize(sz);const tw=p.textWidth(txt);p.pop();return tw;},
    buildWords(){
      this.words=[];
      const addW=(txt,ax,ay,ha,va,sz,col,font,bold)=>{
        const tw=this._mw(txt,sz,font);let cx=ax,cy=ay;
        if(ha==='left')cx=ax+tw/2;else if(ha==='right')cx=ax-tw/2;
        if(va==='top')cy=ay+sz/2;else if(va==='bottom')cy=ay-sz/2;
        this.words.push({txt,ax,ay,cx,cy,x:cx,y:cy,ha,va,sz,col,font:font||'sans',bold:!!bold,hitR:Math.max(28,tw/2+4),vx:0,vy:0,va2:0,angle:0,alive:true});
      };
      addW('日本語',18,22,'left','center',14,lang==='ja'?[215,178,48]:[88,96,128],'mochiy');
      addW('English',18,50,'left','center',14,lang==='en'?[215,178,48]:[88,96,128],'mochiy');
      const tw=this._mw(L.gameTitle,64,'mochiy');this.titleHitW=Math.max(tw+60,400);
      addW(L.gameTitle,CW/2,160,'center','center',64,[52,192,108],'mochiy');
      L.titleSummary.forEach((line,i)=>addW(line,CW/2,250+i*32,'center','center',17,[165,175,210],'sans'));
      addW(L.startBtn,CW/2,380,'center','center',22,[205,248,218],'mochiy');
      addW(L.version,CW-12,CH-8,'right','bottom',11,[58,72,105],'sans');
      addW(L.eggPull,CW/2,CH-18,'center','center',14,[165,130,50],'sans');
    },
    isOnTitle(mx,my){const hw=this.titleHitW/2;return mx>CW/2-hw&&mx<CW/2+hw&&my>120&&my<200;},
    spawnDieAt(idx){const pos=this.SPAWN[idx];this.dice[idx]={x:pos.x,y:pos.y,vx:0,vy:0,val:rng(1,6),angle:0,angVel:0,state:'waiting',respawnTimer:0,anchor:{x:pos.x,y:pos.y},idx};},
    activate(){this.buildWords();this.dice=[null,null];this.spawnDieAt(0);this.spawnDieAt(1);},
    spawnParts(x,y,col){for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,spd=2+Math.random()*5;this.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,life:1,col});}},
    update(){
      this.glow=(this.glow+0.06)%(Math.PI*2);
      this.dice.forEach((die,idx)=>{
        if(!die)return;
        if(die.state==='respawning'){die.respawnTimer--;if(die.respawnTimer<=0)this.spawnDieAt(idx);return;}
        if(die.state==='held'){die.x=p.mouseX;die.y=p.mouseY;die.angle=Math.atan2(die.y-die.anchor.y,die.x-die.anchor.x)*0.3;return;}
        if(die.state==='flying'){
          die.vy+=0.04;die.x+=die.vx;die.y+=die.vy;die.angle+=die.angVel;die.angVel*=0.98;
          const R=27;
          if(die.x<R){die.x=R;die.vx=Math.abs(die.vx)*0.80;this.spawnParts(die.x,die.y,[220,180,60]);}
          if(die.x>CW-R){die.x=CW-R;die.vx=-Math.abs(die.vx)*0.80;this.spawnParts(die.x,die.y,[220,180,60]);}
          if(die.y<R){die.y=R;die.vy=Math.abs(die.vy)*0.80;}
          if(die.y>CH+80){die.state='respawning';die.respawnTimer=20;return;}
          const spd=Math.sqrt(die.vx**2+die.vy**2);
          if(spd>0.5){
            this.words.forEach(w=>{
              if(!w.alive)return;const dx=die.x-w.cx,dy=die.y-w.cy,dist=Math.sqrt(dx*dx+dy*dy);
              if(dist<w.hitR+R){
                const nx=dx/dist,ny=dy/dist;
                w.vx=nx*spd*0.9+die.vx*0.35+(Math.random()-0.5)*2;
                w.vy=ny*spd*0.9+die.vy*0.35-1.5;w.va2=(Math.random()-0.5)*0.22;w.alive=false;
                this.spawnParts(w.cx,w.cy,w.col);die.vx-=nx*spd*0.2;die.vy-=ny*spd*0.2;die.angVel+=(Math.random()-0.5)*0.6;
              }
            });
          }
          if(this.words.length>0&&this.words.every(w=>!w.alive))this.thankYou=true;
        }
      });
      this.words.filter(w=>!w.alive).forEach(w=>{w.vy+=0.15;w.vx*=0.99;w.x+=w.vx;w.y+=w.vy;w.angle+=w.va2;});
      this.particles=this.particles.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.07;pt.life-=0.033;return pt.life>0;});
      if(this.thankYou){this.tyAlpha=Math.min(255,this.tyAlpha+3.5);this.tyScale=Math.min(1,this.tyScale+0.035);}
    },
    drawWords(){
      this.words.forEach(w=>{
        p.push();p.noStroke();
        if(w.alive){
          p.fill(w.col[0],w.col[1],w.col[2]);
          p.textAlign(w.ha==='left'?p.LEFT:w.ha==='right'?p.RIGHT:p.CENTER,w.va==='top'?p.TOP:w.va==='bottom'?p.BOTTOM:p.CENTER);
          p.textSize(w.sz);p.textFont(w.font==='mochiy'?'Mochiy Pop One, sans-serif':'sans-serif');
          if(w.bold)p.textStyle(p.BOLD);p.text(w.txt,w.ax,w.ay);p.textStyle(p.NORMAL);p.textFont('sans-serif');
        }else{
          p.translate(w.x,w.y);p.rotate(w.angle);p.fill(w.col[0],w.col[1],w.col[2],100);
          p.textAlign(p.CENTER,p.CENTER);p.textSize(w.sz);p.textFont(w.font==='mochiy'?'Mochiy Pop One, sans-serif':'sans-serif');
          if(w.bold)p.textStyle(p.BOLD);p.text(w.txt,0,0);p.textStyle(p.NORMAL);p.textFont('sans-serif');
        }
        p.pop();
      });
    },
    drawDice(){
      const PIPSD={1:[[0,0]],2:[[-9,-9],[9,9]],3:[[-9,-9],[0,0],[9,9]],4:[[-9,-9],[9,-9],[-9,9],[9,9]],5:[[-9,-9],[9,-9],[0,0],[-9,9],[9,9]],6:[[-9,-8],[9,-8],[-9,0],[9,0],[-9,8],[9,8]]};
      this.dice.forEach(die=>{
        if(!die||die.state==='respawning')return;
        const isW=die.state==='waiting',isH=die.state==='held';
        if(isH){
          const ax=die.anchor.x,ay=die.anchor.y,tension=Math.min(Math.sqrt((die.x-ax)**2+(die.y-ay)**2)/160,1);
          const r=Math.round(180+75*tension),g2=Math.round(120-80*tension);
          const ang=Math.atan2(die.y-ay,die.x-ax),fw=11;
          p.stroke(r,g2,40,200);p.strokeWeight(2.5);
          p.line(ax+Math.cos(ang+Math.PI/2)*fw,ay+Math.sin(ang+Math.PI/2)*fw,die.x,die.y);
          p.line(ax+Math.cos(ang-Math.PI/2)*fw,ay+Math.sin(ang-Math.PI/2)*fw,die.x,die.y);
          p.noStroke();p.fill(r,g2,40,180);p.ellipse(ax,ay,12,12);
        }
        p.push();p.translate(die.x,die.y);p.rotate(die.angle);
        if(isW){const pulse=Math.sin(this.glow*2)*0.5+0.5;p.noStroke();p.fill(215,178,50,pulse*80);p.ellipse(0,0,72+pulse*16,72+pulse*16);}
        p.noStroke();p.fill(0,0,0,60);p.rect(3,3,54,54,9);
        p.stroke(isW?[255,215,80]:isH?[255,80,80]:[195,55,55]);p.strokeWeight(2.5);
        p.fill(isW?[212,165,45]:isH?[185,55,55]:[195,55,55]);p.rect(-27,-27,54,54,9);
        p.noStroke();p.fill(255,240,240);(PIPSD[die.val]||[]).forEach(([px,py])=>p.ellipse(px,py,8,8));
        p.pop();
      });
      this.dice.forEach(die=>{
        if(!die||die.state!=='respawning')return;
        const prog=die.respawnTimer/20,pos=this.SPAWN[die.idx];
        p.noStroke();p.fill(215,178,50,120*prog);p.ellipse(pos.x,pos.y,22*prog,22*prog);
      });
    },
    drawParticles(){this.particles.forEach(pt=>{p.noStroke();p.fill(pt.col[0],pt.col[1],pt.col[2],pt.life*200);p.ellipse(pt.x,pt.y,7*pt.life,7*pt.life);});},
    drawThankYou(){
      if(!this.thankYou)return;
      p.push();p.translate(CW/2,CH/2);p.scale(this.tyScale);p.noStroke();
      for(let r=5;r>0;r--)p.fill(215,178,50,this.tyAlpha*(r/5)*0.18),p.ellipse(0,0,r*180,r*80);
      p.textFont('Mochiy Pop One, sans-serif');p.fill(215,178,50,this.tyAlpha);p.textAlign(p.CENTER,p.CENTER);p.textSize(56);p.text('Thank you for playing!',0,0);p.textFont('sans-serif');p.pop();
    },
    onPress(mx,my){
      if(this.thankYou)return false;
      if(!this.words.length){if(this.isOnTitle(mx,my)){this.activate();return true;}return false;}
      if(this.heldIdx<0){
        let bestDist=9999,bestIdx=-1;
        this.dice.forEach((die,idx)=>{if(!die||die.state!=='waiting')return;const dx=mx-die.x,dy=my-die.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<40&&dist<bestDist){bestDist=dist;bestIdx=idx;}});
        if(bestIdx>=0){this.dice[bestIdx].state='held';this.heldIdx=bestIdx;return true;}
      }
      return false;
    },
    onRelease(mx,my){
      if(this.heldIdx<0)return false;
      const die=this.dice[this.heldIdx];
      if(!die){this.heldIdx=-1;return false;}
      const ax=die.anchor.x,ay=die.anchor.y,dx=ax-mx,dy=ay-my,dist=Math.sqrt(dx*dx+dy*dy);
      const speed=clamp(dist*0.18,7,50);
      if(dist>2){die.vx=(dx/dist)*speed;die.vy=(dy/dist)*speed;}
      else{die.vx=(Math.random()-0.5)*7;die.vy=-7;}
      die.angVel=die.vx*0.06;die.val=rng(1,6);die.state='flying';this.heldIdx=-1;return true;
    }
  };

  // ══════════════════════════════════════════
  // GAME STATE
  // ══════════════════════════════════════════
  let scene='TITLE', G={};
  let dragS=null,dragE=null,isDragging=false;
  let helpOpen=false,helpTab=0;

  function initGame(){
    // Reset drag state to avoid yellow border bug on first frame
    dragS=null;dragE=null;isDragging=false;
    G={turn:1,totalTurns:CFG.turns,
      phase:'ROLLING',
      pDice:[],pPerTurn:CFG.pDice,pKeepNext:[],pScore:0,pIncome:[],
      aPerTurn:CFG.aDice,aKeepNext:[],aKeepVis:0,aPool:[],aScore:0,aIncome:[],
      market:[],specialCard:null,
      selSet:new Set(),revStep:-1,revTimer:0,tb:null,_rollTotal:0,
      pendingEffects:[],
      effectAnimTimer:0,effectAnimMsgs:[],effectHighlights:[],
      pendingSwapForPlayer:false,
      swapAnim:{active:false,dieIdx:-1,timer:0,newVal:0},
      floatingTexts:[],
      aiEmotion:'(^_^)',
    };
    beginTurn();
  }

  function addFloating(txt,x,y,col,size){
    G.floatingTexts.push({txt,x,y,vy:-2.2,alpha:255,col:col||[215,178,50],size:size||38});
  }

  function beginTurn(){
    const pKept=G.pKeepNext.map(d=>({...d}));G.pKeepNext=[];
    const pFresh=[];
    for(let i=0;i<G.pPerTurn;i++) pFresh.push({val:rng(1,6),fresh:true,card:null,rollF:20+i*10,bounceF:0});
    G.pDice=[...pKept.map(d=>({val:d.val,fresh:false,card:null,rollF:0,bounceF:0})),...pFresh];
    const aKept=G.aKeepNext.map(d=>({...d}));G.aKeepNext=[];
    const aFresh=[];for(let i=0;i<G.aPerTurn;i++) aFresh.push({val:rng(1,6),fresh:true});
    G.aPool=[...aKept.map(d=>({val:d.val,fresh:false})),...aFresh];
    G.aKeepVis=aKept.length;
    const nc=Math.min(CFG.marketCards,CARD_POOL.length);
    G.market=shuffle(CARD_POOL).slice(0,nc).map(c=>({...c,pBid:0,aBid:0,winner:null}));
    const spType=SPECIAL_TYPES[Math.floor(Math.random()*SPECIAL_TYPES.length)];
    G.specialCard={effectType:spType,pBid:0,aBid:0,winner:null};
    G.selSet=new Set();G.revStep=-1;
    G.phase='ROLLING';G._rollTotal=20+G.pPerTurn*10+14;
    G.effectAnimTimer=0;G.effectAnimMsgs=[];G.effectHighlights=[];
    G.pendingSwapForPlayer=false;
    G.swapAnim={active:false,dieIdx:-1,timer:0,newVal:0};
  }

  function processEffectsAfterRoll(){
    const effects=G.pendingEffects.slice();G.pendingEffects=[];
    const msgs=[];const highlights=[];let swapForPlayer=false;
    effects.forEach(eff=>{
      switch(eff.type){
        case 'BOOST_DICE':
          if(eff.owner==='p'){
            let n=0;G.pDice.forEach((d,i)=>{if(d.fresh&&n<2){d.val=6;highlights.push(i);n++;}});
            msgs.push(lang==='ja'?'幸運の目発動！ダイス2個が6になった！':'Lucky Dice! 2 dice became 6!');
          }else{let n=0;G.aPool.forEach(d=>{if(d.fresh&&n<2){d.val=6;n++;}});}
          break;
        case 'WEAKEN_OPPONENT':
          if(eff.owner==='p'){let n=0;G.aPool.forEach(d=>{if(n<2){d.val=1;n++;}});msgs.push(lang==='ja'?'封印発動！相手のダイス2個が1に！':'Seal! Opponent\'s 2 dice set to 1!');}
          else{let n=0;G.pDice.forEach((d,i)=>{if(d.fresh&&n<2){d.val=1;highlights.push(i);n++;}});msgs.push(lang==='ja'?'封印！あなたのダイス2個が1にされた！':'Sealed! 2 of your dice set to 1!');}
          break;
        case 'SWAP_DIE':
          if(eff.owner==='p')swapForPlayer=true;
          else{
            if(G.pDice.length>0&&G.aPool.length>0){
              const aiLowest=G.aPool.reduce((m,d)=>d.val<m.val?d:m,G.aPool[0]);
              const pIdx=Math.floor(Math.random()*G.pDice.length);
              const tmp=G.pDice[pIdx].val;G.pDice[pIdx].val=aiLowest.val;aiLowest.val=tmp;
              highlights.push(pIdx);
              msgs.push(lang==='ja'?'交換協定！ダイスが入れ替わった！':'Exchange! A die was swapped!');
            }
          }
          break;
      }
    });
    G.effectHighlights=highlights;
    if(msgs.length>0||swapForPlayer){
      G.effectAnimMsgs=msgs;
      G.effectAnimTimer=swapForPlayer&&msgs.length===0?0:90;
      G.pendingSwapForPlayer=swapForPlayer;
      G.phase=msgs.length>0?'EFFECT_ANIM':swapForPlayer?'SWAP_SELECT':'ASSIGN';
    }else{
      G.phase='ASSIGN';
    }
  }

  function executePlayerSwap(dieIdx,diePosX,diePosY){
    if(G.aPool.length>0){
      const aiDie=G.aPool[Math.floor(Math.random()*G.aPool.length)];
      const incoming=aiDie.val;
      const outgoing=G.pDice[dieIdx].val;
      G.pDice[dieIdx].val=incoming;
      aiDie.val=outgoing;
      G.swapAnim={active:true,dieIdx,timer:70,newVal:incoming};
      G.effectHighlights=[dieIdx];
      addFloating('⇄ '+incoming,diePosX,diePosY-20,[208,168,50],36);
    }
    G.pendingSwapForPlayer=false;
    G.phase='ASSIGN';
  }

  function pBidFor(ci){return sum(G.pDice.filter(d=>d.card===ci).map(d=>d.val));}
  function pSpBid(){return sum(G.pDice.filter(d=>d.card===G.market.length).map(d=>d.val));}

  function evalCard(c){
    if(c.type==='income')return c.val*(G.totalTurns-G.turn+1);
    if(c.type==='invest')return 5+(G.totalTurns-G.turn)*1.5;
    return c.val;
  }
  function evalSpecial(s){
    if(!s)return 4;
    const rem=G.totalTurns-G.turn;
    switch(s.effectType){
      case 'SWAP_DIE':return 3+rem*0.5;
      case 'BOOST_DICE':return 10+rem*0.8;
      case 'OPPONENT_MINUS':return 10;
      case 'SELF_MULTIPLY':return Math.max(5,G.aScore*0.2);
      case 'WEAKEN_OPPONENT':return 6+rem*0.6;
    }return 4;
  }

  // FIX①: specialCard の有無に依存しない構造へ変更
  // specialCard が null でも市場カードへの入札は正常に行われる（将来の「特殊カードなし」モード対応）
  function aiDecide(){
    const char=AI_CHARS[CFG.aiChar];
    const nCards=G.market.length;
    const hasSpecial=!!G.specialCard;
    const nSlots=nCards+(hasSpecial?1:0);
    if(nSlots===0)return;
    const cardEvals=[
      ...G.market.map(evalCard),
      ...(hasSpecial?[evalSpecial(G.specialCard)]:[]),
    ];
    const pool=shuffle([...G.aPool]);
    const bids=Array.from({length:nSlots},()=>[]);
    let rem=[...pool];
    const order=[...Array(nSlots).keys()].sort((a,b)=>cardEvals[b]-cardEvals[a]);
    const et=sum(cardEvals)||1;
    switch(char.style){
      case 'balanced':{
        for(let i=0;i<nSlots;i++){const ci=order[i];let cnt=Math.round((cardEvals[ci]/et)*pool.length+(Math.random()-0.5)*1.8);cnt=clamp(cnt,0,rem.length-(nSlots-1-i));if(i===nSlots-1)cnt=rem.length;bids[ci]=rem.splice(0,cnt);}
        break;
      }
      case 'allin':{
        const best=order[0];const mainCnt=Math.floor(pool.length*(0.72+Math.random()*0.18));
        bids[best]=rem.splice(0,Math.min(mainCnt,rem.length));
        order.slice(1).forEach((ci,i)=>{const cnt=i===order.length-2?rem.length:Math.floor(rem.length*(Math.random()*0.4));bids[ci]=rem.splice(0,Math.min(cnt,rem.length));});
        break;
      }
      case 'twofocus':{
        const top2=order.slice(0,2),rest=order.slice(2);
        rest.forEach(ci=>{const cnt=rem.length>0&&Math.random()<0.35?1:0;bids[ci]=rem.splice(0,Math.min(cnt,rem.length));});
        const e0=cardEvals[top2[0]],e1=cardEvals[top2[1]],et2=Math.max(e0+e1,0.01);
        const cnt0=Math.round(rem.length*(e0/et2)+(Math.random()-0.5)*1.5);
        bids[top2[0]]=rem.splice(0,clamp(cnt0,0,rem.length));
        bids[top2[1]]=rem.splice(0,rem.length);
        break;
      }
      case 'adaptive':{
        const turnsLeft=G.totalTurns-G.turn,scoreDiff=G.aScore-G.pScore;
        let adjEvals=[...cardEvals],noise=1.8;
        if(turnsLeft<=2&&scoreDiff<-10){const best=order[0];bids[best]=rem.splice(0,rem.length);order.slice(1).forEach(ci=>bids[ci]=[]);break;}
        if(scoreDiff>20&&turnsLeft>3){adjEvals=adjEvals.map((v,i)=>i<nCards&&G.market[i]&&G.market[i].type==='income'?v*1.5:v);noise=0.8;}
        if(scoreDiff<-10){adjEvals=adjEvals.map((v,i)=>i<nCards&&G.market[i]&&G.market[i].type==='instant'?v*1.4:v);}
        const adjOrder=[...Array(nSlots).keys()].sort((a,b)=>adjEvals[b]-adjEvals[a]);
        const aet=sum(adjEvals)||1;
        for(let i=0;i<nSlots;i++){const ci=adjOrder[i];let cnt=Math.round((adjEvals[ci]/aet)*pool.length+(Math.random()-0.5)*noise);cnt=clamp(cnt,0,rem.length-(nSlots-1-i));if(i===nSlots-1)cnt=rem.length;bids[ci]=rem.splice(0,cnt);}
        break;
      }
    }
    G.aKeepNext=[];const maxKeep=KEEP_LIMIT_VALS[CFG.keepLimit];
    if(G.turn<G.totalTurns-1&&Math.random()<char.keepProb&&maxKeep>0){
      const lowestPri=order[nSlots-1];
      if(bids[lowestPri].length>0)G.aKeepNext.push({val:bids[lowestPri].pop().val});
    }
    G.aKeepVis=G.aKeepNext.length;
    G.market.forEach((c,i)=>{c.aBid=sum(bids[i].map(d=>d.val));});
    if(hasSpecial)G.specialCard.aBid=sum(bids[nCards].map(d=>d.val));
    updateAIEmotion();
  }

  function resolveAll(){
    G.market.forEach((c,i)=>{c.pBid=pBidFor(i);});
    if(G.specialCard)G.specialCard.pBid=pSpBid();
    aiDecide();
    G.market.forEach(c=>{c.winner=c.pBid>c.aBid?'p':c.aBid>c.pBid?'a':'tie';});
    if(G.specialCard){const sc=G.specialCard;sc.winner=sc.pBid>sc.aBid?'p':sc.aBid>sc.pBid?'a':'tie';}
  }

  function applyWin(card,who){
    if(card.type==='income'){if(who==='p')G.pIncome.push(card.val);else G.aIncome.push(card.val);}
    else if(card.type==='invest'){if(who==='p')G.pPerTurn++;else G.aPerTurn++;}
    else{if(who==='p')G.pScore+=card.val;else G.aScore+=card.val;}
  }

  function finishTurn(){
    let selfMultOwner=null;
    G.market.forEach(c=>{if(c.winner==='p')applyWin(c,'p');else if(c.winner==='a')applyWin(c,'a');});
    if(G.specialCard){
      const sc=G.specialCard,w=sc.winner;
      if(w&&w!=='tie'){
        const eff=sc.effectType;
        if(eff==='OPPONENT_MINUS'){
          // FIX④: FT_POS 定数で座標を一元管理
          if(w==='p'){const was=G.aScore;G.aScore=Math.max(0,G.aScore-10);addFloating(`-${was-G.aScore}pt`,FT_POS.AI_X,FT_POS.AI_Y,[215,70,70],44);}
          else{const was=G.pScore;G.pScore=Math.max(0,G.pScore-10);addFloating(`-${was-G.pScore}pt`,FT_POS.P_X,FT_POS.P_Y,[215,70,70],44);}
        }else if(eff==='SELF_MULTIPLY'){selfMultOwner=w;}
        else G.pendingEffects.push({type:eff,owner:w});
      }
    }
    G.pScore+=sum(G.pIncome);G.aScore+=sum(G.aIncome);
    if(selfMultOwner==='p'){
      const before=G.pScore;G.pScore=Math.floor(G.pScore*1.2);
      const gain=G.pScore-before;if(gain>0)addFloating(`+${gain}pt`,FT_POS.P_X,FT_POS.P_Y,[68,215,128],44);
    }else if(selfMultOwner==='a'){
      const before=G.aScore;G.aScore=Math.floor(G.aScore*1.2);
      const gain=G.aScore-before;if(gain>0)addFloating(`+${gain}pt`,FT_POS.AI_X,FT_POS.AI_Y,[215,178,50],40);
    }
    updateAIEmotion();G.phase='TURN_END';
  }

  function updateAIEmotion(){
    const diff=G.aScore-G.pScore,turnsLeft=G.totalTurns-G.turn;
    const neutral=AI_CHARS[CFG.aiChar].neutralFace;
    if(diff>20)G.aiEmotion='(≧▽≦)';
    else if(diff>8)G.aiEmotion='(^_^)';
    else if(Math.abs(diff)<=8&&turnsLeft<=2)G.aiEmotion='(;∀;)';
    else if(Math.abs(diff)<=8)G.aiEmotion=neutral;
    else if(diff<-20&&turnsLeft<=1)G.aiEmotion='orz';
    else if(diff<-10)G.aiEmotion='(；_;)';
    else if(diff<-3)G.aiEmotion='( ;∀;)';
    else G.aiEmotion='(-_-)';
  }

  function findNextTie(){
    const mi=G.market.findIndex(c=>c.winner==='tie');
    if(mi>=0)return{slotType:'market',ci:mi};
    if(G.specialCard&&G.specialCard.winner==='tie')return{slotType:'special'};
    return null;
  }
  function startTiebreak(slot){
    const pD=[rng(1,6),rng(1,6),rng(1,6)],aD=[rng(1,6),rng(1,6),rng(1,6)];
    const pt=sum(pD),at=sum(aD);
    const nameKey=slot.slotType==='market'?G.market[slot.ci].key:(G.specialCard?G.specialCard.effectType:'');
    const displayName=slot.slotType==='market'?(L.cardNames[nameKey]||nameKey):(L.specialNames[nameKey]||nameKey);
    G.tb={slot,displayName,pD,aD,pt,at,res:pt>at?'p':at>pt?'a':'again',rollF:72,revF:0,showResult:false,showBtn:false};
    G.phase='TIEBREAK';
  }
  function onTbDone(w){
    if(G.tb.slot.slotType==='market')G.market[G.tb.slot.ci].winner=w;
    else if(G.specialCard)G.specialCard.winner=w;
    const next=findNextTie();if(next)startTiebreak(next);else finishTurn();
  }

  const TB_H=56,AZ={y:56,h:88},PZ={y:430,h:252};
  const CARD_H=276,CARD_Y=148,DS=50,DSS=33,D_GAP=7,D_MAXCOLS=16;

  // FIX④: フローティングテキスト表示座標を定数として一元管理

  function getCardLayout(){
    const n=G.market?G.market.length:CFG.marketCards;
    const availW=SC.x-20,cw=Math.min(250,Math.floor((availW-40)/n)-12);
    const totalUsed=n*cw+(n-1)*12,startX=(availW-totalUsed)/2+10;
    return{cw,ch:CARD_H,centers:Array.from({length:n},(_,i)=>startX+i*(cw+12)+cw/2)};
  }
  function cRect(i){const cl=getCardLayout();return{x:cl.centers[i]-cl.cw/2,y:CARD_Y,w:cl.cw,h:cl.ch};}
  function pDiceLayout(freshList,keptList){
    const all=[...keptList,...freshList],fC=freshList.length,kC=keptList.length;
    const total=Math.min(all.length,D_MAXCOLS*2),positions=[];
    for(let i=0;i<total;i++){const row=Math.floor(i/D_MAXCOLS),col=i%D_MAXCOLS;const rowLen=Math.min(D_MAXCOLS,total-row*D_MAXCOLS);const rowW=rowLen*DS+(rowLen-1)*D_GAP;const startX=CW/2-rowW/2;positions.push({x:startX+col*(DS+D_GAP),y:PZ.y+72+row*(DS+D_GAP+4),isKept:i<kC});}
    const keptBoxes=[];
    for(let row=0;row<2;row++){const rp=positions.filter((_,i)=>Math.floor(i/D_MAXCOLS)===row&&i<kC);if(rp.length>0){const xs=rp.map(pos=>pos.x);keptBoxes.push({x:Math.min(...xs)-6,y:rp[0].y-20,w:Math.max(...xs)+DS-Math.min(...xs)+12,h:DS+24});}}
    return{positions,fC,kC,keptBoxes,overflow:all.length>total};
  }
  function aDiceLayout(poolLen,keptVis){
    const freshC=Math.max(0,poolLen-keptVis),SEP=(freshC>0&&keptVis>0)?22:0;
    const freshW=freshC>0?freshC*DSS+(freshC-1)*6:0,keptW=keptVis>0?keptVis*DSS+(keptVis-1)*6:0;
    const totalW=freshW+SEP+keptW,startX=CW/2-totalW/2;
    const positions=[];let x=startX;
    for(let i=0;i<freshC;i++){positions.push({x,held:false});x+=DSS+6;}
    if(SEP>0)x=startX+freshW+SEP;
    const keptStartX=x;for(let i=0;i<keptVis;i++){positions.push({x,held:true});x+=DSS+6;}
    return{positions,keptStartX,keptW};
  }
  function cSlot(ci,di){const r=cRect(ci);return{x:r.x+6+di*(DSS+4),y:r.y+CARD_H-DSS-8};}
  function scSlot(di){return{x:SC.x+6+di*(DSS+4),y:SC.y+SC.h-DSS-8};}

  const PIPS={1:[[.5,.5]],2:[[.26,.26],[.74,.74]],3:[[.26,.26],[.5,.5],[.74,.74]],4:[[.26,.26],[.74,.26],[.26,.74],[.74,.74]],5:[[.26,.26],[.74,.26],[.5,.5],[.26,.74],[.74,.74]],6:[[.26,.18],[.74,.18],[.26,.5],[.74,.5],[.26,.82],[.74,.82]]};

  function drawDie(x,y,val,size,col,sel,faceDown,scale,glowCol){
    const sc=scale||1,s=size*sc,ox=(size-s)/2,oy=(size-s)/2,r=Math.max(4,Math.round(7*s/50));
    p.push();p.noStroke();p.fill(0,0,0,55);p.rect(x+ox+3,y+oy+3,s,s,r);
    if(glowCol){p.noStroke();p.fill(glowCol[0],glowCol[1],glowCol[2],90);p.rect(x+ox-5,y+oy-5,s+10,s+10,r+4);}
    if(sel){p.stroke(255,202,38);p.strokeWeight(3.5);}else p.noStroke();
    p.fill(col[0],col[1],col[2]);p.rect(x+ox,y+oy,s,s,r);p.noStroke();
    if(!faceDown){p.fill(10,14,24);const d=s*0.1;(PIPS[val]||[]).forEach(([px,py])=>p.ellipse(x+ox+px*s,y+oy+py*s,d*2,d*2));}
    else{p.fill(255,255,255,32);p.textAlign(p.CENTER,p.CENTER);p.textSize(s*.52);p.text('?',x+ox+s/2,y+oy+s/2);}
    p.pop();

  function drawIcon(cx,cy,type,sz){
    p.push();p.translate(cx,cy);p.noStroke();

  // ══════════════════════════════════════════
  // SCENE: GAME — UPDATE (③ システムロジック分離)
  // p.draw() から drawGame() より先に呼ばれ、状態変化のみを担う。描画は一切行わない。
  // ══════════════════════════════════════════
  function updateGame(){
    // ── ロールアニメーション & ロール完了処理
    // 完了判定: 全freshダイスのrollF/bounceF が 0 になったとき（アニメ完了）
    // _rollTotal はタイムアウト保険として残す（何らかの異常でアニメが終わらない場合のフォールバック）
    if(G.phase==='ROLLING'){
      G._rollTotal--;
      G.pDice.forEach(d=>{if(d.rollF>0){d.rollF--;if(d.rollF===0)d.bounceF=12;}else if(d.bounceF>0)d.bounceF--;});
      const freshDice=G.pDice.filter(d=>d.fresh);
      const animDone=freshDice.length===0||freshDice.every(d=>d.rollF===0&&d.bounceF===0);
      if(animDone||G._rollTotal<=0)processEffectsAfterRoll();
    }
    // ── エフェクト演出タイマー
    if(G.phase==='EFFECT_ANIM'){
      G.effectAnimTimer--;if(G.effectAnimTimer<=0){G.phase=G.pendingSwapForPlayer?'SWAP_SELECT':'ASSIGN';}
    }
    // ── 公開フェーズ（1枚ずつ 30F ごと）
    if(G.phase==='REVEAL'){
      G.revTimer--;if(G.revTimer<=0){G.revStep++;G.revTimer=30;
        if(G.revStep>=G.market.length+1){const next=findNextTie();if(next)startTiebreak(next);else finishTurn();}}
    }
    // ── タイブレーク内部タイマー
    if(G.phase==='TIEBREAK'&&G.tb){
      if(G.tb.rollF>0)G.tb.rollF--;
      else{G.tb.revF=(G.tb.revF||0)+1;if(G.tb.revF===28)G.tb.showResult=true;if(G.tb.revF===46)G.tb.showBtn=true;}
    }
    // ── スワップアニメーションタイマー
    if(G.swapAnim&&G.swapAnim.active){G.swapAnim.timer--;if(G.swapAnim.timer<=0)G.swapAnim.active=false;}
    // ── フローティングテキスト更新
    G.floatingTexts=G.floatingTexts.filter(ft=>{ft.y+=ft.vy;ft.vy*=0.98;ft.alpha-=3.5;return ft.alpha>0;});
  }

  function drawGame(){
    p.background(8,11,20);
    p.noStroke();

    p.fill(13,18,32);p.rect(0,0,CW,TB_H);
    p.stroke(28,38,62);p.strokeWeight(1);p.line(0,TB_H,CW,TB_H);p.noStroke();
    p.fill(14,18,32);p.rect(166,AZ.y,CW-166,AZ.h);  // ポートレート右端から右のみ
    p.fill(14,18,32);p.rect(0,AZ.y,166,AZ.h);        // ポートレート下部も統一色で下地

    // ── ポートレートボックス: 左エリア、TB_H+AZ.h 分の高さ（144px）──
    // 先にAIゾーン背景を描いてからポートレートで上書き
    const PORT_W=166, PORT_H=TB_H+AZ.h; // 166 x 144
    p.fill(18,22,40);p.rect(0,0,PORT_W,PORT_H);
    if(charImgs[CFG.aiChar]){

      p.push();
      const dc=p.drawingContext;
      dc.save();dc.beginPath();dc.rect(2,1,PORT_W-4,PORT_H-2);dc.clip();
      // 上部55%をトリミングして顔エリアを表示、幅いっぱいに拡大
      const srcH=img.height*0.55;
      const dw=PORT_W-4;
      const dh=Math.round(srcH*(dw/img.width));
      const dy=Math.max(1,Math.round((PORT_H-dh)/2));
      p.imageMode(p.CORNER);
      p.image(img,2,dy,dw,dh,0,0,img.width,srcH);
      dc.restore();
      p.pop();
      // 下部グラデーション風フェードで境界を自然に
      p.noStroke();
      for(let i=0;i<24;i++){p.fill(14,18,32,i*8);p.rect(0,PORT_H-24+i,PORT_W,1);}
      // 薄い暗オーバーレイ

    p.textSize(24);p.text(G.aScore+'pt',204,30);
    const ai2=sum(G.aIncome);let aiY=54;
    if(ai2>0){p.fill(152,68,68);p.textSize(11);p.text(L.oppIncome(ai2),174,aiY);aiY+=14;}

    p.textFont('Mochiy Pop One, sans-serif');p.fill(175,185,218);p.textAlign(p.CENTER,p.CENTER);p.textSize(15);p.text(`${L.turnLabel} ${G.turn} / ${G.totalTurns}`,CW/2-50,14);p.textFont('sans-serif');

      p.fill(...instrCol);p.textAlign(p.CENTER,p.TOP);p.textSize(13);p.text(instrTxt,CW/2-40,PZ.y+6);
    }

    const allUnass=G.pDice.filter(d=>d.card===null),keptD=allUnass.filter(d=>!d.fresh),freshD=allUnass.filter(d=>d.fresh);
    const pdl=pDiceLayout(freshD,keptD);
    pdl.keptBoxes.forEach(box=>{p.noFill();p.stroke(215,172,50);p.strokeWeight(1.5);p.rect(box.x,box.y,box.w,box.h,9);p.noStroke();p.fill(215,172,50);p.textAlign(p.CENTER,p.BOTTOM);p.textSize(11);p.text(L.keepFull(keptD.length),box.x+box.w/2,box.y+2);});
    if(pdl.overflow){p.fill(212,155,50);p.textAlign(p.CENTER,p.TOP);p.textSize(12);p.text(`+${allUnass.length-D_MAXCOLS*2}…`,CW/2,PZ.y+72+(DS+D_GAP+4)*2);}
    if(isDragging&&dragS&&dragE){p.noFill();p.stroke(255,202,38,148);p.strokeWeight(1.5);p.rect(Math.min(dragS.x,dragE.x),Math.min(dragS.y,dragE.y),Math.abs(dragE.x-dragS.x),Math.abs(dragE.y-dragS.y));}

    pdl.positions.forEach((pos,pi2)=>{
      const d=pi2<pdl.kC?keptD[pi2]:freshD[pi2-pdl.kC];if(!d)return;
      const idx=G.pDice.indexOf(d);
      const dv=d.rollF>0?rng(1,6):d.val;
      const sc=d.bounceF>0?(1+d.bounceF*0.045):1;
      const isHighlighted=G.effectHighlights.includes(idx);
      const isSwapTarget=G.phase==='SWAP_SELECT';
      const hoverSwap=isSwapTarget&&hov(pos.x,pos.y,DS,DS);
      const isSwapAnimating=G.swapAnim&&G.swapAnim.active&&G.swapAnim.dieIdx===idx;
      const swapPulse=isSwapAnimating?(Math.sin(G.swapAnim.timer*0.25)*0.5+0.5):0;
      let glowCol=null;
      if(isSwapAnimating)glowCol=[215,140+(swapPulse*80|0),50];
      else if(isHighlighted)glowCol=d.val===6?[215,172,50]:d.val===1?[215,80,80]:null;
      const dieCol=pos.isKept?[155,118,42]:isSwapTarget?[155,88,32]:[58,108,192];
      const bounceSc=isSwapAnimating?(1+swapPulse*0.12)*sc:sc;
      drawDie(pos.x,pos.y,dv,DS,dieCol,G.selSet.has(idx)||hoverSwap,false,bounceSc,glowCol);
      if(pos.isKept){p.noFill();p.stroke(215,172,50);p.strokeWeight(2.5);p.rect(pos.x+1,pos.y+1,DS-2,DS-2,7);p.noStroke();}
      if(isHighlighted&&!isSwapAnimating){p.fill(215,178,50,180);p.textAlign(p.CENTER,p.BOTTOM);p.textSize(10);p.text(d.val===6?'★':'▼',pos.x+DS/2,pos.y-2);}
      if(hoverSwap&&!pos.isKept){p.noFill();p.stroke(215,142,50);p.strokeWeight(2.5);p.rect(pos.x-2,pos.y-2,DS+4,DS+4,9);p.noStroke();p.fill(215,165,50,200);p.textAlign(p.CENTER,p.BOTTOM);p.textSize(12);p.text('⇄',pos.x+DS/2,pos.y-3);}
    });

    if(G.phase==='EFFECT_ANIM'&&G.effectAnimMsgs.length>0){
      const prog=clamp(G.effectAnimTimer/90,0,1);
      p.fill(0,0,0,prog*120);p.noStroke();p.rect(0,CARD_Y-10,CW,CARD_H+20);
      G.effectAnimMsgs.forEach((msg,i)=>{
        p.fill(215,178,50,prog*255);p.textAlign(p.CENTER,p.CENTER);p.textSize(30);
        p.textFont('Mochiy Pop One, sans-serif');p.text(msg,CW/2,CH/2-30+i*42);p.textFont('sans-serif');
      });
      p.fill(175,165,130,prog*180);p.textSize(14);p.textAlign(p.CENTER,p.CENTER);p.text(L.tapContinue,CW/2,CH/2+50);
    }

    G.floatingTexts.forEach(ft=>{
      p.noStroke();p.fill(ft.col[0],ft.col[1],ft.col[2],ft.alpha);
      p.textAlign(p.CENTER,p.CENTER);p.textSize(ft.size);
      p.textFont('Mochiy Pop One, sans-serif');p.text(ft.txt,ft.x,ft.y);p.textFont('sans-serif');
    });

    if(G.phase==='ASSIGN'){const hC=hov(CW/2-108,CH-42,216,34);p.fill(hC?[58,148,78]:[36,108,56]);p.rect(CW/2-108,CH-42,216,34,9);p.fill(202,245,215);p.textAlign(p.CENTER,p.CENTER);p.textSize(15);p.text(L.confirmBtn,CW/2,CH-25);}
    if(G.phase==='TURN_END'){const lbl=G.turn>=G.totalTurns?L.resultBtn:L.nextBtn;const hN=hov(CW/2-108,CH-42,216,34);p.fill(hN?[55,95,172]:[36,65,138]);p.rect(CW/2-108,CH-42,216,34,9);p.fill(202,218,255);p.textAlign(p.CENTER,p.CENTER);p.textSize(15);p.text(lbl,CW/2,CH-25);}
    if(G.phase==='TIEBREAK'&&G.tb)drawTiebreak();
    if(helpOpen)drawHelp();
  }

  // p5 SETUP / DRAW

  p.setup=function(){
    p.createCanvas(CW,CH).parent('gc');p.pixelDensity(1);
    const charPaths=['character_elder','character_stella','character_shadow','character_noir'];
    charPaths.forEach((name,i)=>{
      p.loadImage('./assets/'+name+'.png',
        img=>{ charImgs[i]=img; },
        ()=>{ charImgs[i]=null; }
      );
    });

  p.draw=function(){
    if(scene==='GAME')updateGame();   // ゲームロジック更新（描画より先に実行）
    if(scene==='TITLE')drawTitle();
    else if(scene==='CONFIG')drawConfig();
    else if(scene==='GAME')drawGame();
    else if(scene==='RESULT')drawResult();
  };

  // ══════════════════════════════════════════
  // INPUT
  // ══════════════════════════════════════════
  p.mousePressed=function(){
    if(scene==='GAME'&&['ASSIGN','SWAP_SELECT'].includes(G.phase)&&!helpOpen){dragS={x:p.mouseX,y:p.mouseY};dragE={x:p.mouseX,y:p.mouseY};isDragging=false;}
    if(scene==='TITLE')EGG.onPress(p.mouseX,p.mouseY);
  };
  p.mouseDragged=function(){
    if(scene==='TITLE')return;if(helpOpen)return;
    if(!dragS)return;dragE={x:p.mouseX,y:p.mouseY};const dx=dragE.x-dragS.x,dy=dragE.y-dragS.y;if(Math.sqrt(dx*dx+dy*dy)>14)isDragging=true;
  };
  p.mouseReleased=function(){
    if(helpOpen){
      const bx=CW/2-440,by=CH/2-275,bh=550,cbx=CW/2-58,cby=by+bh-44;
      if(hov(cbx,cby,116,34)){helpOpen=false;return;}
      const sbw=162,sbx=bx+8,cty=by+52;
      for(let i=0;i<L.helpTabs.length;i++){if(hov(sbx,cty+i*44,sbw,38)){helpTab=i;return;}}
      if(!hov(bx,by,880,bh)){helpOpen=false;return;}
      return;
    }
    if(hov(HELP_BTN.x,HELP_BTN.y,HELP_BTN.w,HELP_BTN.h)&&scene!=='TITLE'){helpOpen=true;return;}
    if(hov(BACK_BTN.x,BACK_BTN.y,BACK_BTN.w,BACK_BTN.h)&&scene!=='TITLE'){
      if(scene==='CONFIG'){EGG.reset();scene='TITLE';return;}
      if(scene==='GAME'){scene='CONFIG';return;}
      if(scene==='RESULT'){EGG.reset();scene='TITLE';return;}
    }

    if(scene==='TITLE'){
      if(EGG.onRelease(p.mouseX,p.mouseY))return;if(EGG.heldIdx>=0)return;
      if(hov(14,8,80,26)){setLang('ja');return;}if(hov(14,36,80,26)){setLang('en');return;}
      if(hov(CW/2-140,CH-118,280,54)){scene='CONFIG';return;}return;
    }
    if(scene==='CONFIG'){
      const cbw=136,cbh=54,cgap=12,csx=CFG_RX+(CFG_RW-2*cbw-cgap)/2;
      for(let i=0;i<4;i++){const row=Math.floor(i/2),col=i%2;const bx=csx+col*(cbw+cgap),by=82+row*(cbh+cgap);if(hov(bx,by,cbw,cbh)){CFG.aiChar=i;return;}}
      const bwL=cfgRowBtnW(TURN_OPTIONS);
      TURN_OPTIONS.forEach((v,i)=>{if(hov(CFG_LX+i*(bwL+10),100,bwL,36))CFG.turns=v;});
      const midX=CFG_LX+CFG_LW/2;
      if(hov(midX-80,190,46,36))CFG.pDice=clamp(CFG.pDice-1,1,10);if(hov(midX+34,190,46,36))CFG.pDice=clamp(CFG.pDice+1,1,10);
      if(hov(midX-80,264,46,36))CFG.aDice=clamp(CFG.aDice-1,1,10);if(hov(midX+34,264,46,36))CFG.aDice=clamp(CFG.aDice+1,1,10);
      const bwC=cfgRowBtnW(CARD_OPTIONS);
      CARD_OPTIONS.forEach((v,i)=>{if(hov(CFG_LX+i*(bwC+10),340,bwC,36))CFG.marketCards=v;});
      const bwK=Math.floor((CFG_LW-10*3)/4);
      [0,1,2,3].forEach(i=>{if(hov(CFG_LX+i*(bwK+10),418,bwK,36))CFG.keepLimit=i;});
      if(hov(CFG_LX,612,CFG_LW,50)){initGame();scene='GAME';}
      return;
    }
    if(scene==='RESULT'){
      // もう一度プレイ → CONFIG に戻る（設定を変えてリトライ可能）
      if(hov(CW/2-118,CH/2+112,236,52)){EGG.reset();scene='CONFIG';return;}
      return;
    }
    if(isDragging&&scene==='GAME'&&G.phase==='ASSIGN'&&dragS&&dragE){
      const x1=Math.min(dragS.x,dragE.x),x2=Math.max(dragS.x,dragE.x),y1=Math.min(dragS.y,dragE.y),y2=Math.max(dragS.y,dragE.y);
      const aU=G.pDice.filter(d=>d.card===null),kD=aU.filter(d=>!d.fresh),fD=aU.filter(d=>d.fresh);
      const lay=pDiceLayout(fD,kD);
      lay.positions.forEach((pos,pi2)=>{const d=pi2<lay.kC?kD[pi2]:fD[pi2-lay.kC];if(d&&pos.x+DS>x1&&pos.x<x2&&pos.y+DS>y1&&pos.y<y2)G.selSet.add(G.pDice.indexOf(d));});
      dragS=null;dragE=null;isDragging=false;return;
    }
    dragS=null;dragE=null;isDragging=false;
    if(scene!=='GAME')return;

    if(G.phase==='EFFECT_ANIM'){G.effectAnimTimer=0;return;}
    if(G.phase==='TIEBREAK'&&G.tb&&G.tb.showBtn){const bx=CW/2-92,by=CH/2+86;if(hov(bx,by,184,40)){if(G.tb.res==='again')startTiebreak(G.tb.slot);else onTbDone(G.tb.res);}return;}

    if(G.phase==='SWAP_SELECT'){
      const aU=G.pDice.filter(d=>d.card===null),kD=aU.filter(d=>!d.fresh),fD=aU.filter(d=>d.fresh);
      const lay=pDiceLayout(fD,kD);
      for(let pi2=0;pi2<lay.positions.length;pi2++){
        const pos=lay.positions[pi2],d=pi2<lay.kC?kD[pi2]:fD[pi2-lay.kC];
        if(d&&hov(pos.x,pos.y,DS,DS)){
          executePlayerSwap(G.pDice.indexOf(d),pos.x+DS/2,pos.y);
          return;
        }
      }
      return;
    }

    if(G.phase==='ASSIGN'){
      if(hov(CW/2-108,CH-42,216,34)){
        G.pDice.forEach(d=>{if(d.card===null)d.fresh=false;});
        G.pKeepNext=G.pDice.filter(d=>d.card===null).map(d=>({val:d.val}));
        const maxK=KEEP_LIMIT_VALS[CFG.keepLimit];if(G.pKeepNext.length>maxK)G.pKeepNext=G.pKeepNext.slice(0,maxK);
        resolveAll();G.phase='REVEAL';G.revStep=-1;G.revTimer=30;return;
      }
      const aU=G.pDice.filter(d=>d.card===null),kD=aU.filter(d=>!d.fresh),fD=aU.filter(d=>d.fresh);
      const lay=pDiceLayout(fD,kD);
      for(let pi2=0;pi2<lay.positions.length;pi2++){
        const pos=lay.positions[pi2],d=pi2<lay.kC?kD[pi2]:fD[pi2-lay.kC];
        if(d&&hov(pos.x,pos.y,DS,DS)){const idx=G.pDice.indexOf(d);if(G.selSet.has(idx))G.selSet.delete(idx);else G.selSet.add(idx);return;}
      }
      if(G.selSet.size>0){
        for(let i=0;i<G.market.length;i++){const r=cRect(i);if(hov(r.x,r.y,r.w,r.h)){G.selSet.forEach(idx=>{G.pDice[idx].card=i;});G.selSet.clear();return;}}
        if(hov(SC.x,SC.y,SC.w,SC.h)){G.selSet.forEach(idx=>{G.pDice[idx].card=G.market.length;});G.selSet.clear();return;}
        G.selSet.clear();return;
      }
      for(let ci=0;ci<G.market.length;ci++){const asgn=G.pDice.filter(d=>d.card===ci);for(let di=0;di<asgn.length;di++){const s=cSlot(ci,di);if(hov(s.x,s.y,DSS,DSS)){asgn[di].card=null;asgn[di].fresh=true;return;}}}
      const spAsgn=G.pDice.filter(d=>d.card===G.market.length);
      for(let di=0;di<spAsgn.length;di++){const s=scSlot(di);if(hov(s.x,s.y,DSS,DSS)){spAsgn[di].card=null;spAsgn[di].fresh=true;return;}}
      return;
    }
    if(G.phase==='TURN_END'){if(hov(CW/2-108,CH-42,216,34)){if(G.turn>=G.totalTurns)scene='RESULT';else{G.turn++;beginTurn();}}}
  };
},'gc');
</script>
