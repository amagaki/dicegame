  // ── v0.40: Deck helpers ──────────────────────────────────────────────

  // 先行・後攻ごとの選択枚数テーブル
  function getCardSelectCounts() {
    const total = CFG.marketCards;
    const table = { 2: [1, 1], 3: [2, 1], 4: [3, 1], 5: [3, 2], 6: [4, 2], 7: [4, 3] };
    const [first, second] = table[total] || [Math.ceil(total * 2 / 3), Math.floor(total / 3)];
    return G.isFirstPlayer
      ? { player: first,  ai: second }
      : { player: second, ai: first  };
  }

  // デッキリセット条件チェック（条件A: 全使用済み / 条件B: 必要枚数 > 残り枚数）
  function checkAndResetDeck(who, neededCount) {
    const deckUsed = who === 'p' ? G.pDeckUsed : G.aDeckUsed;
    const deckLen  = who === 'p' ? G.pDeckCards.length : G.aDeckCards.length;
    const unused   = deckLen - deckUsed.size;
    if (unused < neededCount) {
      deckUsed.clear();
      if (who === 'p') G.deckResetFlash.p = 60; // visual flash frames
      else             G.deckResetFlash.a = 60;
    }
  }

  // AIのカード自動選択（evalCardForAI + シャッフルで少しランダム性を付与）
  function aiSelectCards(count) {
    const available = G.aDeckCards
      .map((c, i) => ({ ...c, idx: i }))
      .filter(c => !G.aDeckUsed.has(c.idx));
    // シャッフル後に評価値でソート（上位2倍の中からランダム性を出す）
    const pool = shuffle(available).sort((a, b) => evalCardForAI(b) - evalCardForAI(a));
    return pool.slice(0, count).map(c => c.idx);
  }

  // AIカード評価（ゲーム状況に応じた価値計算）
  function evalCardForAI(c) {
    const rem = Math.max(1, G.totalTurns - G.turn + 1);
    if (c.type === 'income')  return c.val * rem;
    if (c.type === 'invest')  return 5 + (rem - 1) * 1.5;
    return c.val; // instant
  }

  // プレイヤーがカード選択を確定する
  function confirmCardSelect() {
    // 使用済みとしてマーク
    G.cardSelectChosen.forEach(i => G.pDeckUsed.add(i));
    G.aMarketSelected.forEach(i => G.aDeckUsed.add(i));

    // マーケット構築: プレイヤーのカード + AIのカード → シャッフル
    const pCards = [...G.cardSelectChosen].map(i => ({
      ...G.pDeckCards[i], pBid: 0, aBid: 0, winner: null, owner: 'p'
    }));
    const aCards = G.aMarketSelected.map(i => ({
      ...G.aDeckCards[i], pBid: 0, aBid: 0, winner: null, owner: 'a'
    }));
    G.market = shuffle([...pCards, ...aCards]);

    // Phase 7: diceAdd効果 → プレイヤーのカードが出たターンにダイス+1
    G.market.forEach(c => {
      if (c.owner === 'p' && c.effect === 'diceAdd') {
        // transient:true でターン終了時に自動消去（未割当ならキープされない）
        G.pDice.push({ val: rng(1,6), fresh: true, card: null, rollF: 0, bounceF: 0, transient: true });
        addFloating(lang==='ja'?'◆ダイス+1！':'◆+1 Die!', FLOAT_POS.P_X, FLOAT_POS.P_Y, [78,132,218], 28);
      }
    });

    // EXカード
    const spType = SPECIAL_TYPES[Math.floor(Math.random() * SPECIAL_TYPES.length)];
    G.specialCard = { effectType: spType, pBid: 0, aBid: 0, winner: null };

    // ダイスロールアニメーション開始（confirmのタイミングでrollFをセット）
    G.pDice.forEach((d, i) => {
      if (d.fresh) {
        d.rollF = ROLL_BASE_FRAMES + i * DIE_ROLL_STEP;
        // 出目底上げアイテム：フレッシュダイスの出目下限を適用
        if (G.itemFloors && G.itemFloors > 0) {
          const minVal = Math.min(1 + G.itemFloors, 6);
          if (d.val < minVal) d.val = rng(minVal, 6);
          d.floored = true; // 視覚インジケーター用フラグ
        }
      }
    });
    // 出目底上げを消費（1ターンのみ有効）
    if (G.itemFloors && G.itemFloors > 0) G.itemFloors = 0;
    // 実際のフレッシュダイス数で_rollTotalを計算
    const freshCount = G.pDice.filter(d => d.fresh).length;
    G._rollTotal = ROLL_BASE_FRAMES + freshCount * DIE_ROLL_STEP + ROLL_EXTRA_FRAMES;
    G.phase = 'ROLLING';
  }

  // ──────────────────────────────────────────────────────────────────────

  function addFloating(txt, x, y, col, size) {
    G.floatingTexts.push({ txt, x, y, vy: -2.2, alpha: 255, col: col || [215, 178, 50], size: size || 38 });
  }

  // ── v0.3.3: NPCスキル管理 ──────────────────────────────────

  // ステージ開始時にスキル回数をリセット
  function initSkillsForStage() {
    const npcIdx = RUN ? RUN.playerNPC : 0;
    const defs = NPC_SKILL_DEFS[npcIdx] || [];
    G.skillCharges = {};
    G.skillActive  = {};
    G.skillSelectMode = null;
    G.skillMsg = null;
    defs.forEach(d => {
      G.skillCharges[d.key] = d.charges;
      G.skillActive[d.key]  = false;
    });
    // AI側スキル初期化
    const aiNpcIdx = RUN ? RUN.aiNPC : 0;
    const aiDefs = NPC_SKILL_DEFS[aiNpcIdx] || [];
    G.aiSkillCharges = {};
    aiDefs.forEach(d => { G.aiSkillCharges[d.key] = d.charges; });
    G.aiFukuyaTieLockIdx    = -1;
    G.aiFukuyaTieDiceActive = false;
    G.aiChachaBetIdx        = -1;
    G.aiChachaBigBet        = false;
    // ステージ開始バナー（初回ステージ以外で表示）
    if (RUN && RUN.currentStage > 1) G.stageStartBanner = 120;
  }

  // スキル定義を取得
  function getSkillDef(key) {
    const npcIdx = RUN ? RUN.playerNPC : 0;
    return (NPC_SKILL_DEFS[npcIdx] || []).find(d => d.key === key) || null;
  }

  // スキル発動可能か判定
  function canUseSkill(key) {
    const def = getSkillDef(key);
    if (!def) return false;
    if (def.type === 'passive') return false;
    if (G.phase !== 'ASSIGN') return false;
    const charges = G.skillCharges[key];
    if (charges === 0) return false;
    if (def.type === 'enhanced') {
      if (G.pScore < def.cost) return false;
      // requiresSkillが指定されている場合、そのスキルがアクティブである必要がある
      if (def.requiresSkill && !G.skillActive[def.requiresSkill]) return false;
    }
    return true;
  }

  // スキルボタンの描画領域計算
  function skillBtnRect(i) {
    const npcIdx = RUN ? RUN.playerNPC : 0;
    const defs = (NPC_SKILL_DEFS[npcIdx] || []).filter(d=>d.type!=='passive');
    const btnW = 218, btnH = 46, gap = 5;
    // アイテムスロット下端 = PZ.y + 8 + 52 + 8 = PZ.y + 68
    const itemBottom = PZ.y + 72;
    const panelX = CW - btnW - 16;
    const panelY = itemBottom + 8 + i * (btnH + gap);
    return { x: panelX, y: panelY, w: btnW, h: btnH };
  }

  // スキル発動メインロジック（Phase 2以降で拡充）
  function activateSkill(key) {
    const def = getSkillDef(key);
    if (!def || !canUseSkill(key)) return;

    // pt消費（強化スキル）
    if (def.type === 'enhanced') G.pScore -= def.cost;

    // target指定があるスキルは選択モードへ
    if (def.target !== 'none') {
      G.skillSelectMode = { key, def };
      addFloating(lang==='ja'?'対象を選んでください':'Select target', 600, PZ.y+10, [178,148,228], 26);
      return;
    }

    // 即時発動スキル
    executeSkill(key, null);
  }

  // スキル効果実行（target選択完了後も呼ばれる）
  function executeSkill(key, target) {
    const def = getSkillDef(key);
    if (!def) return;

    // 回数を消費
    if (def.charges > 0) G.skillCharges[key] = Math.max(0, G.skillCharges[key] - 1);

    const skillName = L[def.nameKey] || key;
    addFloating(skillName+' '+L.skillActivate, 600, PZ.y-20, [178,148,228], 28);
    G.skillMsg = { txt: skillName, timer: 90 };
    G.skillFlash = { txt: skillName, col: [178,148,228], alpha: 200, x: CW/2, y: CH/2 };

    // Phase 2以降で各スキルの効果を実装
    switch(key) {
      // 奈々スキル（Phase 2で実装）
      case 'nana_swap':
      case 'nana_reverse':
      case 'nana_reroll':
        applyNanaSkill(key, target);
        break;
      // 扇灯スキル（Phase 3で実装）
      case 'sento_see':
      case 'sento_xray':
        applySentoSkill(key, target);
        break;
      // 福夜スキル（Phase 4で実装）
      case 'fukuya_tielock':
      case 'fukuya_tiedice':
      case 'fukuya_d20':
        applyFukuyaSkill(key, target);
        break;
      // 茶々スキル（Phase 5で実装）
      case 'chacha_bet':
      case 'chacha_bigbet':
        applyChachaSkill(key, target);
        break;
      default:
        break;
    }

    G.skillSelectMode = null;
  }

  // 各NPCスキル実装（Phase 2〜5で順次追加・現在はスタブ）
  function applyNanaSkill(key, target) {
    switch(key) {
      case 'nana_swap': {
        // die_both: target = { pDieIdx, aDieIdx } → executeSkill経由で2段階
        if (!target) break;
        const pd = G.pDice[target.pDieIdx];
        const ad = G.aPool[target.aDieIdx];
        if (!pd || !ad) break;
        const tmp = pd.val; pd.val = ad.val; ad.val = tmp;
        G.effectHighlights.push(target.pDieIdx);
        addFloating(lang==='ja'?'ダイス交換！':'Swap!', 640, PZ.y-30, [178,148,228], 30);
        break;
      }
      case 'nana_reverse': {
        // die_any: target = { dieIdx } (自分のダイス)
        if (!target) break;
        const d = G.pDice[target.dieIdx];
        if (!d) break;
        d.val = 7 - d.val; // 6→1, 5→2, 4→3, 3→4, 2→5, 1→6
        G.effectHighlights.push(target.dieIdx);
        addFloating(`${target.origVal}→${d.val}`, 640, PZ.y-30, [178,148,228], 30);
        break;
      }
      case 'nana_reroll': {
        // 非キープダイスを全て振り直す・ROLLING相当のアニメ
        const freshIndices = [];
        G.pDice.forEach((d, i) => {
          if (d.fresh) {
            d.val = rng(1,6);
            d.rollF = ROLL_BASE_FRAMES + i * DIE_ROLL_STEP;
            d.bounceF = 0;
            freshIndices.push(i);
          }
        });
        // _rollTotalを再設定してROLLINGフェーズへ
        G._rollTotal = ROLL_BASE_FRAMES + freshIndices.length * DIE_ROLL_STEP + ROLL_EXTRA_FRAMES;
        G.phase = 'ROLLING';
        addFloating(lang==='ja'?'気まぐれ再ロール！':'Wild Reroll!', 640, PZ.y-30, [178,148,228], 30);
        break;
      }
    }
  }
  function applySentoSkill(key, target) {
    switch(key) {
      case 'sento_see': {
        // 索敵と同等：相手ダイスの高低を表示
        if (!G.oppDiceVisible) G.oppDiceVisible = {};
        G.aPool.forEach((d,i) => { G.oppDiceVisible[i] = d.val <= 3 ? 'low' : 'high'; });
        G.scoutActive = true;
        addFloating(lang==='ja'?'見通す目！':'Piercing Eyes!', 640, PZ.y-30, [108,172,248], 28);
        break;
      }
      case 'sento_xray': {
        // 相手の割り当て内容を全公開（revealの可視化）
        G.sentoXrayActive = true; // drawGameで参照して相手割当を表示
        addFloating(lang==='ja'?'割り当て透視！':'Assign Vision!', 640, PZ.y-30, [108,172,248], 28);
        break;
      }
    }
  }
  function applyFukuyaSkill(key, target) {
    switch(key) {
      case 'fukuya_tielock': {
        // 指定カードの両者割当を封じ・タイブレーク確定
        if (!target || target.type !== 'card') break;
        G.fukuyaTieLockIdx = target.idx;
        G.market[target.idx].fukuyaLocked = true;
        addFloating(lang==='ja'?'タイブレーク確定！':'Tie Lock!', 640, PZ.y-30, [108,148,228], 28);
        break;
      }
      case 'fukuya_tiedice': {
        // タイブレーク時に4対3（フラグ）
        G.fukuyaTieDiceActive = true;
        addFloating(lang==='ja'?'タイブレーク+1！':'Tie Boost!', 640, PZ.y-30, [108,148,228], 28);
        break;
      }
      case 'fukuya_d20': {
        // 指定カードにD20を即時割り当て確定
        if (!target || target.type !== 'card') break;
        const d20 = rng(1, 20);
        // 既存ダイスをそのカードへ割り当て（d20値相当のダイスを追加）
        G.pDice.push({ val: Math.min(d20, 6), fresh: false, card: target.idx, rollF: 0, bounceF: 0, isD20: true, d20Val: d20 });
        addFloating(`D20: ${d20}!`, 640, PZ.y-30, [215,178,50], 32);
        break;
      }
    }
  }
  function applyChachaSkill(key, target) {
    switch(key) {
      case 'chacha_bet': {
        // 指定カードに賭け宣言フラグ
        if (!target || target.type !== 'card') break;
        G.chachaBetIdx = target.idx;
        G.skillActive['chacha_bet'] = true;
        addFloating(lang==='ja'?`賭け宣言！「${L.cardNames[G.market[target.idx].key]||''}」`:`Bold Bet on card!`, 640, PZ.y-30, [215,140,50], 28);
        break;
      }
      case 'chacha_bigbet': {
        // 大博打フラグ（賭け宣言と合わせて使用）
        G.chachaBigBet = true;
        addFloating(lang==='ja'?'大博打！':'All-In!', 640, PZ.y-30, [215,140,50], 32);
        break;
      }
    }
  }

  // ─────────────────────────────────────────────────────────────

  function beginTurn() {
    // ── Dice setup ──
    const pKept = G.pKeepNext.map(d => ({ ...d })); G.pKeepNext = [];
    const pFresh = [];
    // rollF=0 now; will be set when card selection confirmed
    for (let i = 0; i < G.pPerTurn; i++)
      pFresh.push({ val: rng(1, 6), fresh: true, card: null, rollF: 0, bounceF: 0 });
    G.pDice = [...pKept.map(d => ({ val: d.val, fresh: false, card: null, rollF: 0, bounceF: 0 })), ...pFresh];

    const aKept = G.aKeepNext.map(d => ({ ...d })); G.aKeepNext = [];
    const aFresh = []; for (let i = 0; i < G.aPerTurn; i++) aFresh.push({ val: rng(1, 6), fresh: true });
    G.aPool = [...aKept.map(d => ({ val: d.val, fresh: false })), ...aFresh];
    G.aKeepVis = aKept.length;

    // ── Common state reset ──
    G.selSet = new Set(); G.revStep = -1;
    G.effectAnimTimer = 0; G.effectAnimMsgs = []; G.effectHighlights = [];
    G.pendingSwapForPlayer = false;
    G.swapAnim = { active: false, dieIdx: -1, timer: 0, newVal: 0 };
    G._rollTotal = 0;
    // アイテムフラグのターンリセット
    G.scoutActive    = false;
    G.oppDiceVisible = {};
    G.blockadeSelectMode = false;
    G.sixSelectMode  = false;
    // v0.3.3: スキルのターンリセット
    G.skillUsedThisTurn = new Set();
    G.skillSelectMode = null;
    G.sentoXrayActive = false;
    G.fukuyaTieLockIdx = -1;
    G.fukuyaTieDiceActive = false;
    G.chachaBetIdx = -1;
    G.chachaBigBet = false;
    G.sealSelectMode  = null;
    G.sealedCardIdx   = -1;
    G.enhancedCardIdx = -1;
    G.aiFukuyaTieLockIdx    = -1;
    G.aiFukuyaTieDiceActive = false;
    G.aiChachaBetIdx        = -1;
    G.aiChachaBigBet        = false;

    // ── v0.40: Deck & Card Selection ──
    const counts = getCardSelectCounts();

    // Deck reset check (条件A/B)
    checkAndResetDeck('p', counts.player);
    checkAndResetDeck('a', counts.ai);

    // AI auto-selects cards
    G.aMarketSelected = aiSelectCards(counts.ai);

    // Setup card selection state for player
    G.cardSelectChosen = new Set();
    G.cardSelectNeeded = counts.player;
    G.market = [];
    G.specialCard = null;
    G.phase = 'CARD_SELECT';
  }

  // ── updateGame: ゲームロジック更新（描画なし）──
  function updateGame() {
    if (G.phase === 'ROLLING') {
      G._rollTotal--;
      G.pDice.forEach(d => {
        if (d.rollF > 0) { d.rollF--; if (d.rollF === 0) d.bounceF = 12; }
        else if (d.bounceF > 0) d.bounceF--;
      });
      const freshDice = G.pDice.filter(d => d.fresh);
      const animDone = freshDice.length === 0 || freshDice.every(d => d.rollF === 0 && d.bounceF === 0);
      if (animDone || G._rollTotal <= 0) processEffectsAfterRoll();
    }
    if (G.phase === 'EFFECT_ANIM') {
      G.pDice.forEach(d => {
        if (d.rollF > 0) { d.rollF--; if (d.rollF === 0) d.bounceF = 12; }
        else if (d.bounceF > 0) d.bounceF--;
      });
      G.effectAnimTimer--;
      if (G.effectAnimTimer <= 0) G.phase = G.pendingSwapForPlayer ? 'SWAP_SELECT' : 'ASSIGN';
    }
    // ASSIGNフェーズでも残存rollF/bounceF処理（臨時ダイスアニメーション対応）
    if (G.phase === 'ASSIGN' || G.phase === 'SWAP_SELECT') {
      G.pDice.forEach(d => {
        if (d.rollF > 0) { d.rollF--; if (d.rollF === 0) d.bounceF = 12; }
        else if (d.bounceF > 0) d.bounceF--;
      });
    }
    if (G.phase === 'REVEAL') {
      G.revTimer--;
      if (G.revTimer <= 0) {
        G.revStep++; G.revTimer = REVEAL_FRAME_PER_CARD;
        if (G.revStep >= G.market.length + 1) {
          const next = findNextTie();
          if (next) startTiebreak(next); else finishTurn();
        }
      }
    }
    if (G.phase === 'TIEBREAK' && G.tb) {
      if (G.tb.rollF > 0) G.tb.rollF--;
      else { G.tb.revF = (G.tb.revF || 0) + 1; if (G.tb.revF === 28) G.tb.showResult = true; if (G.tb.revF === 46) G.tb.showBtn = true; }
    }
    if (G.swapAnim && G.swapAnim.active) { G.swapAnim.timer--; if (G.swapAnim.timer <= 0) G.swapAnim.active = false; }
    if (G.deckResetFlash.p > 0) G.deckResetFlash.p--;
    if (G.deckResetFlash.a > 0) G.deckResetFlash.a--;
    G.floatingTexts = G.floatingTexts.filter(ft => { ft.y += ft.vy; ft.vy *= 0.98; ft.alpha -= 3.5; return ft.alpha > 0; });
    // v0.3.3: スキルメッセージタイマー
    if (G.skillMsg && G.skillMsg.timer > 0) G.skillMsg.timer--;
    // v0.40: スキルフラッシュ
    if (G.skillFlash && G.skillFlash.alpha > 0) G.skillFlash.alpha -= 4;
    // v0.40: ステージ開始バナー
    if (G.stageStartBanner > 0) G.stageStartBanner--;
  }

  function processEffectsAfterRoll() {
    // ロールアニメーションを即座に完了（rollF/bounceF残存バグ防止）
    G.pDice.forEach(d => { d.rollF = 0; d.bounceF = 0; });
    const effects = G.pendingEffects.slice(); G.pendingEffects = [];
    const msgs = [], highlights = []; let swapForPlayer = false;
    effects.forEach(eff => {
      switch (eff.type) {
        case 'BOOST_DICE':
          if (eff.owner === 'p') { let n = 0; G.pDice.forEach((d, i) => { if (d.fresh && n < 2) { d.val = 6; highlights.push(i); n++; } }); msgs.push(lang === 'ja' ? '幸運の目発動！ダイス2個が6になった！' : 'Lucky Dice! 2 dice became 6!'); }
          else { let n = 0; G.aPool.forEach(d => { if (d.fresh && n < 2) { d.val = 6; n++; } }); }
          break;
        case 'WEAKEN_OPPONENT':
          if (eff.owner === 'p') { let n = 0; G.aPool.forEach(d => { if (n < 2) { d.val = 1; n++; } }); msgs.push(lang === 'ja' ? '封印発動！相手のダイス2個が1に！' : "Seal! Opponent's 2 dice set to 1!"); }
          else { let n = 0; G.pDice.forEach((d, i) => { if (d.fresh && n < 2) { d.val = 1; highlights.push(i); n++; } }); msgs.push(lang === 'ja' ? '封印！あなたのダイス2個が1にされた！' : 'Sealed! 2 of your dice set to 1!'); }
          break;
        case 'SWAP_DIE':
          if (eff.owner === 'p') { swapForPlayer = true; }
          else {
            const freshPDice = G.pDice.filter(d => d.fresh);
            if (freshPDice.length > 0 && G.aPool.length > 0) {
              const aiLowest = G.aPool.reduce((m, d) => d.val < m.val ? d : m, G.aPool[0]);
              const target = freshPDice[Math.floor(Math.random() * freshPDice.length)];
              const pIdx = G.pDice.indexOf(target);
              const tmp = target.val; target.val = aiLowest.val; aiLowest.val = tmp;
              highlights.push(pIdx);
              msgs.push(lang === 'ja' ? '交換協定！ダイスが入れ替わった！' : 'Exchange! A die was swapped!');
            }
          }
          break;
      }
    });
    G.effectHighlights = highlights;
    if (msgs.length > 0 || swapForPlayer) {
      G.effectAnimMsgs = msgs;
      G.effectAnimTimer = (swapForPlayer && msgs.length === 0) ? 0 : EFFECT_ANIM_FRAMES;
      G.pendingSwapForPlayer = swapForPlayer;
      G.phase = msgs.length > 0 ? 'EFFECT_ANIM' : swapForPlayer ? 'SWAP_SELECT' : 'ASSIGN';
    } else { G.phase = 'ASSIGN'; }
  }

  function executePlayerSwap(dieIdx, diePosX, diePosY) {
    if (G.aPool.length > 0) {
      const aiDie = G.aPool[Math.floor(Math.random() * G.aPool.length)];
      const incoming = aiDie.val, outgoing = G.pDice[dieIdx].val;
      G.pDice[dieIdx].val = incoming; aiDie.val = outgoing;
      G.swapAnim = { active: true, dieIdx, timer: 70, newVal: incoming };
      G.effectHighlights = [dieIdx];
      addFloating('⇄ ' + incoming, diePosX, diePosY - 20, [208, 168, 50], 36);
    }
    G.pendingSwapForPlayer = false;
    G.phase = 'ASSIGN';
  }

  function pBidFor(ci) {
    const assigned = G.pDice.filter(d => d.card === ci);
    if (!assigned.length) return 0;
    return sum(assigned.map(d=>d.val));
  }

  // 目標値ベースの勝敗判定（targetVal持ちカード用）
  function targetWinner(pBid, aBid, targetVal) {
    const pd = Math.abs(pBid - targetVal);
    const ad = Math.abs(aBid - targetVal);
    if (pd < ad) return 'p';
    if (ad < pd) return 'a';
    return 'tie';
  }

  // partialInfo用: AIダイスのカード割り当てをシミュレート
  function simulateAIDiceAssignment() {
    if (!G.aPool || !G.market) return;
    // 全ダイスをリセット
    G.aPool.forEach(d => { d.card = null; });
    // aBid > 0 のカードのみを対象に、入札値に合わせてダイスを貪欲に割り当て
    const pool = G.aPool.slice().sort((a,b)=>b.val-a.val); // 大きい順（元配列を変更しない）
    // カードを評価値の高い順に処理
    const cardOrder = G.market.map((c,i)=>({i,bid:c.aBid})).filter(x=>x.bid>0).sort((a,b)=>b.bid-a.bid);
    cardOrder.forEach(({i,bid}) => {
      let remaining = bid;
      for (const d of pool) {
        if (d.card !== null) continue;
        if (remaining <= 0) break;
        d.card = i;
        remaining -= d.val;
      }
    });
  }
  function pSpBid()     { return sum(G.pDice.filter(d => d.card === G.market.length).map(d => d.val)); }

  function evalCard(c) {
    if (c.type === 'income') return c.val * (G.totalTurns - G.turn + 1);
    if (c.type === 'invest') return 5 + (G.totalTurns - G.turn) * 1.5;
    return c.val;
  }
  function evalSpecial(s) {
    if (!s) return 4;
    const rem = G.totalTurns - G.turn;
    switch (s.effectType) {
      case 'SWAP_DIE':        return 3  + rem * 0.5;
      case 'BOOST_DICE':      return 10 + rem * 0.8;
      case 'OPPONENT_MINUS':  return 10;
      case 'SELF_MULTIPLY':   return Math.max(5, G.aScore * 0.2);
      case 'WEAKEN_OPPONENT': return 6  + rem * 0.6;
    }
    return 4;
  }

  function aiDecide() {
    // v0.40: NPCスキル使用判断（プレイヤーと同じタイミング）
    aiUseNPCSkills();
    const char   = AI_CHARS[CFG.aiChar];
    const nCards = G.market.length;
    const hasSpec = !!G.specialCard;
    const nSlots  = nCards + (hasSpec ? 1 : 0);
    const cardEvals = [...G.market.map(evalCard)];
    if (hasSpec) cardEvals.push(evalSpecial(G.specialCard));
    const pool  = shuffle([...G.aPool]);
    const bids  = Array.from({ length: nSlots }, () => []);
    let rem     = [...pool];
    const order = [...Array(nSlots).keys()].sort((a, b) => cardEvals[b] - cardEvals[a]);
    const et    = sum(cardEvals) || 1;
    switch (char.style) {
      case 'balanced': {
        for (let i = 0; i < nSlots; i++) {
          const ci = order[i]; let cnt = Math.round((cardEvals[ci] / et) * pool.length + (Math.random() - 0.5) * 1.8);
          cnt = clamp(cnt, 0, rem.length - (nSlots - 1 - i)); if (i === nSlots - 1) cnt = rem.length;
          bids[ci] = rem.splice(0, cnt);
        } break;
      }
      case 'allin': {
        const best = order[0]; const mainCnt = Math.floor(pool.length * (0.72 + Math.random() * 0.18));
        bids[best] = rem.splice(0, Math.min(mainCnt, rem.length));
        order.slice(1).forEach((ci, i) => { const cnt = i === order.length - 2 ? rem.length : Math.floor(rem.length * (Math.random() * 0.4)); bids[ci] = rem.splice(0, Math.min(cnt, rem.length)); });
        break;
      }
      case 'twofocus': {
        const top2 = order.slice(0, 2), rest = order.slice(2);
        rest.forEach(ci => { const cnt = rem.length > 0 && Math.random() < 0.35 ? 1 : 0; bids[ci] = rem.splice(0, Math.min(cnt, rem.length)); });
        const e0 = cardEvals[top2[0]], e1 = cardEvals[top2[1]], et2 = Math.max(e0 + e1, 0.01);
        const cnt0 = Math.round(rem.length * (e0 / et2) + (Math.random() - 0.5) * 1.5);
        bids[top2[0]] = rem.splice(0, clamp(cnt0, 0, rem.length));
        bids[top2[1]] = rem.splice(0, rem.length); break;
      }
      case 'adaptive': {
        const turnsLeft = G.totalTurns - G.turn, scoreDiff = G.aScore - G.pScore;
        let adjEvals = [...cardEvals], noise = 1.8;
        if (turnsLeft <= 2 && scoreDiff < -10) { const best = order[0]; bids[best] = rem.splice(0, rem.length); order.slice(1).forEach(ci => bids[ci] = []); break; }
        if (scoreDiff > 20 && turnsLeft > 3) { adjEvals = adjEvals.map((v, i) => i < nCards && G.market[i] && G.market[i].type === 'income' ? v * 1.5 : v); noise = 0.8; }
        if (scoreDiff < -10) { adjEvals = adjEvals.map((v, i) => i < nCards && G.market[i] && G.market[i].type === 'instant' ? v * 1.4 : v); }
        const adjOrder = [...Array(nSlots).keys()].sort((a, b) => adjEvals[b] - adjEvals[a]);
        const aet = sum(adjEvals) || 1;
        for (let i = 0; i < nSlots; i++) {
          const ci = adjOrder[i]; let cnt = Math.round((adjEvals[ci] / aet) * pool.length + (Math.random() - 0.5) * noise);
          cnt = clamp(cnt, 0, rem.length - (nSlots - 1 - i)); if (i === nSlots - 1) cnt = rem.length;
          bids[ci] = rem.splice(0, cnt);
        } break;
      }
    }
    G.aKeepNext = [];
    const maxKeep = KEEP_LIMIT_VALS[CFG.keepLimit];
    if (G.turn < G.totalTurns - 1 && Math.random() < char.keepProb && maxKeep > 0) {
      const lowestPri = order[nSlots - 1];
      if (bids[lowestPri].length > 0) G.aKeepNext.push({ val: bids[lowestPri].pop().val });
    }
    G.aKeepVis = G.aKeepNext.length;
    G.market.forEach((c, i) => { c.aBid = sum(bids[i].map(d => d.val)); });
    if (hasSpec) G.specialCard.aBid = sum(bids[nCards].map(d => d.val));
    updateAIEmotion();
    aiUseItems();
    // partialInfo用にAIダイスのcard割り当てをここでもシミュレート
    simulateAIDiceAssignment();
  }

  // ── AIアイテム使用 ────────────────────────────────────────
  function aiUseItems() {
    if (!RUN || !RUN.aiItems || RUN.aiItems.length === 0) return;
    const diff = G.aScore - G.pScore;
    const turnsLeft = G.totalTurns - G.turn;
    // 50%の確率でアイテム使用を検討、不利な場合は確率アップ
    const useProb = diff < -10 ? 0.7 : diff < 0 ? 0.45 : 0.25;
    if (Math.random() > useProb) return;

    const key = RUN.aiItems[Math.floor(Math.random() * RUN.aiItems.length)];
    switch(key) {
      case 'outomeBottom':
        // AI版：次ターンのダイスに底上げ（単純に最低ダイスを+1）
        G.aPool.forEach(d => { if (d.val < 6) d.val = Math.min(6, d.val + 1); });
        break;
      case 'force6':
        // AI最低ダイスを6に
        if (G.aPool.length > 0) {
          const t = G.aPool.reduce((m,d)=>d.val<m.val?d:m, G.aPool[0]);
          t.val = 6;
        }
        break;
      case 'tempDice':
        G.aPool.push({ val: rng(1,6), fresh: true });
        G.aKeepVis = G.aKeepNext.length; // 表示更新
        // AIダイス再配分（簡易）
        break;
      case 'scout':
        // AIは元々情報を持っているので索敵効果なし（スキップ）
        break;
      case 'blockade':
        { const topCard = G.market.reduce((m,c,i)=>evalCard(c)>evalCard(m)?c:m, G.market[0]);
          const ti = G.market.indexOf(topCard);
          if (ti >= 0) {
            G.market[ti].pBid = Math.min(1, G.market[ti].pBid || 0);
            addFloating(lang==='ja'?'相手の封鎖！':'AI Blockade!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [192,68,68], 26);
          }
        }
        break;
      case 'seal':
        // AIの封印：プレイヤーが最も高く入札しているカードを封印
        { const sealTarget = G.market.reduce((best, c, i) => {
            const pb = G.pDice.filter(d=>d.card===i).reduce((s,d)=>s+d.val,0);
            return (!best || pb > best.pb) ? {i, pb} : best;
          }, null);
          if (sealTarget && sealTarget.pb > 0) {
            G.sealedCardIdx = sealTarget.i;
            addFloating(lang==='ja'?'相手の封印！':'AI Seal!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [148,58,218], 26);
          }
        }
        break;
      case 'enhance':
        // AIの強化：自分が最も高く入札しているカードを強化
        { const enhTarget = G.market.reduce((best, c, i) => {
            return (!best || c.aBid > G.market[best.i].aBid) ? {i} : best;
          }, null);
          if (enhTarget) {
            G.enhancedCardIdx = enhTarget.i;
            addFloating(lang==='ja'?'相手の強化！':'AI Enhance!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [78,148,218], 26);
          }
        }
        break;
    }
    // 使用したアイテムを削除
    const idx = RUN.aiItems.lastIndexOf(key);
    if (idx >= 0) RUN.aiItems.splice(idx, 1);
  }

  function resolveAll() {
    G.market.forEach((c, i) => { c.pBid = pBidFor(i); });
    if (G.specialCard) G.specialCard.pBid = pSpBid();
    aiDecide();
    // partialInfo用: AIダイスをカードに割り当てシミュレート
    simulateAIDiceAssignment();
    // 封鎖：指定カードのAI入札を1に制限
    if (G.blockadeActive && G.blockadeTargetIdx >= 0 && G.blockadeTargetIdx < G.market.length) {
      const t = G.market[G.blockadeTargetIdx];
      if (t) { t.aBid = Math.min(1, t.aBid); }
      addFloating(lang==='ja'?'封鎖発動！':'Blockade!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [192,68,68], 28);
    }
    G.blockadeActive    = false;
    G.blockadeTargetIdx = -1;
    G.market.forEach(c => {
      // targetVal持ちカード（maxOnly/minOnly）は近い方が勝利
      if ((c.effect === 'maxOnly' || c.effect === 'minOnly') && c.targetVal != null) {
        c.winner = targetWinner(c.pBid, c.aBid, c.targetVal);
      } else {
        c.winner = c.pBid > c.aBid ? 'p' : c.aBid > c.pBid ? 'a' : 'tie';
      }
      // tieDraw
      if (c.winner === 'tie' && c.effect === 'tieDraw') c.winner = c.owner || 'tie';
    });
    if (G.specialCard) { const sc = G.specialCard; sc.winner = sc.pBid > sc.aBid ? 'p' : sc.aBid > sc.pBid ? 'a' : 'tie'; }
    // 福夜タイブレーク確定
    if (G.fukuyaTieLockIdx >= 0 && G.fukuyaTieLockIdx < G.market.length) {
      G.market[G.fukuyaTieLockIdx].winner = 'tie';
      G.market[G.fukuyaTieLockIdx].pBid = 0;
      G.market[G.fukuyaTieLockIdx].aBid = 0;
    }
    if (G.aiFukuyaTieLockIdx >= 0 && G.aiFukuyaTieLockIdx < G.market.length) {
      G.market[G.aiFukuyaTieLockIdx].winner = 'tie';
      G.market[G.aiFukuyaTieLockIdx].pBid = 0;
      G.market[G.aiFukuyaTieLockIdx].aBid = 0;
    }
  }

  function applyWin(card, who) {
    const cardIdx = G.market.indexOf(card);
    // 倍率計算（封印=0, 強化=2, 茶々賭け=1.5or2）
    let mult = 1;
    if (cardIdx === G.sealedCardIdx)        mult = 0;
    else if (cardIdx === G.enhancedCardIdx) mult = 2;
    // プレイヤー茶々賭け
    if (who === 'p' && cardIdx === G.chachaBetIdx && card.type !== 'invest') {
      mult *= G.chachaBigBet ? 2 : 1.5;
    }
    // AI茶々賭け
    if (who === 'a' && cardIdx === G.aiChachaBetIdx && card.type !== 'invest') {
      mult *= G.aiChachaBigBet ? 2 : 1.5;
    }
    mult = Math.round(mult * 10) / 10; // 浮動小数点対策

    if (card.type === 'income') {
      const v = Math.round(card.val * mult);
      if (who === 'p') G.pIncome.push(v); else G.aIncome.push(v);
    } else if (card.type === 'invest') {
      if (mult === 0) { /* 封印: 効果なし */ }
      else { if (who === 'p') G.pPerTurn++; else G.aPerTurn++; }
    } else { // instant
      const pts = Math.floor(card.val * mult);
      if (who === 'p') {
        G.pScore += pts;
        if (mult !== 1) addFloating((mult===0?'🔒 封印！':'⚡×'+mult+'！')+` +${pts}pt`, FLOAT_POS.P_X, FLOAT_POS.P_Y-20, mult===0?[148,58,218]:[78,148,218], 28);
      } else {
        G.aScore += pts;
      }
    }

    // Phase 7: ptBonus・oppPtMinus効果（カードのeffectフィールド）
    if (who === 'p' && mult > 0) {
      if (card.effect === 'ptBonus')    { G.pScore += 20; addFloating(lang==='ja'?'◆+20pt':'◆+20pt', FLOAT_POS.P_X, FLOAT_POS.P_Y-40, [178,148,228], 28); }
      if (card.effect === 'oppPtMinus') { G.aScore = Math.max(0, G.aScore-15); addFloating(lang==='ja'?'◆相手-15pt':'◆Opp-15pt', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [192,68,68], 28); }
      if (card.effect === 'diceAdd')    { G.pDice.push({ val:rng(1,6), fresh:false, card:null, rollF:0, bounceF:0 }); addFloating(lang==='ja'?'◆ダイス+1！':'◆+1 Die!', FLOAT_POS.P_X, FLOAT_POS.P_Y-40, [78,132,218], 28); }
    }
    // AI版ptBonus/oppPtMinus
    if (who === 'a' && mult > 0) {
      if (card.effect === 'ptBonus')    { G.aScore += 20; }
      if (card.effect === 'oppPtMinus') { G.pScore = Math.max(0, G.pScore-15); addFloating(lang==='ja'?'◆相手の呪い-15pt':'◆Cursed -15pt', FLOAT_POS.P_X, FLOAT_POS.P_Y, [192,68,68], 28); }
    }
  }

  function finishTurn() {
    let selfMultOwner = null;
    G.market.forEach(c => {
      if (c.winner === 'p') applyWin(c, 'p');
      else if (c.winner === 'a') applyWin(c, 'a');
      // 茶々の賭け宣言で負け→効果なし（何もしない・既にdefaultで0）
    });
    // 茶々：賭け宣言カードをプレイヤーが負けた場合、income獲得をキャンセル
    if (G.chachaBetIdx >= 0) {
      const betCard = G.market[G.chachaBetIdx];
      if (betCard && betCard.winner === 'a' && betCard.type === 'income') {
        // income効果は applyWin でAI側に加算済みなのでそのまま
      }
      G.chachaBetIdx = -1;
      G.chachaBigBet = false;
      G.skillActive['chacha_bet'] = false;
    }
    // AI茶々フラグリセット
    G.aiChachaBetIdx = -1;
    G.aiChachaBigBet = false;
    if (G.specialCard) {
      const sc = G.specialCard, w = sc.winner;
      if (w && w !== 'tie') {
        const eff = sc.effectType;
        if (eff === 'OPPONENT_MINUS') {
          if (w === 'p') { const was = G.aScore; G.aScore = Math.max(0, G.aScore - 10); addFloating(`-${was - G.aScore}pt`, FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [215, 70, 70], 44); }
          else           { const was = G.pScore; G.pScore = Math.max(0, G.pScore - 10); addFloating(`-${was - G.pScore}pt`, FLOAT_POS.P_X, FLOAT_POS.P_Y, [215, 70, 70], 44); }
        } else if (eff === 'SELF_MULTIPLY') { selfMultOwner = w; }
        else G.pendingEffects.push({ type: eff, owner: w });
      }
    }
    G.pScore += sum(G.pIncome); G.aScore += sum(G.aIncome);
    if (selfMultOwner === 'p') {
      const before = G.pScore; G.pScore = Math.floor(G.pScore * 1.2);
      const gain = G.pScore - before; if (gain > 0) addFloating(`+${gain}pt`, FLOAT_POS.P_X, FLOAT_POS.P_Y, [68, 215, 128], 44);
    } else if (selfMultOwner === 'a') {
      const before = G.aScore; G.aScore = Math.floor(G.aScore * 1.2);
      const gain = G.aScore - before; if (gain > 0) addFloating(`+${gain}pt`, FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [215, 178, 50], 40);
    }
    updateAIEmotion();
    G.phase = 'TURN_END';
  }

  function updateAIEmotion() {
    const diff = G.aScore - G.pScore, turnsLeft = G.totalTurns - G.turn;
    const neutral = AI_CHARS[CFG.aiChar].neutralFace;
    if      (diff > 20)                              G.aiEmotion = '(≧▽≦)';
    else if (diff > 8)                               G.aiEmotion = '(^_^)';
    else if (Math.abs(diff) <= 8 && turnsLeft <= 2)  G.aiEmotion = '(;∀;)';
    else if (Math.abs(diff) <= 8)                    G.aiEmotion = neutral;
    else if (diff < -20 && turnsLeft <= 1)           G.aiEmotion = 'orz';
    else if (diff < -10)                             G.aiEmotion = '(；_;)';
    else if (diff < -3)                              G.aiEmotion = '( ;∀;)';
    else                                             G.aiEmotion = '(-_-)';
  }

  function findNextTie() {
    const mi = G.market.findIndex(c => c.winner === 'tie');
    if (mi >= 0) return { slotType: 'market', ci: mi };
    if (G.specialCard && G.specialCard.winner === 'tie') return { slotType: 'special' };
    return null;
  }
  function startTiebreak(slot) {
    const pDiceCount = G.fukuyaTieDiceActive ? 4 : 3;
    const aDiceCount = G.aiFukuyaTieDiceActive ? 4 : 3;
    const pD = Array.from({length:pDiceCount}, ()=>rng(1,6));
    const aD = Array.from({length:aDiceCount}, ()=>rng(1,6));
    const pt = sum(pD), at = sum(aD);
    const nameKey = slot.slotType === 'market' ? G.market[slot.ci].key : (G.specialCard ? G.specialCard.effectType : '');
    const displayName = slot.slotType === 'market' ? (L.cardNames[nameKey] || nameKey) : (L.specialNames[nameKey] || nameKey);
    G.tb = { slot, displayName, pD, aD, pt, at, res: pt > at ? 'p' : at > pt ? 'a' : 'again', rollF: 72, revF: 0, showResult: false, showBtn: false };
    G.phase = 'TIEBREAK';
  }
  function onTbDone(w) {
    if (G.tb.slot.slotType === 'market') G.market[G.tb.slot.ci].winner = w;
    else if (G.specialCard)              G.specialCard.winner = w;
    const next = findNextTie(); if (next) startTiebreak(next); else finishTurn();
  }

// ══════════════════════════════════════════════════════════════
// SECTION 6: DRAFT SYSTEM (v0.40)
// ══════════════════════════════════════════════════════════════

  const ITEM_KEYS = ['outomeBottom','force6','tempDice','scout','blockade','seal','enhance'];

  function generateSpecialCard() {
    const types = ['income','invest','instant'];
    const type  = types[Math.floor(Math.random() * types.length)];
    const ranges = { income:[2,6], invest:[1,2], instant:[5,15] };
    const [lo,hi] = ranges[type];
    const val = lo + Math.floor(Math.random()*(hi-lo+1));
    const effects = ['diceAdd','tieDraw','maxOnly','minOnly','partialInfo','ptBonus','oppPtMinus'];
    const effect = effects[Math.floor(Math.random()*effects.length)];
    // targetLow(minOnly): 目標値3〜7、targetHigh(maxOnly): 目標値10〜18
    const targetVal = effect==='minOnly' ? (3+Math.floor(Math.random()*5))
                    : effect==='maxOnly' ? (10+Math.floor(Math.random()*9))
                    : null;
    return { type, val, effect, isSpecial:true, targetVal };
  }

  let DS_STATE = {};

  // ── ドラフト初期化 ──────────────────────────────────────────
  function initDraft(isInitial) {
    const itemPool = shuffle([...ITEM_KEYS]).slice(0, 5); // アイテム5個（2固定+5特別+5アイテム=12スロット）
    const specialCards = Array.from({length:5}, ()=>generateSpecialCard()); // 特別カード5枚
    const slots = [
      { id:'priority', kind:'priority', name:()=>L.draftSlotPriority, desc:()=>L.draftSlotPriorityDesc },
      { id:'dice',     kind:'dice',     name:()=>L.draftSlotDice,     desc:()=>L.draftSlotDiceDesc     },
      ...specialCards.map((card,si)=>({
        id:'special_'+si, kind:'special', card,
        name:()=>L.draftSlotSpecial, desc:()=>L.draftSlotSpecialDesc,
      })),
      ...itemPool.map(key=>({
        id:key, kind:'item', name:()=>L.draftItemNames[key], desc:()=>L.draftItemDescs[key],
      })),
    ];

    const isChachaP = RUN.playerNPC === 0;
    const playerTags = isChachaP
      ? [{ mult:2.0,used:false },{ mult:2.0,used:false },{ mult:1.5,used:false },{ mult:1.5,used:false }]
      : [{ mult:1.5,used:false },{ mult:1.5,used:false }];

    const isChachaA = RUN.aiNPC === 0;
    const aiTagsAvail = isChachaA
      ? [{ mult:2.0 },{ mult:2.0 },{ mult:1.5 },{ mult:1.5 }]
      : [{ mult:1.5 },{ mult:1.5 }];

    // タグスロット割り当て: slotId -> { pMult, aMult }
    const slotTagMap = {};

    DS_STATE = {
      slots, isInitialDraft: !!isInitial,
      playerPt: isInitial ? RUN.playerDraftPt : STAGE_RES.playerDraftPt,
      aiPt:     isInitial ? RUN.aiDraftPt     : STAGE_RES.aiDraftPt,
      playerBids:{}, aiBids:{},
      playerTags, aiTagsAvail,
      slotTagMap,      // slotId -> { pMult?, aMult? }
      phase:'TAG_SELECT', // TAG_SELECT → BID_SELECT → TIEBREAK → REVEALED → PRIORITY_CHOICE → DONE
      winners:{}, effectivePBids:{},
      tieQueue:[], currentTie:null,
      // D&D用
      dragTag: null,   // { mult, sourceIdx } ドラッグ中のタグ
      dragX:0, dragY:0,
    };
    slots.forEach(s=>{ DS_STATE.playerBids[s.id]=0; DS_STATE.slotTagMap[s.id]={}; });
    computeAITags(); // タグだけ先に計算（入札は確定後）
  }

  // ── AIタグ先行計算（TAG_SELECTフェーズ用）─────────────────
  function computeAITags() {
    const { slots, aiTagsAvail } = DS_STATE;
    const aiNPC = RUN.aiNPC;
    const weights = {
      0:{ priority:1.8,dice:1.5,special:1.2,outomeBottom:1.0,force6:1.2,tempDice:1.5,seal:0.8,enhance:0.8,scout:1.0,blockade:0.8 },
      1:{ priority:1.5,dice:1.2,special:1.8,outomeBottom:0.8,force6:0.8,tempDice:1.0,seal:1.5,enhance:1.2,scout:2.5,blockade:1.0 },
      2:{ priority:1.2,dice:2.0,special:1.0,outomeBottom:1.2,force6:1.5,tempDice:1.5,seal:0.8,enhance:0.8,scout:1.0,blockade:2.0 },
      3:{ priority:1.0,dice:1.2,special:1.0,outomeBottom:2.0,force6:2.5,tempDice:1.2,seal:1.0,enhance:1.0,scout:1.0,blockade:1.0 },
    };
    const scored = slots.map(s=>({ ...s, v:(weights[aiNPC]||{})[s.id]||1 }))
      .sort((a,b)=>b.v-a.v+(Math.random()-0.5)*0.4);
    const tagSlots = scored.slice(0, aiTagsAvail.length).map(s=>s.id);
    tagSlots.forEach((id,i)=>{
      if(aiTagsAvail[i]) DS_STATE.slotTagMap[id].aMult = aiTagsAvail[i].mult;
    });
  }

  // ── AI入札計算 ─────────────────────────────────────────────
  // ── AI入札計算（BID_SELECTフェーズ用・タグは既に設定済み）─
  function computeAIBids() {
    const { slots, aiPt, slotTagMap } = DS_STATE;
    const aiNPC = RUN.aiNPC;
    const weights = {
      0:{ priority:1.8,dice:1.5,special:1.2,outomeBottom:1.0,force6:1.2,tempDice:1.5,seal:0.8,enhance:0.8,scout:1.0,blockade:0.8 },
      1:{ priority:1.5,dice:1.2,special:1.8,outomeBottom:0.8,force6:0.8,tempDice:1.0,seal:1.5,enhance:1.2,scout:2.5,blockade:1.0 },
      2:{ priority:1.2,dice:2.0,special:1.0,outomeBottom:1.2,force6:1.5,tempDice:1.5,seal:0.8,enhance:0.8,scout:1.0,blockade:2.0 },
      3:{ priority:1.0,dice:1.2,special:1.0,outomeBottom:2.0,force6:2.5,tempDice:1.2,seal:1.0,enhance:1.0,scout:1.0,blockade:1.0 },
    };
    const scored = slots.map(s=>{
      let v = (weights[aiNPC]||{})[s.id]||1;
      v *= (12 + Math.random()*6); // スケール
      return {...s, value:v};
    }).sort((a,b)=>b.value-a.value);
    const totV = scored.reduce((s,x)=>s+x.value,0)||1;
    const bids={};let rem=aiPt;
    scored.forEach((s,i)=>{
      let bid=Math.round((s.value/totV)*aiPt+(Math.random()-0.5)*2);
      bid=Math.max(0,Math.min(bid,rem-(scored.length-1-i)));
      if(i===scored.length-1)bid=rem;
      // タグ効果を考慮した実効入札額を格納
      const aMult = (slotTagMap[s.id]||{}).aMult||1;
      bids[s.id]=Math.round(bid*aMult);
      rem-=bid;
    });
    DS_STATE.aiBids=bids;
  }

  // ── タグ確定（TAG_SELECT → BID_SELECT）────────────────────
  function confirmTags() {
    DS_STATE.phase = 'BID_SELECT';
    computeAIBids(); // タグが確定してから入札計算
  }

  // ── ドラフト確定（reveal）──────────────────────────────────
  function revealDraft() {
    const { slots, playerBids, aiBids, slotTagMap } = DS_STATE;
    const effectivePBids={};
    slots.forEach(s=>{
      const base=playerBids[s.id]||0;
      const pMult=slotTagMap[s.id]?.pMult||1;
      effectivePBids[s.id]=Math.round(base*pMult);
    });
    DS_STATE.effectivePBids=effectivePBids;

    // 勝者・タイブレーク判定
    const winners={};
    const tieQueue=[];
    slots.forEach(s=>{
      const pb=effectivePBids[s.id]||0;
      const ab=aiBids[s.id]||0;
      if(pb===ab) tieQueue.push(s.id);
      else winners[s.id]=pb>ab?'p':'a';
    });
    DS_STATE.winners=winners;
    DS_STATE.tieQueue=[...tieQueue];

    if(tieQueue.length>0){
      DS_STATE.phase='TIEBREAK';
      startDraftTiebreak(tieQueue[0]);
    } else {
      finishReveal();
    }
  }

  function startDraftTiebreak(slotId) {
    const slot = DS_STATE.slots.find(s=>s.id===slotId);
    DS_STATE.currentTie = {
      slotId, slotName: slot?slot.name():'',
      pD:[rng(1,6),rng(1,6),rng(1,6)], aD:[rng(1,6),rng(1,6),rng(1,6)],
      rollF:60, showResult:false, showBtn:false,
    };
    const ct=DS_STATE.currentTie;
    ct.pt=ct.pD.reduce((a,b)=>a+b,0); ct.at=ct.aD.reduce((a,b)=>a+b,0);
    ct.res=ct.pt>ct.at?'p':ct.at>ct.pt?'a':'again';
  }

  function resolveDraftTiebreak() {
    const { currentTie, tieQueue, winners } = DS_STATE;
    if(currentTie.res==='again'){
      startDraftTiebreak(currentTie.slotId); return;
    }
    winners[currentTie.slotId]=currentTie.res;
    // 次のタイへ
    const nextIdx=tieQueue.indexOf(currentTie.slotId)+1;
    if(nextIdx<tieQueue.length){
      startDraftTiebreak(tieQueue[nextIdx]);
    } else {
      DS_STATE.currentTie=null;
      finishReveal();
    }
  }

  function finishReveal() {
    DS_STATE.phase='REVEALED';
    if(DS_STATE.winners['priority']==='p'){
      DS_STATE.phase='PRIORITY_CHOICE';
    }
  }

  // ── ドラフト効果適用 ───────────────────────────────────────
  function applyDraftEffects() {
    const { slots, winners } = DS_STATE;
    slots.forEach(s=>{
      if(winners[s.id]==='p'){
        if(s.kind==='dice'){ RUN.playerBonusDice=(RUN.playerBonusDice||0)+1; }
        else if(s.kind==='special'){ (RUN.playerSpecialCards=RUN.playerSpecialCards||[]).push(s.card); }
        else if(s.kind==='item'){ (RUN.playerItems=RUN.playerItems||[]).push(s.id); if(RUN.playerItems.length>5)RUN.playerItems=RUN.playerItems.slice(-5); }
      } else if(winners[s.id]==='a'){
        if(s.kind==='dice'){ RUN.aiBonusDice=(RUN.aiBonusDice||0)+1; }
        else if(s.kind==='item'){ (RUN.aiItems=RUN.aiItems||[]).push(s.id); if(RUN.aiItems.length>5)RUN.aiItems=RUN.aiItems.slice(-5); }
      }
    });
    DS_STATE.phase='DONE';
  }

  function choosePriority(goFirst) {
    RUN.nextStageFirstPlayer=goFirst;
    applyDraftEffects();
  }

  // ── 次ステージ開始 ─────────────────────────────────────────
  function startNextStageFromDraft() {
    if(!DS_STATE.isInitialDraft) RUN.currentStage++;
    CFG.pDice=Math.max(1,(RUN.basePDice||CFG.pDice)+(RUN.playerBonusDice||0));
    CFG.aDice=Math.max(1,(RUN.baseADice||CFG.aDice)+(RUN.aiBonusDice||0));
    initGame();
    if(RUN.nextStageFirstPlayer!==undefined){ G.isFirstPlayer=RUN.nextStageFirstPlayer; RUN.nextStageFirstPlayer=undefined; }
    scene='GAME';
  }

  // ── v0.40: AIのNPCスキル使用 ───────────────────────────
  function aiUseNPCSkills() {
    if (!G.market || G.market.length === 0) return; // 市場未構築時はスキップ
    const aiNpcIdx = RUN ? RUN.aiNPC : 0;
    const defs = NPC_SKILL_DEFS[aiNpcIdx] || [];
    const diff = G.aScore - G.pScore;
    const turnsLeft = G.totalTurns - G.turn;
    const isLosing = diff < -8;
    const isWinning = diff > 8;

    defs.forEach(def => {
      if (def.type === 'passive') return;
      const charges = G.aiSkillCharges[def.key];
      if (charges === 0) return;
      if (def.type === 'enhanced' && G.aScore < def.cost) return;

      // スキル使用判断
      let shouldUse = false;
      switch(def.key) {
        // 奈々
        case 'nana_swap':
          shouldUse = isLosing || (G.aPool.length > 0 && G.aPool.reduce((s,d)=>s+d.val,0)/G.aPool.length < 3.5);
          break;
        case 'nana_reverse':
          shouldUse = G.aPool.some(d=>d.val<=2);
          break;
        case 'nana_reroll':
          shouldUse = isLosing && G.aPool.every(d=>d.val<=3);
          break;
        // 福夜
        case 'fukuya_tielock':
          shouldUse = G.pDice.length > 0 && (isLosing || Math.random() < 0.4);
          break;
        case 'fukuya_tiedice':
          shouldUse = G.aiFukuyaTieLockIdx >= 0;
          break;
        case 'fukuya_d20':
          shouldUse = isLosing && turnsLeft <= 3;
          break;
        // 茶々
        case 'chacha_bet':
          shouldUse = Math.random() < (isLosing ? 0.7 : 0.4);
          break;
        case 'chacha_bigbet':
          shouldUse = isLosing && G.aiChachaBetIdx >= 0 && Math.random() < 0.5;
          break;
        // 扇灯: AIには見通す目が不要（情報優位）→ tiebreak候補として偵察活用
        case 'sento_see':
          shouldUse = false; // AI視点では不要
          break;
        case 'sento_xray':
          shouldUse = false; // AI視点では不要
          break;
      }

      if (!shouldUse) return;

      // pt消費
      if (def.type === 'enhanced') G.aScore -= def.cost;
      // 回数消費
      if (charges > 0) G.aiSkillCharges[def.key] = Math.max(0, charges-1);

      // 効果実行
      aiExecuteNPCSkill(def.key);
    });
  }

  function aiExecuteNPCSkill(key) {
    switch(key) {
      case 'nana_swap': {
        if (G.aPool.length === 0 || G.pDice.length === 0) break;
        // AIの最低ダイス ↔ プレイヤーの最高ダイス（未割当）
        const aLowest = G.aPool.reduce((m,d)=>d.val<m.val?d:m, G.aPool[0]);
        const unass = G.pDice.filter(d=>d.card===null);
        if (unass.length === 0) break;
        const pHighest = unass.reduce((m,d)=>d.val>m.val?d:m, unass[0]);
        const tmp = aLowest.val; aLowest.val = pHighest.val; pHighest.val = tmp;
        addFloating(lang==='ja'?'相手の奈々：交換！':'Opp Nana: Swap!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [178,148,228], 26);
        break;
      }
      case 'nana_reverse': {
        const aLowest = G.aPool.reduce((m,d)=>d.val<m.val?d:m, G.aPool[0]);
        aLowest.val = 7 - aLowest.val;
        addFloating(lang==='ja'?'相手の奈々：反転！':'Opp Nana: Reverse!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [178,148,228], 26);
        break;
      }
      case 'nana_reroll': {
        G.aPool.forEach(d=>{ d.val=rng(1,6); });
        addFloating(lang==='ja'?'相手の奈々：再ロール！':'Opp Nana: Reroll!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [178,148,228], 26);
        break;
      }
      case 'fukuya_tielock': {
        // プレイヤーが最も力を入れているカード（高入札予測）にtieLock
        const cardVals = G.market.map((c,i)=>({ i, v: evalCard(c) }));
        const target = cardVals.sort((a,b)=>b.v-a.v)[0];
        if (target) {
          G.aiFukuyaTieLockIdx = target.i;

        }
        break;
      }
      case 'fukuya_tiedice': {
        G.aiFukuyaTieDiceActive = true;

        break;
      }
      case 'fukuya_d20': {
        const d20 = rng(1,20);
        G.aPool.push({ val: Math.min(d20,6), fresh:true, d20Val:d20 });
        addFloating(`相手D20: ${d20}!`, FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [215,178,50], 28);
        break;
      }
      case 'chacha_bet': {
        // AI最高評価カードに賭け宣言
        const best = G.market.reduce((m,c,i)=>evalCard(c)>evalCard(m.card)?{card:c,i}:m, {card:G.market[0],i:0});
        G.aiChachaBetIdx = best.i;
        addFloating(lang==='ja'?'相手の茶々：賭け宣言！':'Opp Chacha: Bold Bet!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [215,140,50], 26);
        break;

      case 'chacha_bigbet': {
        G.aiChachaBigBet = true;
        addFloating(lang==='ja'?'相手の茶々：大博打！':'Opp Chacha: All-In!', FLOAT_POS.AI_X, FLOAT_POS.AI_Y, [215,140,50], 28);
        break;
      }
    }
  }

  function getCardLayout() {
    const n = G.market ? G.market.length : CFG.marketCards;
    const availW = SC.x - 20, cw = Math.min(250, Math.floor((availW - 40) / n) - 12);
    const totalUsed = n * cw + (n - 1) * 12, startX = (availW - totalUsed) / 2 + 10;
    return { cw, ch: CARD_H, centers: Array.from({ length: n }, (_, i) => startX + i * (cw + 12) + cw / 2) };
  }
  function cRect(i) { const cl = getCardLayout(); return { x: cl.centers[i] - cl.cw / 2, y: CARD_Y, w: cl.cw, h: cl.ch }; }

  function pDiceLayout(freshList, keptList) {
    const all = [...keptList, ...freshList], fC = freshList.length, kC = keptList.length;
    const total = Math.min(all.length, D_MAXCOLS * 2), positions = [];
    for (let i = 0; i < total; i++) {
      const row = Math.floor(i / D_MAXCOLS), col = i % D_MAXCOLS;
      const rowLen = Math.min(D_MAXCOLS, total - row * D_MAXCOLS);
      const rowW = rowLen * DS + (rowLen - 1) * D_GAP;
      const startX = CW / 2 - rowW / 2;
      positions.push({ x: startX + col * (DS + D_GAP), y: PZ.y + 72 + row * (DS + D_GAP + 4), isKept: i < kC });
    }
    const keptBoxes = [];
    for (let row = 0; row < 2; row++) {
      const rp = positions.filter((_, i) => Math.floor(i / D_MAXCOLS) === row && i < kC);
      if (rp.length > 0) {
        const xs = rp.map(pos => pos.x);
        keptBoxes.push({ x: Math.min(...xs) - 6, y: rp[0].y - 20, w: Math.max(...xs) + DS - Math.min(...xs) + 12, h: DS + 24 });
      }
    }
    return { positions, fC, kC, keptBoxes, overflow: all.length > total };
  }

  function aDiceLayout(poolLen, keptVis) {
    const freshC = Math.max(0, poolLen - keptVis), SEP = (freshC > 0 && keptVis > 0) ? 22 : 0;
    const freshW = freshC > 0 ? freshC * DSS + (freshC - 1) * 6 : 0;
    const keptW  = keptVis > 0 ? keptVis * DSS + (keptVis - 1) * 6 : 0;
    const totalW = freshW + SEP + keptW, startX = CW / 2 - totalW / 2;
    const positions = []; let x = startX;
    for (let i = 0; i < freshC; i++) { positions.push({ x, held: false }); x += DSS + 6; }
    if (SEP > 0) x = startX + freshW + SEP;
    const keptStartX = x;
    for (let i = 0; i < keptVis; i++) { positions.push({ x, held: true }); x += DSS + 6; }
    return { positions, keptStartX, keptW };
  }

  function cSlot(ci, di) { const r = cRect(ci); return { x: r.x + 6 + di * (DSS + 4), y: r.y + CARD_H - DSS - 8 }; }
  function scSlot(di)    { return { x: SC.x + 6 + di * (DSS + 4), y: SC.y + SC.h - DSS - 8 }; }

  function drawSceneBg(bgKey, darken) {
    if (bgLoaded[bgKey] && bgImgs[bgKey]) {
      const img = bgImgs[bgKey];
      // imageMode を CORNER に強制（CENTER が設定されたままでもズレない）
      p.push();
      p.imageMode(p.CORNER);
      const scale = Math.max(CW / img.width, CH / img.height);
      const iw = img.width * scale, ih = img.height * scale;
      const ix = (CW - iw) / 2, iy = (CH - ih) / 2;
      p.image(img, ix, iy, iw, ih);
      p.pop();
      // 暗幕オーバーレイ（デフォルト0.40で背景が見える明るさ）
      const d = darken !== undefined ? darken : 0.40;
      p.noStroke(); p.fill(0, 0, 0, Math.round(255 * d)); p.rect(0, 0, CW, CH);
    } else {
      p.background(8, 11, 20);
      p.stroke(22, 30, 52); p.strokeWeight(1);
      for (let x = 0; x < CW; x += 80) p.line(x, 0, x, CH);
      for (let y = 0; y < CH; y += 80) p.line(0, y, CW, y);
      p.noStroke();
    }
  }

  function drawDie(x, y, val, size, col, sel, faceDown, scale, glowCol) {

  function drawIcon(cx, cy, type, sz) {

  // ── GAME scene ──
  // ── CARD SELECT overlay (v0.40) ──
  function drawCardSelectOverlay() {
    // 暗いオーバーレイ
    p.noStroke(); p.fill(0, 0, 0, 155); p.rect(0, 0, CW, CH);

    // パネル
    p.fill(14, 18, 32); p.stroke(62, 88, 145); p.strokeWeight(2);
    p.rect(CS_PANEL_X, CS_PANEL_Y, CS_PANEL_W, CS_PANEL_H, 14);
    p.noStroke();

    // タイトル
    p.fill(175, 185, 218); p.textAlign(p.CENTER, p.TOP); p.textSize(15);
    p.text(L.cardSelectTitle(G.cardSelectChosen.size, G.cardSelectNeeded), CW / 2, CS_PANEL_Y + 14);

    // 先行・後攻バッジ
    const badge = G.isFirstPlayer ? L.cardSelectFirst : L.cardSelectSecond;
    const badgeCol = G.isFirstPlayer ? [52, 192, 108] : [192, 68, 68];
    p.fill(...badgeCol); p.rect(CS_PANEL_X + 12, CS_PANEL_Y + 10, 44, 22, 6);
    p.fill(255); p.textAlign(p.CENTER, p.CENTER); p.textSize(11);
    p.text(badge, CS_PANEL_X + 34, CS_PANEL_Y + 21);

    // 未使用カードのグリッド表示
    const unusedCards = G.pDeckCards
      .map((c, i) => ({ ...c, idx: i }))
      .filter(c => !G.pDeckUsed.has(c.idx));

    const gridStartX = CS_PANEL_X + 20;
    const gridStartY = CS_PANEL_Y + 46;

    unusedCards.forEach((c, i) => {
      const row = Math.floor(i / CS_COLS), col = i % CS_COLS;
      const cx = gridStartX + col * (CS_CARD_W + CS_CARD_GAP);
      const cy = gridStartY + row * (CS_CARD_H + CS_CARD_GAP);
      const sel = G.cardSelectChosen.has(c.idx);
      const hB  = hov(cx, cy, CS_CARD_W, CS_CARD_H);
      const tc  = typeCol(c.type);

      // カード背景
      p.fill(sel ? [22, 52, 36] : hB ? [22, 32, 54] : [16, 22, 42]);
      p.stroke(sel ? [52, 192, 108] : hB ? [72, 96, 148] : [38, 52, 82]);
      p.strokeWeight(sel ? 2 : 1);
      p.rect(cx, cy, CS_CARD_W, CS_CARD_H, 6);
      p.noStroke();

      // タイプカラー帯
      p.fill(...tc); p.rect(cx, cy, CS_CARD_W, 4, 6, 6, 0, 0);

      // カード名
      p.fill(sel ? [200, 248, 215] : [185, 198, 228]);
      p.textAlign(p.CENTER, p.CENTER); p.textSize(13);
      p.text(L.cardNames[c.key] || c.key, cx + CS_CARD_W / 2, cy + 24);

      // 効果テキスト
      p.fill(...tc); p.textSize(10);
      const eff = c.type === 'income' ? L.cardEffect.income(c.val)
                : c.type === 'invest' ? L.cardEffect.invest()
                : L.cardEffect.instant(c.val);
      p.text(eff, cx + CS_CARD_W / 2, cy + 42);

      // 選択済みチェックマーク
      if (sel) {
        p.fill(52, 192, 108, 200); p.textSize(14); p.text('✓', cx + CS_CARD_W - 14, cy + 14);
      }
    });

    // 確定ボタン
    const canConfirm = G.cardSelectChosen.size === G.cardSelectNeeded;
    const btnW = 180, btnX = CW / 2 - btnW / 2, btnY = CS_PANEL_Y + CS_PANEL_H - 54;
    const hC = hov(btnX, btnY, btnW, 42);
    p.fill(canConfirm ? (hC ? [58, 148, 78] : [36, 108, 56]) : [28, 38, 58]);
    p.rect(btnX, btnY, btnW, 42, 9);
    p.fill(canConfirm ? [202, 245, 215] : [78, 90, 120]);
    p.textAlign(p.CENTER, p.CENTER); p.textSize(15);
    p.text(L.cardSelectConfirmBtn, CW / 2, btnY + 21);

    // AIが選んだカードの枚数ヒント
    p.fill(115, 128, 165); p.textSize(11); p.textAlign(p.CENTER, p.CENTER);
    p.text(lang === 'ja'
      ? `相手は ${G.aMarketSelected.length} 枚選択済み`
      : `Opponent selected ${G.aMarketSelected.length} card(s)`,
      CW / 2, CS_PANEL_Y + CS_PANEL_H - 14);
  }

      else if (i === G.turn - 1) { p.fill(215, 200, 55); p.stroke(255, 220, 80); p.strokeWeight(1.5); }
      else                        p.fill(36, 46, 74);
      p.ellipse(dotX, 35, i === G.turn - 1 ? dotR * 2 + 2 : dotR * 2, i === G.turn - 1 ? dotR * 2 + 2 : dotR * 2);
      p.noStroke(); dotX += dotR * 2 + dotGap;
    }
    // Stage indicator (small, top-right area)
    if (RUN && RUN.totalStages) {
      p.fill(115, 128, 168); p.textSize(11); p.textAlign(p.CENTER, p.CENTER);
      p.text(L.stageLabel(RUN.currentStage, RUN.totalStages), CW / 2 - 50, 48);
    }

    drawBackBtn(); drawHelpBtn();

    // AI dice
    const adl = aDiceLayout(G.aPool.length, G.aKeepVis);
    if (G.aKeepVis > 0 && adl.keptW > 0) {
      const kx = adl.keptStartX - 6, ky = AZ.y + 10, kw = adl.keptW + 12, kh = DSS + 22;
      p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(1.5); p.rect(kx, ky, kw, kh, 8);
      p.noStroke(); p.fill(215, 172, 50); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(11); p.text(L.keepFull(G.aKeepVis), kx + kw / 2, ky + 2);
    }
    adl.positions.forEach((pos, di) => {
      drawDie(pos.x, AZ.y + 16, 0, DSS, pos.held ? [148, 112, 40] : [48, 62, 105], false, true);
      if (pos.held) { p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(2.5); p.rect(pos.x + 1, AZ.y + 17, DSS - 2, DSS - 2, 6); p.noStroke(); }
      // 索敵マーカー（scoutActive時：値レンジを表示）
      if (G.scoutActive && G.oppDiceVisible && G.oppDiceVisible[di]) {
        const marker = G.oppDiceVisible[di];
        p.noStroke(); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(13);
        if (marker === 'high') { p.fill(65, 215, 128); p.text('4↑', pos.x + DSS/2, AZ.y + 14); }
        else                   { p.fill(215, 72, 72);  p.text('3↓', pos.x + DSS/2, AZ.y + 14); }
      }
    });

    for (let i = 0; i < G.market.length; i++) drawCard(i);
    drawSpecialCard();

    // Player zone
    p.fill(58, 188, 106); p.textAlign(p.LEFT, p.TOP); p.textSize(12); p.text(L.you, 16, PZ.y + 4);
    p.textSize(30); p.text(G.pScore + 'pt', 16, PZ.y + 18);
    const pi = sum(G.pIncome); let pY = PZ.y + 52;
    if (pi > 0) { p.fill(46, 160, 84); p.textSize(11); p.text(L.incomeLabel(pi), 16, pY); pY += 14; }
    p.fill(105, 115, 158); p.textSize(11); p.text(L.dicePerTurn(G.pPerTurn), 16, pY);
    // デッキアイコンパネル（プレイヤー）
    if (G.pDeckCards) {
      const pUnused = G.pDeckCards.length - G.pDeckUsed.size;
      const pUsed   = G.pDeckUsed.size;
      const pFlash  = G.deckResetFlash.p > 0;
      p.fill(pFlash?[215,178,50]:[32,42,72]); p.stroke(pFlash?[255,215,80]:[58,78,118]); p.strokeWeight(1.5);
      p.rect(16, pY+16, 42, 28, 5); p.noStroke();
      p.fill(pFlash?[20,16,8]:[155,175,215]); p.textSize(10); p.textAlign(p.CENTER,p.CENTER);
      p.text('📦'+pUnused, 37, pY+30);
      p.fill(28,22,48); p.stroke(68,52,98); p.strokeWeight(1.5);
      p.rect(62, pY+16, 42, 28, 5); p.noStroke();
      p.fill(120,100,158); p.textSize(10); p.textAlign(p.CENTER,p.CENTER);
      p.text('🗑'+pUsed, 83, pY+30);
    }
    // アイテムスロット表示（右下・大型化）
    if (RUN && RUN.playerItems && RUN.playerItems.length > 0) {
      const items = RUN.playerItems.slice(-5);
      const iW=58, iH=52, iGap=6, iStartX=CW-16-(items.length*(iW+iGap)), iY=PZ.y+8;
      p.fill(18,24,48); p.stroke(48,64,102); p.strokeWeight(1);
      p.rect(iStartX-8,iY-4,items.length*(iW+iGap)+8,iH+8,8); p.noStroke();
      p.fill(108,120,165); p.textSize(10); p.textAlign(p.LEFT,p.CENTER);
      p.text(lang==='ja'?'アイテム':'Items', iStartX-6, iY-12);
      items.forEach((key,ii)=>{
        const ix=iStartX+ii*(iW+iGap);
        const hI=hov(ix,iY,iW,iH);
        p.fill(hI?[52,68,108]:[30,42,72]); p.stroke(hI?[88,118,178]:[58,78,118]); p.strokeWeight(1.5);
        p.rect(ix,iY,iW,iH,6); p.noStroke();
        const nm=(L.draftItemNames&&L.draftItemNames[key]||key);
        p.fill(hI?[225,235,255]:[175,188,225]); p.textSize(12); p.textAlign(p.CENTER,p.CENTER);
        // 2行に折り返す
        const nm1=nm.length>4?nm.slice(0,4):nm;
        const nm2=nm.length>4?nm.slice(4):'';
        p.text(nm1, ix+iW/2, iY+(nm2?iH/2-8:iH/2));
        if(nm2) p.text(nm2, ix+iW/2, iY+iH/2+8);
      });
    }
    // Player NPC name + passiveスキルインジケーター
    if (RUN && RUN.playerNPC !== undefined) {
      p.fill(95, 148, 105); p.textSize(10); p.textAlign(p.LEFT, p.TOP);
      p.text(L.partnerLabel(L.npcNames[RUN.playerNPC]), 16, pY + 50);
      // 扇灯のランタンの灯り（passive）インジケーター
      if (RUN.playerNPC === 1) {
        p.fill(108,172,248,200); p.textSize(9); p.textAlign(p.LEFT,p.TOP);
        p.text(lang==='ja'?'◉ ランタン有効':'◉ Lantern', 16, pY+64);
      }
    }

    // 扇灯のX線透視：カードの相手割り当て数を表示
    if (G.sentoXrayActive && G.phase === 'ASSIGN') {
      G.market.forEach((c, i) => {
        const r = cRect(i);
        const aCount = G.aPool.filter(d => d.card === i).length; // AIの割当数
        p.fill(108,172,248,200); p.noStroke(); p.textSize(13); p.textAlign(p.RIGHT,p.TOP);
        p.text(`相手:${aCount}個`, r.x+r.w-6, r.y+6);
      });
    }

    // Instructions
    const showInstr = ['ASSIGN', 'EFFECT_ANIM', 'SWAP_SELECT', 'ROLLING'].includes(G.phase);
    if (showInstr) {
      let instrTxt = '', instrCol = [135, 145, 182];
      if      (G.phase === 'ROLLING')     { instrTxt = L.rolling;          instrCol = [145, 155, 195]; }
      else if (G.phase === 'EFFECT_ANIM') { instrTxt = L.tapContinue;      instrCol = [215, 185, 65];  }
      else if (G.phase === 'SWAP_SELECT') { instrTxt = L.swapSelectInstr;  instrCol = [215, 165, 50];  }
      else if (G.selSet.size > 0)         { instrTxt = L.instrSel(G.selSet.size); instrCol = [255, 198, 42]; }
      else                                  instrTxt = L.instrNone;
      p.fill(...instrCol); p.textAlign(p.CENTER, p.TOP); p.textSize(13); p.text(instrTxt, CW / 2 - 40, PZ.y + 6);
    }

    // Player dice
    const allUnass = G.pDice.filter(d => d.card === null);
    const keptD = allUnass.filter(d => !d.fresh), freshD = allUnass.filter(d => d.fresh);
    const pdl = pDiceLayout(freshD, keptD);
    pdl.keptBoxes.forEach(box => {
      p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(1.5); p.rect(box.x, box.y, box.w, box.h, 9);
      p.noStroke(); p.fill(215, 172, 50); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(11); p.text(L.keepFull(keptD.length), box.x + box.w / 2, box.y + 2);
    });
    if (pdl.overflow) { p.fill(212, 155, 50); p.textAlign(p.CENTER, p.TOP); p.textSize(12); p.text(`+${allUnass.length - D_MAXCOLS * 2}…`, CW / 2, PZ.y + 72 + (DS + D_GAP + 4) * 2); }
    if (isDragging && dragS && dragE) { p.noFill(); p.stroke(255, 202, 38, 148); p.strokeWeight(1.5); p.rect(Math.min(dragS.x, dragE.x), Math.min(dragS.y, dragE.y), Math.abs(dragE.x - dragS.x), Math.abs(dragE.y - dragS.y)); }

    pdl.positions.forEach((pos, pi2) => {
      const d = pi2 < pdl.kC ? keptD[pi2] : freshD[pi2 - pdl.kC]; if (!d) return;
      const idx = G.pDice.indexOf(d);
      const dv = d.rollF > 0 ? rng(1, 6) : d.val;
      const sc = d.bounceF > 0 ? (1 + d.bounceF * 0.045) : 1;
      const isHighlighted = G.effectHighlights.includes(idx);
      const isSwapTarget  = G.phase === 'SWAP_SELECT';
      const isSwapEligible = isSwapTarget && !pos.isKept;
      const hoverSwap = isSwapEligible && hov(pos.x, pos.y, DS, DS);
      const isSwapAnimating = G.swapAnim && G.swapAnim.active && G.swapAnim.dieIdx === idx;
      const swapPulse = isSwapAnimating ? (Math.sin(G.swapAnim.timer * 0.25) * 0.5 + 0.5) : 0;
      let glowCol = null;
      if (isSwapAnimating)    glowCol = [215, 140 + (swapPulse * 80 | 0), 50];
      else if (d.floored)     glowCol = [65, 215, 128];  // 出目底上げ：緑グロー
      else if (isHighlighted) glowCol = d.val === 6 ? [215, 172, 50] : d.val === 1 ? [215, 80, 80] : null;
      const dieCol = pos.isKept ? [155, 118, 42] : isSwapTarget ? [155, 88, 32] : [58, 108, 192];
      const bounceSc = isSwapAnimating ? (1 + swapPulse * 0.12) * sc : sc;
      drawDie(pos.x, pos.y, dv, DS, dieCol, G.selSet.has(idx) || hoverSwap, false, bounceSc, glowCol);
      if (pos.isKept) { p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(2.5); p.rect(pos.x + 1, pos.y + 1, DS - 2, DS - 2, 7); p.noStroke(); }
      if (isHighlighted && !isSwapAnimating) { p.fill(215, 178, 50, 180); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(10); p.text(d.val === 6 ? '★' : '▼', pos.x + DS / 2, pos.y - 2); }
      // 出目底上げインジケーター（緑の+1↑マーカー）
      if (d.floored && d.rollF === 0) { p.noStroke(); p.fill(65, 215, 128, 220); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(12); p.text('+1↑', pos.x + DS / 2, pos.y - 2); }
      if (hoverSwap) { p.noFill(); p.stroke(215, 142, 50); p.strokeWeight(2.5); p.rect(pos.x - 2, pos.y - 2, DS + 4, DS + 4, 9); p.noStroke(); p.fill(215, 165, 50, 200); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(12); p.text('⇄', pos.x + DS / 2, pos.y - 3); }
    });

    // Effect anim overlay
    if (G.phase === 'EFFECT_ANIM' && G.effectAnimMsgs.length > 0) {
      const prog = clamp(G.effectAnimTimer / EFFECT_ANIM_FRAMES, 0, 1);
      p.fill(0, 0, 0, prog * 120); p.noStroke(); p.rect(0, CARD_Y - 10, CW, CARD_H + 20);
      G.effectAnimMsgs.forEach((msg, i) => {
        p.fill(215, 178, 50, prog * 255); p.textAlign(p.CENTER, p.CENTER); p.textSize(30);
        p.textFont('Mochiy Pop One, sans-serif'); p.text(msg, CW / 2, CH / 2 - 30 + i * 42); p.textFont('sans-serif');
      });
      p.fill(175, 165, 130, prog * 180); p.textSize(14); p.textAlign(p.CENTER, p.CENTER); p.text(L.tapContinue, CW / 2, CH / 2 + 50);
    }

    // Floating texts
    G.floatingTexts.forEach(ft => {
      p.noStroke(); p.fill(ft.col[0], ft.col[1], ft.col[2], ft.alpha);
      p.textAlign(p.CENTER, p.CENTER); p.textSize(ft.size);
      p.textFont('Mochiy Pop One, sans-serif'); p.text(ft.txt, ft.x, ft.y); p.textFont('sans-serif');
    });

    // Action buttons
    if (G.phase === 'ASSIGN') {
      const hC = hov(CW / 2 - 108, CH - 42, 216, 34);
      p.fill(hC ? [58, 148, 78] : [36, 108, 56]); p.rect(CW / 2 - 108, CH - 42, 216, 34, 9);
      p.fill(202, 245, 215); p.textAlign(p.CENTER, p.CENTER); p.textSize(15); p.text(L.confirmBtn, CW / 2, CH - 25);
    }
    if (G.phase === 'TURN_END') {
      const isLast = G.turn >= G.totalTurns;
      const lbl = isLast ? L.stageEndBtn : L.nextBtn;
      const hN = hov(CW / 2 - 108, CH - 42, 216, 34);
      p.fill(hN ? [55, 95, 172] : [36, 65, 138]); p.rect(CW / 2 - 108, CH - 42, 216, 34, 9);
      p.fill(202, 218, 255); p.textAlign(p.CENTER, p.CENTER); p.textSize(15); p.text(lbl, CW / 2, CH - 25);
    }
    if (G.phase === 'TIEBREAK' && G.tb) drawTiebreak();
    if (G.phase === 'CARD_SELECT') drawCardSelectOverlay();
    // 封鎖カード選択オーバーレイ
    if (G.blockadeSelectMode) {
      // 封鎖：画面全体の赤オーバーレイなし・案内バナーのみ
      p.noStroke(); p.fill(16,22,42,220);
      p.rect(CARD_Y-10, TB_H, CW, 38); // カード上部に帯
      p.fill(16,22,42); p.stroke(192,68,68); p.strokeWeight(2);
      p.rect(CW/2-240,CARD_Y-52,480,42,10); p.noStroke();
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(255,168,168); p.textAlign(p.CENTER,p.CENTER); p.textSize(15);
      p.text(lang==='ja'?'🚫 封鎖するカードをクリックしてください':'🚫 Click a card to blockade', CW/2, CARD_Y-31);
      p.textFont('sans-serif');
      // 各カードに🚫マーク＋枠
      for (let i=0; i<G.market.length; i++) {
        const r=cRect(i); const hB=hov(r.x,r.y,r.w,r.h);
        p.noFill(); p.stroke(hB?[255,80,80]:[192,68,68]); p.strokeWeight(hB?3:1.5);
        p.rect(r.x-2,r.y-2,r.w+4,r.h+4,12);
        p.noStroke(); p.fill(hB?[255,100,100]:[192,68,68]); p.textSize(hB?20:16); p.textAlign(p.CENTER,p.CENTER);
        p.text('🚫', r.x+r.w/2, r.y+r.h/2);
      }
    }
    // 六の目ダイス選択オーバーレイ
    if (G.sixSelectMode) {
      p.noStroke(); p.fill(16,22,42,200);
      p.rect(PZ.y-10, 0, CW, 48);
      p.fill(16,22,42); p.stroke(215,178,50); p.strokeWeight(2);
      p.rect(CW/2-220,PZ.y-50,440,42,10); p.noStroke();
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(255,220,80); p.textAlign(p.CENTER,p.CENTER); p.textSize(15);
      p.text(lang==='ja'?'★ 6にするダイスをクリックしてください':'★ Click a die to set to 6', CW/2, PZ.y-29);
      p.textFont('sans-serif');
    }
    // 封印・強化カード選択オーバーレイ
    if (G.sealSelectMode) {
      const isSeal = G.sealSelectMode === 'seal';
      const col = isSeal ? [148,58,218] : [78,148,218];
      const icon = isSeal ? '🔒' : '⚡';
      p.fill(16,22,42); p.stroke(...col); p.strokeWeight(2);
      p.rect(CW/2-240,CARD_Y-52,480,42,10); p.noStroke();
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(...col); p.textAlign(p.CENTER,p.CENTER); p.textSize(15);
      p.text((lang==='ja'?(isSeal?`${icon} 封印するカードをクリック`:`${icon} 強化するカードをクリック`):(isSeal?`${icon} Click card to seal`:`${icon} Click card to enhance`)), CW/2, CARD_Y-31);
      p.textFont('sans-serif');
      for (let i=0;i<G.market.length;i++) {
        const r=cRect(i); const hB=hov(r.x,r.y,r.w,r.h);
        p.noFill(); p.stroke(hB?[...col]:[...col,150]); p.strokeWeight(hB?3:1.5);
        p.rect(r.x-2,r.y-2,r.w+4,r.h+4,12);
        p.noStroke(); p.textSize(hB?22:16); p.textAlign(p.CENTER,p.CENTER);
        p.fill(...col); p.text(icon, r.x+r.w/2, r.y+r.h/2);
      }
    }
    // v0.3.3: スキルパネル（ASSIGN時のみ）
    if (G.phase === 'ASSIGN') drawSkillPanel();
    if (G.phase === 'ASSIGN') { drawSkillTooltip(); drawItemTooltip(); }
    // v0.40: カード詳細ホバーポップアップ
    if (['ASSIGN','ROLLING','EFFECT_ANIM'].includes(G.phase)) drawCardHoverPopup();
    if (G.itemUseDialog) drawItemUseDialog();
    if (G.deckPopup) drawDeckPopup();
    // v0.40: スキルフラッシュ
    if (G.skillFlash && G.skillFlash.alpha > 0) {
      const sf = G.skillFlash;
      p.noStroke(); p.fill(sf.col[0],sf.col[1],sf.col[2],sf.alpha*0.3); p.rect(0,0,CW,CH);
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(sf.col[0],sf.col[1],sf.col[2],sf.alpha); p.textAlign(p.CENTER,p.CENTER); p.textSize(38);
      p.text(sf.txt, sf.x, sf.y); p.textFont('sans-serif');
    }
    // v0.40: ステージ開始バナー（スキルリセット通知）
    if (G.stageStartBanner > 0 && G.turn === 0) {
      const prog = Math.min(1, G.stageStartBanner / 30);
      const alpha = Math.min(255, G.stageStartBanner * 6);
      p.noStroke(); p.fill(16,22,42,alpha*0.85); p.rect(CW/2-240,CH/2-30,480,60,12);
      p.fill(108,188,148,alpha); p.textAlign(p.CENTER,p.CENTER); p.textSize(14);
      const npcName = RUN ? L.npcNames[RUN.playerNPC] : '';
      p.text(lang==='ja'?`✦ ステージ${RUN?RUN.currentStage:''}開始 — ${npcName}のスキルがリセットされました`:`✦ Stage ${RUN?RUN.currentStage:''} — ${npcName}'s skills reset`, CW/2, CH/2);
    }
    if (helpOpen) drawHelp();
  }

  // ── デッキポップアップ ──
  function drawDeckPopup() {
    const who = G.deckPopup;
    if (!G.pDeckCards) return;
    // 扇灯パッシブ：相手デッキの未使用カード名を表示可能
    const sentoPassive = RUN && RUN.playerNPC === 1;
    const deck = who==='p' ? G.pDeckCards : G.aDeckCards;
    const used = who==='p' ? G.pDeckUsed  : G.aDeckUsed;
    const unusedCards = deck.map((c,i)=>({...c,idx:i})).filter(c=>!used.has(c.idx));
    const usedCards   = deck.map((c,i)=>({...c,idx:i})).filter(c=>used.has(c.idx));
    const pw=640,ph=400,px=CW/2-pw/2,py=CH/2-ph/2;
    p.fill(0,0,0,155); p.noStroke(); p.rect(0,0,CW,CH);
    p.fill(14,18,32); p.stroke(58,82,138); p.strokeWeight(2);
    p.rect(px,py,pw,ph,14); p.noStroke();
    p.textFont('Mochiy Pop One, sans-serif');
    p.fill(who==='p'?[65,188,128]:[182,85,85]); p.textAlign(p.CENTER,p.CENTER); p.textSize(16);
    const deckTitle = L.deckPopupTitle+(who==='p'?'（自分）':'（相手）');
    // 扇灯ランタンラベル
    const showLantern = sentoPassive && who==='a';
    p.text(deckTitle+(showLantern?(' 🔦 '+L.skill_sento_lantern_name):''), CW/2, py+22); p.textFont('sans-serif');
    // 相手デッキで扇灯パッシブなし → カード名を隠す
    const hideNames = (who==='a' && !sentoPassive);
    // 未使用
    p.fill(65,188,128); p.textSize(13); p.textAlign(p.LEFT,p.TOP);
    p.text(L.deckPopupUnused+'（'+unusedCards.length+'）', px+14, py+44);
    // U1: カード枠拡大・特別効果表示

        const eff=c.type==='income'?L.cardEffect.income(c.val):c.type==='invest'?L.cardEffect.invest():L.cardEffect.instant(c.val);

            oppPtMinus:lang==='ja'?'相手-15pt':'Opp-15pt' };

          p.text('◆ '+(shortEff[c.effect]||c.effect), cx+cw/2, cy+35);

      p.text(L.cardNames[c.key]||c.key, cx+cw/2, cy+5);

      const eff=c.type==='income'?L.cardEffect.income(c.val):c.type==='invest'?L.cardEffect.invest():L.cardEffect.instant(c.val);
      p.text(eff, cx+cw/2, cy+20);
    });
    const cbx=CW/2-60,cby=py+ph-44;
    const hC=hov(cbx,cby,120,34);
    p.fill(hC?[52,68,112]:[30,42,78]); p.rect(cbx,cby,120,34,8);
    p.fill(175,188,225); p.textAlign(p.CENTER,p.CENTER); p.textSize(14);
    p.text(L.deckPopupClose, CW/2, cby+17);

  // ── v0.3.3: NPCスキルパネル描画 ─────────────────────────────
  // ── v0.40: NPCスキルパネル描画（右下・大型化）──
  function drawSkillPanel() {
    const npcIdx = RUN ? RUN.playerNPC : 0;
    const defs = (NPC_SKILL_DEFS[npcIdx] || []).filter(d => d.type !== 'passive');
    if (defs.length === 0) return;

    const btnW = 218, btnH = 46, gap = 5;
    const panelH = defs.length * (btnH + gap) - gap + 16;
    const r0 = skillBtnRect(0);
    const panelX = r0.x - 4, panelY = r0.y - 6;

    // パネル背景
    p.fill(10,14,28,210); p.stroke(48,60,98); p.strokeWeight(1.5);
    p.rect(panelX, panelY, btnW+8, panelH+12, 10);
    p.noStroke();
    // ラベル
    p.fill(148,162,205); p.textSize(11); p.textAlign(p.LEFT,p.TOP);
    p.text((L.npcNames[npcIdx]||'')+'  '+L.skillLabel, panelX+6, panelY+2);

    defs.forEach((def, i) => {
      const r = skillBtnRect(i);
      const charges = G.skillCharges[def.key];
      const usable  = canUseSkill(def.key);
      const isActive = G.skillActive[def.key];
      const isSelect = G.skillSelectMode && G.skillSelectMode.key === def.key;
      const hB = hov(r.x, r.y, r.w, r.h);

      let bgCol = [18,24,48], borderCol = [42,52,88];
      if (isSelect)      { bgCol=[42,28,72]; borderCol=[178,148,228]; }
      else if (isActive) { bgCol=[28,42,28]; borderCol=[52,192,108]; }
      else if (!usable)  { bgCol=[16,18,28]; borderCol=[32,38,58]; }
      else if (hB)       { bgCol=[32,42,72]; borderCol=[95,118,195]; }

      p.fill(...bgCol); p.stroke(...borderCol); p.strokeWeight(usable?2:1);
      p.rect(r.x, r.y, r.w, r.h, 7); p.noStroke();

      const tCol = def.type==='enhanced' ? [215,165,45] : [78,148,218];
      p.fill(...tCol); p.rect(r.x, r.y, 5, r.h, 3,0,0,3);

      const skillName = L[def.nameKey] || def.key;
      p.fill(usable?[220,225,255]:[95,102,138]); p.textSize(14); p.textAlign(p.LEFT,p.CENTER);
      p.text(skillName, r.x+12, r.y+r.h/2 - (def.type==='enhanced'?7:0));

      if (def.type === 'enhanced') {
        const hasPt = G.pScore >= def.cost;
        p.fill(hasPt?[215,178,50]:[175,85,85]); p.textSize(11); p.textAlign(p.LEFT,p.CENTER);
        p.text(L.skillCostLabel(def.cost), r.x+12, r.y+r.h/2+8);
      }
      if (charges === 0) {
        p.fill(82,88,115); p.textSize(11); p.textAlign(p.RIGHT,p.CENTER);
        p.text(L.skillUsed, r.x+r.w-10, r.y+r.h/2);
      } else if (charges > 0) {
        p.fill(usable?[108,188,148]:[70,90,115]); p.textSize(11); p.textAlign(p.RIGHT,p.CENTER);
        p.text(L.skillCharges(charges), r.x+r.w-10, r.y+r.h/2);
      }
    });

    // 選択モード案内
    if (G.skillSelectMode) {
      const def = G.skillSelectMode.def;
      const msg = def.target==='card'    ? (lang==='ja'?'▶ カードをクリック':'▶ Click a card') :
                  def.target==='die_both'? (lang==='ja'?'▶ 自分のダイスをクリック':'▶ Click your die') :
                  def.target==='die_any' ? (lang==='ja'?'▶ ダイスをクリック':'▶ Click a die') : '';
      if (msg) {
        const by = panelY + panelH + 12;
        p.noStroke(); p.fill(42,28,72,220); p.rect(panelX, by, btnW+8, 32, 8);
        p.fill(200,168,248); p.textSize(12); p.textAlign(p.CENTER,p.CENTER);
        p.text(msg, panelX+(btnW+8)/2, by+16);
      }
    }
  }

  // ── v0.40: カード詳細ホバーポップアップ（改善版）──
  function drawCardHoverPopup() {
    if (!G.market) return;
    let hovCard = null, hovR = null;
    for (let i = 0; i < G.market.length; i++) {
      const r = cRect(i);
      if (hov(r.x, r.y, r.w, r.h)) { hovCard = G.market[i]; hovR = r; break; }
    }
    if (!hovCard && G.specialCard) {
      const r = SC;
      if (hov(r.x, r.y, r.w, r.h)) { hovCard = { ...G.specialCard, isSpecialSlot: true }; hovR = r; }
    }
    if (!hovCard) return;

    const hasEffect = hovCard.effect && hovCard.isSpecial;
    const hasTarget = hasEffect && (hovCard.effect==='maxOnly'||hovCard.effect==='minOnly') && hovCard.targetVal!=null;
    const pw = 240;
    const ph = hasEffect ? 165 : 120;
    let px = hovR.x + hovR.w + 8;
    let py = hovR.y;
    if (px + pw > CW - 10) px = hovR.x - pw - 8;
    if (py + ph > CH - 10) py = CH - ph - 10;

    p.fill(12,16,32,240); p.stroke(62,82,138); p.strokeWeight(1.5);
    p.rect(px, py, pw, ph, 10); p.noStroke();

    p.textFont('Mochiy Pop One, sans-serif');
    if (hovCard.isSpecialSlot) {
      p.fill(200,148,255); p.textAlign(p.LEFT,p.TOP); p.textSize(15);
      p.text(L.specialNames[hovCard.effectType]||hovCard.effectType, px+10, py+12);
      p.textFont('sans-serif');
      p.fill(168,128,215); p.textSize(12); p.textAlign(p.LEFT,p.TOP);
      p.text(L.specialDescs[hovCard.effectType]||'', px+10, py+36, pw-20, 70);
    } else {
      const tc = typeCol(hovCard.type);
      p.fill(...tc); p.textAlign(p.LEFT,p.TOP); p.textSize(15);
      p.text(L.cardNames[hovCard.key]||hovCard.key, px+10, py+12);
      p.textFont('sans-serif');
      const effStr = hovCard.type==='income'?L.cardEffect.income(hovCard.val):
                     hovCard.type==='invest'?L.cardEffect.invest():
                     L.cardEffect.instant(hovCard.val);
      p.fill(175,188,225); p.textSize(13); p.textAlign(p.LEFT,p.TOP);
      p.text(effStr, px+10, py+35);
      // 変化効果（左寄せ・drawMultilineTextをLEFT ALIGNで）
      if (hasEffect) {
        const eName = (L.specialCardEffectNames&&L.specialCardEffectNames[hovCard.effect])||hovCard.effect;
        const eDesc = (L.specialCardEffectDescs&&L.specialCardEffectDescs[hovCard.effect])||'';
        p.noStroke(); p.fill(32,22,52); p.rect(px+8, py+58, pw-16, hasTarget?78:62, 6);
        p.fill(178,148,228); p.textSize(12); p.textAlign(p.LEFT,p.TOP);
        p.text('◆ '+eName, px+14, py+64);
        if (hasTarget) {
          p.fill(215,178,50); p.textSize(13);
          p.text((lang==='ja'?'目標値: ':'Target: ')+hovCard.targetVal, px+14, py+82);
        }
        p.fill(155,128,200); p.textSize(11); p.textAlign(p.LEFT,p.TOP);
        // \nで分割して左寄せ描画
        (eDesc||'').split('\n').forEach((line,li)=>{
          p.text(line, px+14, py+(hasTarget?102:82)+li*15, pw-28, 30);
        });
      }
      // オーナー
      const owner = hovCard.owner==='p'?L.you:L.opp;
      const oc = hovCard.owner==='p'?[52,192,108]:[182,85,85];
      p.fill(...oc,180); p.textSize(10); p.textAlign(p.RIGHT,p.BOTTOM);
      p.text(owner+(lang==='ja'?'のカード':"'s card"), px+pw-8, py+ph-6);
    }
  }
