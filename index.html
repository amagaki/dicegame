  function drawTiebreak() {
    const tb = G.tb, rolling = tb.rollF > 0;
    p.fill(0, 0, 0, 162); p.noStroke(); p.rect(0, 0, CW, CH);
    p.fill(16, 22, 38); p.stroke(90, 110, 168); p.strokeWeight(2); p.rect(CW / 2 - 330, CH / 2 - 185, 660, 370, 14);
    p.noStroke(); p.fill(202, 168, 50); p.textAlign(p.CENTER, p.CENTER); p.textSize(19); p.text(L.tbTitle(tb.displayName), CW / 2, CH / 2 - 155);
    const dS = 60, dGap = 16, gW = 3 * dS + 2 * dGap, pSX = CW / 2 - 40 - gW, aSX = CW / 2 + 40, diceY = CH / 2 - 82;
    p.fill(65, 188, 125); p.textSize(16); if (!rolling) p.text(L.tbYouScore(tb.pt), CW / 2 - 40 - gW / 2, diceY - 22);
    p.fill(182, 85, 85); if (!rolling) p.text(L.tbOppScore(tb.at), CW / 2 + 40 + gW / 2, diceY - 22);
    tb.pD.forEach((v, i) => drawDie(pSX + i * (dS + dGap), diceY, rolling ? rng(1, 6) : v, dS, [58, 108, 192], false, false));
    p.fill(148, 158, 200); p.textSize(24); p.textAlign(p.CENTER, p.CENTER); p.text('VS', CW / 2, diceY + dS / 2);
    tb.aD.forEach((v, i) => drawDie(aSX + i * (dS + dGap), diceY, rolling ? rng(1, 6) : v, dS, [152, 65, 65], false, false));
    if (tb.showResult) {
      p.textSize(24);
      if      (tb.res === 'p') { p.fill(68, 215, 130); p.text(L.tbWinP,  CW / 2, CH / 2 + 52); }
      else if (tb.res === 'a') { p.fill(212, 82, 82);  p.text(L.tbWinA,  CW / 2, CH / 2 + 52); }
      else                      { p.fill(208, 175, 52); p.text(L.tbAgain, CW / 2, CH / 2 + 52); }
    }
    if (tb.showBtn) {
      const lbl = tb.res === 'again' ? L.tbRetry : L.tbContinue;
      const bx = CW / 2 - 92, by = CH / 2 + 86;
      const hB = hov(bx, by, 184, 40);
      p.fill(hB ? [52, 92, 168] : [34, 64, 135]); p.rect(bx, by, 184, 40, 9);
      p.fill(202, 218, 255); p.textAlign(p.CENTER, p.CENTER); p.textSize(17); p.text(lbl, CW / 2, by + 20);
    }
  }

  // ── STAGE RESULT scene ──
  // ── DRAFT scene ──
  function drawDraft() {
    drawSceneBg('bg_draft', 0.50);

    const ds = DS_STATE;
    const isTagPhase  = ds.phase === 'TAG_SELECT';
    const isBidPhase  = ds.phase === 'BID_SELECT';
    const isRevealed  = ['REVEALED','PRIORITY_CHOICE','DONE','TIEBREAK'].includes(ds.phase);
    const showAISlot  = isBidPhase || isRevealed; // TAG_SELECTではAI割当先非表示

    // ── 左サイドパネル（タイトル・フェーズ・Pt・タグを縦積み）──
    // 薄い背景
    p.noStroke(); p.fill(12,16,32,200);
    p.rect(0,0,DRAFT_PANEL_W,CH);
    p.stroke(32,42,72); p.strokeWeight(1); p.line(DRAFT_PANEL_W,0,DRAFT_PANEL_W,CH);
    p.noStroke();

    // タイトル
    p.textFont('Mochiy Pop One, sans-serif');
    p.fill(52,192,108); p.textAlign(p.LEFT,p.TOP); p.textSize(16);
    p.text(ds.isInitialDraft ? L.initialDraftTitle : L.draftSceneTitle, 8, 8);
    p.textFont('sans-serif');

    // フェーズ
    const phaseTxt = isTagPhase ? L.draftTagSelectTitle : isBidPhase ? L.draftBidPhaseTitle : '';
    if (phaseTxt) {
      p.fill(175,185,220); p.textSize(10); p.textAlign(p.LEFT,p.TOP);
      // 長い文字列は折り返して表示
      const phLines = phaseTxt.split(/(.{10})/g).filter(Boolean);
      phLines.forEach((l,i)=>p.text(l,8,30+i*14));
    }

    // Pt残り
    const ptUsed = Object.values(ds.playerBids).reduce((s,v)=>s+v,0);
    const ptRemain = ds.playerPt - ptUsed;
    p.fill(215,178,50); p.textSize(13); p.textAlign(p.LEFT,p.TOP);
    p.text(L.draftPtRemain(ptRemain), 8, 72);

    // プレイヤータグ（2列表示・あなた（NPC名）のタグ）
    if (!isRevealed) {
      const remTags = ds.playerTags.filter(t=>!t.used);
      const pNpcName = RUN && RUN.playerNPC !== undefined ? L.npcNames[RUN.playerNPC] : '';
      // ラベル：「あなた（茶々）のタグ」
      p.fill(65,188,128); p.textSize(10); p.textAlign(p.LEFT,p.TOP);
      p.text(lang==='ja'?`あなた（${pNpcName}）`:`You (${pNpcName})`, 8, 92);
      p.fill(148,162,205); p.textSize(9); p.text(lang==='ja'?'のタグ残り:':'tags left:', 8, 103);
      remTags.forEach((t,ti)=>{
        const col=ti%2, row=Math.floor(ti/2);
        const tx=8+col*58, ty=116+row*24;
        const tc=t.mult>=2?[168,88,218]:[58,108,195];
        p.fill(...tc); p.rect(tx,ty,52,18,4);
        p.fill(230,240,255); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
        p.text(t.mult>=2?'×2.0':'×1.5', tx+26, ty+9);
      });

      // 区切り線
      const sepY = 116 + Math.ceil(ds.playerTags.length/2)*24 + 6;
      p.stroke(42,52,82); p.strokeWeight(1); p.line(4, sepY, DRAFT_PANEL_W-4, sepY); p.noStroke();

      // AIタグ（2列表示・相手（NPC名）のタグ）
      const allAITags = ds.aiTagsAvail;
      const aiNpcName = RUN && RUN.aiNPC !== undefined ? L.npcNames[RUN.aiNPC] : '';
      const aiCharName = L.aiCharNames ? L.aiCharNames[CFG.aiChar] : '';
      const aiY0 = sepY + 18;
      p.fill(182,85,85); p.textSize(10); p.textAlign(p.LEFT,p.TOP);
      p.text(lang==='ja'?`相手（${aiNpcName}）`:`Opp (${aiNpcName})`, 8, aiY0);
      p.fill(148,90,210); p.textSize(9); p.text(lang==='ja'?'のタグ残り:':'tags left:', 8, aiY0+11);
      allAITags.forEach((t,ti)=>{
        const col=ti%2, row=Math.floor(ti/2);
        const tx=8+col*58, ty=aiY0+24+row*24;
        const tc=t.mult>=2?[118,38,188]:[28,68,155];
        p.fill(...tc); p.rect(tx,ty,52,18,4);
        p.fill(215,225,255); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
        p.text(t.mult>=2?'A×2.0':'A×1.5', tx+26, ty+9);
      });
    }

    // ── スロットグリッド ──
    ds.slots.forEach((slot,i)=>{
      const r=draftSlotRect(i);
      const bid=ds.playerBids[slot.id]||0;
      const aiBid=ds.aiBids[slot.id]||0;
      const winner=ds.winners[slot.id];
      const tm=ds.slotTagMap[slot.id]||{};
      const pMult=tm.pMult||null;
      const aMult=tm.aMult||null;
      const isFixed=['priority','dice','special'].includes(slot.kind);
      const hB=hov(r.x,r.y,DRAFT_SLOT_W,DRAFT_SLOT_H);

      // 背景
      let bgCol=[16,22,42],borderCol=[38,52,82];
      if(winner==='p'&&isRevealed){bgCol=[16,42,26];borderCol=[52,192,108];}
      else if(winner==='a'&&isRevealed){bgCol=[38,16,16];borderCol=[192,68,68];}
      else if(pMult){borderCol=pMult>=2?[168,88,218]:[58,108,195];}
      else if(hB&&!isRevealed){bgCol=[22,30,52];borderCol=[72,96,148];}
      p.fill(...bgCol); p.stroke(...borderCol); p.strokeWeight(isFixed?2:1.5);
      p.rect(r.x,r.y,DRAFT_SLOT_W,DRAFT_SLOT_H,10); p.noStroke();

      // 種別ストライプ
      const sc=slot.kind==='priority'?[215,178,50]:slot.kind==='dice'?[78,132,218]:slot.kind==='special'?[168,88,218]:[88,100,138];
      p.fill(...sc); p.rect(r.x,r.y,DRAFT_SLOT_W,4,10,10,0,0);

      // スロット名（タグボタンの下）

      // アイテムはdesc()で\n改行済みのため追加レンダリング不要

      // 入札UI（スロット下部）
      const bidY=r.y+DRAFT_SLOT_H-60;
      p.fill(18,24,42); p.rect(r.x+6,bidY,DRAFT_SLOT_W-12,50,6);
      if(!isRevealed){
        const btnW=28,btnH=24,mX=r.x+10,pX=r.x+DRAFT_SLOT_W-38,bY=bidY+8;

        p.fill(hP?[55,72,112]:[30,42,78]); p.rect(pX,bY,btnW,btnH,4);
        p.fill(175,188,225); p.textSize(18); p.textAlign(p.CENTER,p.CENTER);
        p.text('−',mX+btnW/2,bY+btnH/2); p.text('+',pX+btnW/2,bY+btnH/2);
        const effBid=pMult?Math.round(bid*pMult):bid;
        p.fill(isBidPhase?[215,220,248]:[108,120,158]); p.textSize(22); p.textAlign(p.CENTER,p.CENTER);
        p.text(bid, r.x+DRAFT_SLOT_W/2, bY+btnH/2);
        if(pMult){
          p.fill(pMult>=2?[200,140,255]:[140,180,255]); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
          p.text('→ '+effBid+'pt (×'+pMult+')', r.x+DRAFT_SLOT_W/2, bidY+42);
        } else {
          p.fill(58,70,105); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
          p.text(L.draftBidLabel, r.x+DRAFT_SLOT_W/2, bidY+42);
        }
      } else {
        const effBid=ds.effectivePBids?(ds.effectivePBids[slot.id]||bid):bid;
        p.fill(65,188,128); p.textSize(14); p.textAlign(p.LEFT,p.CENTER);
        p.text(L.draftBidLabel+': '+effBid+'pt', r.x+10, bidY+18);
        p.fill(182,85,85); p.textAlign(p.LEFT,p.CENTER);
        p.text(L.draftOppBidLabel+': '+aiBid+'pt', r.x+10, bidY+36);
        if(winner&&winner!=='tie'){
          const wc=winner==='p'?[52,192,108]:[192,68,68];

          p.fill(...wc); p.rect(r.x+DRAFT_SLOT_W-62,r.y+34,56,20,6);

      // プレイヤータグボタン（スロット左上）
      const pbr=draftTagBtnRect(i,'p');
      const hasPTag=!!pMult;
      const canAssign=ds.playerTags.filter(t=>!t.used).length>0&&!hasPTag;
      p.fill(hasPTag?(pMult>=2?[148,58,218]:[38,88,175]):(hB&&canAssign&&isTagPhase?[55,72,125]:[24,32,58]));
      p.stroke(hasPTag?(pMult>=2?[200,120,255]:[90,150,255]):[48,62,100]); p.strokeWeight(hasPTag?2:1);
      p.rect(pbr.x,pbr.y,pbr.w,pbr.h,4); p.noStroke();
      p.fill(hasPTag?[235,248,255]:(canAssign&&isTagPhase?[155,175,215]:[55,65,90]));
      p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
      p.text(hasPTag?'P×'+pMult:(canAssign&&isTagPhase?'タグ':'−'), pbr.x+pbr.w/2, pbr.y+pbr.h/2);

      // AIタグ：BID_SELECT以降のみ割当先を表示、TAG_SELECTは枚数のみ

      p.fill(248,205,205); p.text(L.draftChooseSecond,sx+bw/2,by2+bh/2);

    // タイブレークオーバーレイ
    if(ds.phase==='TIEBREAK'&&ds.currentTie){
      const ct=ds.currentTie;const rolling=ct.rollF>0;
      p.fill(0,0,0,165); p.noStroke(); p.rect(0,0,CW,CH);

      p.fill(202,168,50); p.textAlign(p.CENTER,p.CENTER); p.textSize(17);
      p.text(L.draftTbTitle(ct.slotName),CW/2,CH/2-130); p.textFont('sans-serif');
      const dS=50,dGap=14,gW=3*dS+2*dGap,pSX=CW/2-40-gW,aSX=CW/2+40,diceY=CH/2-72;
      p.fill(65,188,125); p.textSize(14); if(!rolling) p.text(L.draftTbYou(ct.pt),CW/2-40-gW/2,diceY-18);
      p.fill(182,85,85); if(!rolling) p.text(L.draftTbOpp(ct.at),CW/2+40+gW/2,diceY-18);
      ct.pD.forEach((v,idx)=>drawDie(pSX+idx*(dS+dGap),diceY,rolling?rng(1,6):v,dS,[58,108,192],false,false));
      p.fill(148,158,200); p.textSize(22); p.textAlign(p.CENTER,p.CENTER); p.text('VS',CW/2,diceY+dS/2);
      ct.aD.forEach((v,idx)=>drawDie(aSX+idx*(dS+dGap),diceY,rolling?rng(1,6):v,dS,[152,65,65],false,false));
      if(ct.showResult){
        p.textSize(22);
        if(ct.res==='p'){p.fill(68,215,130);p.text(L.draftTbWinP,CW/2,CH/2+50);}
        else if(ct.res==='a'){p.fill(212,82,82);p.text(L.draftTbWinA,CW/2,CH/2+50);}

        p.fill(202,218,255); p.textAlign(p.CENTER,p.CENTER); p.textSize(15); p.text(lbl,CW/2,by2+18);

      if(ct.rollF>0)ct.rollF--;
      else{ct.revF=(ct.revF||0)+1;if(ct.revF===20)ct.showResult=true;if(ct.revF===36)ct.showBtn=true;}
    }

    p.fill(58,72,105); p.textSize(11); p.textAlign(p.RIGHT,p.BOTTOM); p.text(L.version,CW-12,CH-8);
    drawBackBtn();
  }

  function drawStageResult() {
    p.background(8, 11, 20);
    p.stroke(22, 30, 52); p.strokeWeight(1);
    for (let x = 0; x < CW; x += 80) p.line(x, 0, x, CH);
    for (let y = 0; y < CH; y += 80) p.line(0, y, CW, y);
    p.noStroke();

    // Stage title
    p.textFont('Mochiy Pop One, sans-serif');
    p.fill(175, 185, 218); p.textAlign(p.CENTER, p.CENTER); p.textSize(18);
    p.text(L.stageResultTitle(STAGE_RES.stageNum), CW / 2, 48);
    p.textFont('sans-serif');

    // Winner announcement
    const wCol = STAGE_RES.winner === 'p' ? [68, 215, 128] : STAGE_RES.winner === 'a' ? [215, 72, 72] : [205, 178, 52];
    const wTxt = STAGE_RES.winner === 'p' ? L.stageWinP : STAGE_RES.winner === 'a' ? L.stageWinA : L.stageDraw;
    p.fill(...wCol); p.textAlign(p.CENTER, p.CENTER); p.textSize(36);
    p.textFont('Mochiy Pop One, sans-serif'); p.text(wTxt, CW / 2, 120); p.textFont('sans-serif');

    // Score panel
    p.fill(16, 20, 38); p.rect(CW / 2 - 280, 160, 560, 90, 12);
    p.textSize(22); p.fill(65, 188, 128); p.textAlign(p.CENTER, p.CENTER);
    p.text(L.stageScore(STAGE_RES.playerScore, STAGE_RES.aiScore), CW / 2, 205);

    // Run score panel
    const winsNeeded = RUN.winsNeeded;
    p.fill(20, 26, 46); p.rect(CW / 2 - 320, 272, 640, 120, 12);
    p.fill(175, 185, 218); p.textSize(14);
    p.text(L.winsNeeded(winsNeeded), CW / 2, 295);
    // Stage win indicators
    const indSize = 28, indGap = 10, totalStages = RUN.totalStages;
    const indW = totalStages * indSize + (totalStages - 1) * indGap;
    let ix = CW / 2 - indW / 2 + indSize / 2;
    for (let i = 0; i < totalStages; i++) {
      const isP = i < RUN.playerWins;
      const isA = i < RUN.aiWins;
      p.noStroke();
      p.fill(isP ? [52, 192, 108] : isA ? [192, 68, 68] : [38, 48, 78]);
      p.ellipse(ix, 335, indSize, indSize);
      if (isP) { p.fill(255); p.textSize(12); p.textAlign(p.CENTER, p.CENTER); p.text('P', ix, 335); }
      else if (isA) { p.fill(255); p.textSize(12); p.textAlign(p.CENTER, p.CENTER); p.text('A', ix, 335); }
      ix += indSize + indGap;
    }
    p.fill(175, 185, 218); p.textSize(16); p.textAlign(p.CENTER, p.CENTER);
    p.text(L.runScore(RUN.playerWins, RUN.aiWins), CW / 2, 368);

    // Draft pt info
    p.fill(18, 24, 42); p.rect(CW / 2 - 260, 412, 520, 70, 10);
    p.fill(215, 178, 50); p.textSize(14);
    p.text(L.draftPtLabel(STAGE_RES.playerDraftPt), CW / 2, 435);
    p.fill(78, 90, 125); p.textSize(11); p.text(L.draftPtNote, CW / 2, 458);

    // Action button
    const btnW = 260, btnX = CW / 2 - btnW / 2, btnY = CH - 90;
    const lbl = STAGE_RES.runOver ? L.viewRunResultBtn : L.nextStageBtn;
    const hB = hov(btnX, btnY, btnW, 52);
    p.textFont('Mochiy Pop One, sans-serif');
    p.fill(hB ? [52, 148, 82] : [34, 108, 58]); p.rect(btnX, btnY, btnW, 52, 12);
    p.fill(205, 248, 218); p.textAlign(p.CENTER, p.CENTER); p.textSize(18);
    p.text(lbl, CW / 2, btnY + 27);
    p.textFont('sans-serif');

    // Back to title (abandon run)
    drawBackBtn();
    p.fill(58, 72, 105); p.textSize(11); p.textAlign(p.RIGHT, p.BOTTOM); p.text(L.version, CW - 12, CH - 8);
  }

// ══════════════════════════════════════════════════════════════
// SECTION 11: INPUT HANDLER
// ══════════════════════════════════════════════════════════════

  p.mousePressed = function () {
    if (scene === 'GAME' && ['ASSIGN', 'SWAP_SELECT'].includes(G.phase) && !helpOpen) {
      dragS = { x: p.mouseX, y: p.mouseY }; dragE = { x: p.mouseX, y: p.mouseY }; isDragging = false;
    }
    if (scene === 'TITLE') EGG.onPress(p.mouseX, p.mouseY);
    // DRAFT D&D: タグのドラッグ開始
    if (scene === 'DRAFT' && DS_STATE.phase === 'TAG_SELECT') {
      const ds = DS_STATE;
      let tx = 90;
      const remTags = ds.playerTags.filter(t=>!t.used);
      remTags.forEach(t=>{
        if (hov(tx,44,40,18)) {
          ds.dragTag = { mult:t.mult, tagRef:t, active:true };
          ds.dragX = p.mouseX; ds.dragY = p.mouseY;
        }
        tx+=46;
      });
    }
  };

  p.mouseDragged = function () {
    if (scene === 'TITLE') return; if (helpOpen) return;
    // DRAFT D&D更新
    if (scene === 'DRAFT' && DS_STATE.dragTag && DS_STATE.dragTag.active) {
      DS_STATE.dragX = p.mouseX; DS_STATE.dragY = p.mouseY; return;
    }
    if (!dragS) return;
    dragE = { x: p.mouseX, y: p.mouseY };
    const dx = dragE.x - dragS.x, dy = dragE.y - dragS.y;
    if (Math.sqrt(dx * dx + dy * dy) > 14) isDragging = true;
  };

  p.mouseReleased = function () {
    // ── Help overlay ──
    if (helpOpen) {
      const bx = CW / 2 - 440, by = CH / 2 - 275, bh = 550, cbx = CW / 2 - 58, cby = by + bh - 44;
      if (hov(cbx, cby, 116, 34)) { helpOpen = false; return; }
      const sbw = 162, sbx = bx + 8, cty = by + 52;
      for (let i = 0; i < L.helpTabs.length; i++) { if (hov(sbx, cty + i * 44, sbw, 38)) { helpTab = i; return; } }

      for (let pi2 = 0; pi2 < lay.positions.length; pi2++) {

      for (let ci = 0; ci < G.market.length; ci++) { const asgn = G.pDice.filter(d => d.card === ci); for (let di = 0; di < asgn.length; di++) { const s = cSlot(ci, di); if (hov(s.x, s.y, DSS, DSS)) { asgn[di].card = null; asgn[di].fresh = true; return; } } }
      const spAsgn = G.pDice.filter(d => d.card === G.market.length);
      for (let di = 0; di < spAsgn.length; di++) { const s = scSlot(di); if (hov(s.x, s.y, DSS, DSS)) { spAsgn[di].card = null; spAsgn[di].fresh = true; return; } }
      return;
    }

    if (G.phase === 'TURN_END') {
      if (hov(CW / 2 - 108, CH - 42, 216, 34)) {
        if (G.turn >= G.totalTurns) {
          initStageResult();
          scene = 'STAGE_RESULT';
        } else {
          G.turn++; beginTurn();
        }
      }
    }
  };

// ══════════════════════════════════════════════════════════════
// SECTION 12: p5 ENTRY POINT
// ══════════════════════════════════════════════════════════════

  // ── Helpers ──
  const rng   = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const sum   = arr => arr.reduce((s, v) => s + v, 0);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  function shuffle(a) { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }

  // ── Easter Egg ──
  const EGG = {
    words: [], dice: [], heldIdx: -1,
    SPAWN: [{ x: 160, y: 575 }, { x: 1120, y: 575 }],
    glow: 0, thankYou: false, tyAlpha: 0, tyScale: 0, particles: [], titleHitW: 700,
    reset() { this.words = []; this.dice = []; this.heldIdx = -1; this.thankYou = false; this.tyAlpha = 0; this.tyScale = 0; this.particles = []; this.glow = 0; },
    _mw(txt, sz, font) { p.push(); p.textFont(font === 'mochiy' ? 'Mochiy Pop One, sans-serif' : 'sans-serif'); p.textSize(sz); const tw = p.textWidth(txt); p.pop(); return tw; },
    buildWords() {
      this.words = [];
      const addW = (txt, ax, ay, ha, va, sz, col, font) => {
        const tw = this._mw(txt, sz, font); let cx = ax, cy = ay;
        if (ha === 'left') cx = ax + tw / 2; else if (ha === 'right') cx = ax - tw / 2;
        if (va === 'top') cy = ay + sz / 2; else if (va === 'bottom') cy = ay - sz / 2;
        this.words.push({ txt, ax, ay, cx, cy, x: cx, y: cy, ha, va, sz, col, font: font || 'sans', hitR: Math.max(28, tw / 2 + 4), vx: 0, vy: 0, va2: 0, angle: 0, alive: true });
      };
      addW('日本語', 18, 22, 'left', 'center', 14, lang === 'ja' ? [215, 178, 48] : [88, 96, 128], 'mochiy');
      addW('English', 18, 50, 'left', 'center', 14, lang === 'en' ? [215, 178, 48] : [88, 96, 128], 'mochiy');
      const tw = this._mw(L.gameTitle, 64, 'mochiy'); this.titleHitW = Math.max(tw + 60, 400);
      addW(L.gameTitle, CW / 2, 160, 'center', 'center', 64, [52, 192, 108], 'mochiy');
      L.titleSummary.forEach((line, i) => addW(line, CW / 2, 250 + i * 32, 'center', 'center', 17, [165, 175, 210], 'sans'));
      addW(L.startBtn, CW / 2, 380, 'center', 'center', 22, [205, 248, 218], 'mochiy');
      addW(L.version, CW - 12, CH - 8, 'right', 'bottom', 11, [58, 72, 105], 'sans');
      addW(L.eggPull, CW / 2, CH - 18, 'center', 'center', 14, [165, 130, 50], 'sans');
    },
    isOnTitle(mx, my) { const hw = this.titleHitW / 2; return mx > CW / 2 - hw && mx < CW / 2 + hw && my > 120 && my < 200; },
    spawnDieAt(idx) { const pos = this.SPAWN[idx]; this.dice[idx] = { x: pos.x, y: pos.y, vx: 0, vy: 0, val: rng(1, 6), angle: 0, angVel: 0, state: 'waiting', respawnTimer: 0, anchor: { x: pos.x, y: pos.y }, idx }; },
    activate() { this.buildWords(); this.dice = [null, null]; this.spawnDieAt(0); this.spawnDieAt(1); },
    spawnParts(x, y, col) { for (let i = 0; i < 8; i++) { const a = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 5; this.particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1, life: 1, col }); } },
    update() {
      this.glow = (this.glow + 0.06) % (Math.PI * 2);
      this.dice.forEach((die, idx) => {
        if (!die) return;
        if (die.state === 'respawning') { die.respawnTimer--; if (die.respawnTimer <= 0) this.spawnDieAt(idx); return; }
        if (die.state === 'held') { die.x = p.mouseX; die.y = p.mouseY; die.angle = Math.atan2(die.y - die.anchor.y, die.x - die.anchor.x) * 0.3; return; }
        if (die.state === 'flying') {
          die.vy += 0.04; die.x += die.vx; die.y += die.vy; die.angle += die.angVel; die.angVel *= 0.98;
          const R = 27;
          if (die.x < R) { die.x = R; die.vx = Math.abs(die.vx) * 0.80; this.spawnParts(die.x, die.y, [220, 180, 60]); }
          if (die.x > CW - R) { die.x = CW - R; die.vx = -Math.abs(die.vx) * 0.80; this.spawnParts(die.x, die.y, [220, 180, 60]); }
          if (die.y < R) { die.y = R; die.vy = Math.abs(die.vy) * 0.80; }
          if (die.y > CH + 80) { die.state = 'respawning'; die.respawnTimer = 20; return; }
          const spd = Math.sqrt(die.vx ** 2 + die.vy ** 2);
          if (spd > 0.5) {
            this.words.forEach(w => {
              if (!w.alive) return;
              const dx = die.x - w.cx, dy = die.y - w.cy, dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < w.hitR + R) {
                const nx = dx / dist, ny = dy / dist;
                w.vx = nx * spd * 0.9 + die.vx * 0.35 + (Math.random() - 0.5) * 2;
                w.vy = ny * spd * 0.9 + die.vy * 0.35 - 1.5; w.va2 = (Math.random() - 0.5) * 0.22; w.alive = false;
                this.spawnParts(w.cx, w.cy, w.col); die.vx -= nx * spd * 0.2; die.vy -= ny * spd * 0.2; die.angVel += (Math.random() - 0.5) * 0.6;
              }
            });
          }
          if (this.words.length > 0 && this.words.every(w => !w.alive)) this.thankYou = true;
        }
      });
      this.words.filter(w => !w.alive).forEach(w => { w.vy += 0.15; w.vx *= 0.99; w.x += w.vx; w.y += w.vy; w.angle += w.va2; });
      this.particles = this.particles.filter(pt => { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.07; pt.life -= 0.033; return pt.life > 0; });
      if (this.thankYou) { this.tyAlpha = Math.min(255, this.tyAlpha + 3.5); this.tyScale = Math.min(1, this.tyScale + 0.035); }
    },
    drawWords() {
      this.words.forEach(w => {
        p.push(); p.noStroke();
        if (w.alive) {
          p.fill(w.col[0], w.col[1], w.col[2]);
          p.textAlign(w.ha === 'left' ? p.LEFT : w.ha === 'right' ? p.RIGHT : p.CENTER, w.va === 'top' ? p.TOP : w.va === 'bottom' ? p.BOTTOM : p.CENTER);
          p.textSize(w.sz); p.textFont(w.font === 'mochiy' ? 'Mochiy Pop One, sans-serif' : 'sans-serif');
          p.text(w.txt, w.ax, w.ay); p.textFont('sans-serif');
        } else {
          p.translate(w.x, w.y); p.rotate(w.angle); p.fill(w.col[0], w.col[1], w.col[2], 100);
          p.textAlign(p.CENTER, p.CENTER); p.textSize(w.sz); p.textFont(w.font === 'mochiy' ? 'Mochiy Pop One, sans-serif' : 'sans-serif');
          p.text(w.txt, 0, 0); p.textFont('sans-serif');
        }
        p.pop();
      });
    },
    drawDice() {
      const PIPSD = { 1: [[0,0]], 2: [[-9,-9],[9,9]], 3: [[-9,-9],[0,0],[9,9]], 4: [[-9,-9],[9,-9],[-9,9],[9,9]], 5: [[-9,-9],[9,-9],[0,0],[-9,9],[9,9]], 6: [[-9,-8],[9,-8],[-9,0],[9,0],[-9,8],[9,8]] };
      this.dice.forEach(die => {
        if (!die || die.state === 'respawning') return;
        const isW = die.state === 'waiting', isH = die.state === 'held';
        if (isH) {
          const ax = die.anchor.x, ay = die.anchor.y, tension = Math.min(Math.sqrt((die.x - ax) ** 2 + (die.y - ay) ** 2) / 160, 1);
          const r = Math.round(180 + 75 * tension), g2 = Math.round(120 - 80 * tension);
          const ang = Math.atan2(die.y - ay, die.x - ax), fw = 11;
          p.stroke(r, g2, 40, 200); p.strokeWeight(2.5);
          p.line(ax + Math.cos(ang + Math.PI / 2) * fw, ay + Math.sin(ang + Math.PI / 2) * fw, die.x, die.y);
          p.line(ax + Math.cos(ang - Math.PI / 2) * fw, ay + Math.sin(ang - Math.PI / 2) * fw, die.x, die.y);
          p.noStroke(); p.fill(r, g2, 40, 180); p.ellipse(ax, ay, 12, 12);
        }
        p.push(); p.translate(die.x, die.y); p.rotate(die.angle);
        if (isW) { const pulse = Math.sin(this.glow * 2) * 0.5 + 0.5; p.noStroke(); p.fill(215, 178, 50, pulse * 80); p.ellipse(0, 0, 72 + pulse * 16, 72 + pulse * 16); }
        p.noStroke(); p.fill(0, 0, 0, 60); p.rect(3, 3, 54, 54, 9);
        p.stroke(isW ? [255, 215, 80] : isH ? [255, 80, 80] : [195, 55, 55]); p.strokeWeight(2.5);
        p.fill(isW ? [212, 165, 45] : isH ? [185, 55, 55] : [195, 55, 55]); p.rect(-27, -27, 54, 54, 9);
        p.noStroke(); p.fill(255, 240, 240); (PIPSD[die.val] || []).forEach(([px, py]) => p.ellipse(px, py, 8, 8));
        p.pop();
      });
      this.dice.forEach(die => {
        if (!die || die.state !== 'respawning') return;
        const prog = die.respawnTimer / 20, pos = this.SPAWN[die.idx];
        p.noStroke(); p.fill(215, 178, 50, 120 * prog); p.ellipse(pos.x, pos.y, 22 * prog, 22 * prog);
      });
    },
    drawParticles() { this.particles.forEach(pt => { p.noStroke(); p.fill(pt.col[0], pt.col[1], pt.col[2], pt.life * 200); p.ellipse(pt.x, pt.y, 7 * pt.life, 7 * pt.life); }); },
    drawThankYou() {
      if (!this.thankYou) return;
      p.push(); p.translate(CW / 2, CH / 2); p.scale(this.tyScale); p.noStroke();
      for (let r = 5; r > 0; r--) p.fill(215, 178, 50, this.tyAlpha * (r / 5) * 0.18), p.ellipse(0, 0, r * 180, r * 80);
      p.textFont('Mochiy Pop One, sans-serif'); p.fill(215, 178, 50, this.tyAlpha); p.textAlign(p.CENTER, p.CENTER); p.textSize(56); p.text('Thank you for playing!', 0, 0); p.textFont('sans-serif'); p.pop();
    },
    onPress(mx, my) {
      if (this.thankYou) return false;
      if (!this.words.length) { if (this.isOnTitle(mx, my)) { this.activate(); return true; } return false; }
      if (this.heldIdx < 0) {
        let bestDist = 9999, bestIdx = -1;
        this.dice.forEach((die, idx) => { if (!die || die.state !== 'waiting') return; const dx = mx - die.x, dy = my - die.y, dist = Math.sqrt(dx * dx + dy * dy); if (dist < 40 && dist < bestDist) { bestDist = dist; bestIdx = idx; } });
        if (bestIdx >= 0) { this.dice[bestIdx].state = 'held'; this.heldIdx = bestIdx; return true; }
      }
      return false;
    },
    onRelease(mx, my) {
      if (this.heldIdx < 0) return false;
      const die = this.dice[this.heldIdx]; if (!die) { this.heldIdx = -1; return false; }
      const ax = die.anchor.x, ay = die.anchor.y, dx = ax - mx, dy = ay - my, dist = Math.sqrt(dx * dx + dy * dy);
      const speed = clamp(dist * 0.18, 7, 50);
      if (dist > 2) { die.vx = (dx / dist) * speed; die.vy = (dy / dist) * speed; }
      else { die.vx = (Math.random() - 0.5) * 7; die.vy = -7; }
      die.angVel = die.vx * 0.06; die.val = rng(1, 6); die.state = 'flying'; this.heldIdx = -1; return true;
    }
  };

  p.setup = function () {
    p.createCanvas(CW, CH).parent('gc'); p.pixelDensity(1);

    // Load AI character images
    const aiPaths = ['character_elder', 'character_stella', 'character_shadow', 'character_noir'];
    aiPaths.forEach((name, i) => {
      p.loadImage('./assets/' + name + '.png',
        img => { charImgs[i] = img; },
        ()  => { charImgs[i] = null; }
      );
    });

    // Load NPC partner images
    const npcPaths = ['npc_chacha', 'npc_sento', 'npc_fukuya', 'npc_nana'];
    npcPaths.forEach((name, i) => {
      p.loadImage('./assets/' + name + '.png',
        img => { npcImgs[i] = img; },
        ()  => { npcImgs[i] = null; }
      );
    });
    // Load background images (ファイルがなければフォールバック)
    BG_KEYS.forEach(key => {
      p.loadImage('./assets/' + key + '.png',
        img => { bgImgs[key] = img; bgLoaded[key] = true; },
        ()  => { bgImgs[key] = null; }
      );
    });
  };

  p.draw = function () {
    if (scene === 'GAME') updateGame();
    if      (scene === 'TITLE')        drawTitle();
    else if (scene === 'CONFIG')       drawConfig();
    else if (scene === 'NPC_SELECT')   drawNPCSelect();
    else if (scene === 'GAME')         drawGame();
    else if (scene === 'DRAFT')        drawDraft();
    else if (scene === 'STAGE_RESULT') drawStageResult();
    else if (scene === 'RUN_RESULT')   drawRunResult();
  };

}, 'gc');
</script>
