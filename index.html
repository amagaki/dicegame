    }

    // Top-bar right: emotion, score, income, dice
    p.noStroke();
    p.fill(190, 150, 240); p.textAlign(p.LEFT, p.CENTER); p.textSize(20); p.text(G.aiEmotion || '(^_^)', 174, 14);
    p.fill(180, 86, 86); p.textAlign(p.LEFT, p.TOP); p.textSize(12); p.text(L.opp, 174, 32);
    p.textSize(24); p.text(G.aScore + 'pt', 204, 30);
    const ai2 = sum(G.aIncome); let aiY = 54;
    if (ai2 > 0) { p.fill(152, 68, 68); p.textSize(11); p.text(L.oppIncome(ai2), 174, aiY); aiY += 14; }
    p.fill(105, 115, 158); p.textSize(11); p.text(L.dicePerTurn(G.aPerTurn), 174, aiY);
    // v0.40: AI deck counter
    if (G.aDeckCards) {
      const aUnused = G.aDeckCards.length - G.aDeckUsed.size;
      const aUsed   = G.aDeckUsed.size;
      const aFlash  = G.deckResetFlash.a > 0;
      // 山札アイコン
      p.fill(aFlash?[215,178,50]:[32,42,72]); p.stroke(aFlash?[255,215,80]:[58,78,118]); p.strokeWeight(1.5);
      p.rect(174, aiY+16, 38, 26, 5); p.noStroke();
      p.fill(aFlash?[20,16,8]:[155,175,215]); p.textSize(9); p.textAlign(p.CENTER,p.CENTER);
      p.text('📦 '+aUnused, 193, aiY+29);
      // 捨て場アイコン
      p.fill(28,22,48); p.stroke(68,52,98); p.strokeWeight(1.5);
      p.rect(216, aiY+16, 38, 26, 5); p.noStroke();
      p.fill(120,100,158); p.textSize(9); p.textAlign(p.CENTER,p.CENTER);
      p.text('🗑 '+aUsed, 235, aiY+29);
    }

    // AI NPC name (small)
    if (RUN && RUN.aiNPC !== undefined) {
      p.fill(128, 100, 168); p.textSize(10); p.textAlign(p.LEFT, p.TOP);
      p.text(L.aiNpcChosen(L.npcNames[RUN.aiNPC]), 174, aiY + 14);
    }

    // Turn + run indicator (center)
    p.textFont('Mochiy Pop One, sans-serif');
    p.fill(175, 185, 218); p.textAlign(p.CENTER, p.CENTER); p.textSize(15);
    p.text(`${L.turnLabel} ${G.turn} / ${G.totalTurns}`, CW / 2 - 50, 14);
    p.textFont('sans-serif');
    // Turn dots
    const dotR = 5, dotGap = 4, nDots = G.totalTurns;
    const dotW = nDots * (dotR * 2) + (nDots - 1) * dotGap; let dotX = CW / 2 - 50 - dotW / 2 + dotR;
    for (let i = 0; i < nDots; i++) {
      p.noStroke();
      if (i < G.turn - 1)        p.fill(52, 192, 108);
      else if (i === G.turn - 1) { p.fill(215, 200, 55); p.stroke(255, 220, 80); p.strokeWeight(1.5); }
      else                        p.fill(36, 46, 74);
      p.ellipse(dotX, 35, i === G.turn - 1 ? dotR * 2 + 2 : dotR * 2, i === G.turn - 1 ? dotR * 2 + 2 : dotR * 2);
      p.noStroke(); dotX += dotR * 2 + dotGap;
    }
    // Stage indicator (small, top-right area)
    if (RUN && RUN.totalStages) {
      p.fill(115, 128, 168); p.textSize(11); p.textAlign(p.CENTER, p.CENTER);
      p.text(L.stageLabel(RUN.currentStage, RUN.totalStages), CW / 2 - 50, 48);
    }

    drawBackBtn(); drawHelpBtn();

    // AI dice
    const adl = aDiceLayout(G.aPool.length, G.aKeepVis);
    if (G.aKeepVis > 0 && adl.keptW > 0) {
      const kx = adl.keptStartX - 6, ky = AZ.y + 10, kw = adl.keptW + 12, kh = DSS + 22;
      p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(1.5); p.rect(kx, ky, kw, kh, 8);
      p.noStroke(); p.fill(215, 172, 50); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(11); p.text(L.keepFull(G.aKeepVis), kx + kw / 2, ky + 2);
    }
    adl.positions.forEach((pos, di) => {
      drawDie(pos.x, AZ.y + 16, 0, DSS, pos.held ? [148, 112, 40] : [48, 62, 105], false, true);
      if (pos.held) { p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(2.5); p.rect(pos.x + 1, AZ.y + 17, DSS - 2, DSS - 2, 6); p.noStroke(); }
      // 索敵マーカー（scoutActive時：値レンジを表示）
      if (G.scoutActive && G.oppDiceVisible && G.oppDiceVisible[di]) {
        const marker = G.oppDiceVisible[di];
        p.noStroke(); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(13);
        if (marker === 'high') { p.fill(65, 215, 128); p.text('4↑', pos.x + DSS/2, AZ.y + 14); }
        else                   { p.fill(215, 72, 72);  p.text('3↓', pos.x + DSS/2, AZ.y + 14); }
      }
    });

    for (let i = 0; i < G.market.length; i++) drawCard(i);
    drawSpecialCard();

    // Player zone
    p.fill(58, 188, 106); p.textAlign(p.LEFT, p.TOP); p.textSize(12); p.text(L.you, 16, PZ.y + 4);
    p.textSize(30); p.text(G.pScore + 'pt', 16, PZ.y + 18);
    const pi = sum(G.pIncome); let pY = PZ.y + 52;
    if (pi > 0) { p.fill(46, 160, 84); p.textSize(11); p.text(L.incomeLabel(pi), 16, pY); pY += 14; }
    p.fill(105, 115, 158); p.textSize(11); p.text(L.dicePerTurn(G.pPerTurn), 16, pY);
    // デッキアイコンパネル（プレイヤー）
    if (G.pDeckCards) {
      const pUnused = G.pDeckCards.length - G.pDeckUsed.size;
      const pUsed   = G.pDeckUsed.size;
      const pFlash  = G.deckResetFlash.p > 0;
      p.fill(pFlash?[215,178,50]:[32,42,72]); p.stroke(pFlash?[255,215,80]:[58,78,118]); p.strokeWeight(1.5);
      p.rect(16, pY+16, 42, 28, 5); p.noStroke();
      p.fill(pFlash?[20,16,8]:[155,175,215]); p.textSize(10); p.textAlign(p.CENTER,p.CENTER);
      p.text('📦'+pUnused, 37, pY+30);
      p.fill(28,22,48); p.stroke(68,52,98); p.strokeWeight(1.5);
      p.rect(62, pY+16, 42, 28, 5); p.noStroke();
      p.fill(120,100,158); p.textSize(10); p.textAlign(p.CENTER,p.CENTER);
      p.text('🗑'+pUsed, 83, pY+30);
    }
    // アイテムスロット表示（右下・大型化）
    if (RUN && RUN.playerItems && RUN.playerItems.length > 0) {
      const items = RUN.playerItems.slice(-5);
      const iW=58, iH=52, iGap=6, iStartX=CW-16-(items.length*(iW+iGap)), iY=PZ.y+8;
      p.fill(18,24,48); p.stroke(48,64,102); p.strokeWeight(1);
      p.rect(iStartX-8,iY-4,items.length*(iW+iGap)+8,iH+8,8); p.noStroke();
      p.fill(108,120,165); p.textSize(10); p.textAlign(p.LEFT,p.CENTER);
      p.text(lang==='ja'?'アイテム':'Items', iStartX-6, iY-12);
      items.forEach((key,ii)=>{
        const ix=iStartX+ii*(iW+iGap);
        const hI=hov(ix,iY,iW,iH);
        p.fill(hI?[52,68,108]:[30,42,72]); p.stroke(hI?[88,118,178]:[58,78,118]); p.strokeWeight(1.5);
        p.rect(ix,iY,iW,iH,6); p.noStroke();
        const nm=(L.draftItemNames&&L.draftItemNames[key]||key);
        p.fill(hI?[225,235,255]:[175,188,225]); p.textSize(12); p.textAlign(p.CENTER,p.CENTER);
        const nm1=nm.length>4?nm.slice(0,4):nm;
        const nm2=nm.length>4?nm.slice(4):'';
        p.text(nm1, ix+iW/2, iY+(nm2?iH/2-8:iH/2));
        if(nm2) p.text(nm2, ix+iW/2, iY+iH/2+8);
      });
    }
    // AIアイテムスロット（EXカード上・横並び）
    if (RUN && RUN.aiItems && RUN.aiItems.length > 0) {
      const aiItems = RUN.aiItems.slice(-5);
      const aiIW=44, aiIH=36, aiIGap=4;
      const totalW = aiItems.length*(aiIW+aiIGap)-aiIGap;
      // SC（EXカード）の上に横並び
      const aiSX = SC.x + (SC.w - totalW) / 2;
      const aiSY = SC.y - aiIH - 20;
      p.fill(28,18,42,200); p.stroke(68,48,102); p.strokeWeight(1);
      p.rect(aiSX-6, aiSY-14, totalW+12, aiIH+18, 6); p.noStroke();
      p.fill(128,95,168); p.textSize(9); p.textAlign(p.CENTER,p.TOP);
      p.text(lang==='ja'?'相手アイテム':'Opp Items', aiSX+totalW/2, aiSY-12);
      aiItems.forEach((key,ii)=>{
        const ax=aiSX+ii*(aiIW+aiIGap);
        p.fill(45,28,68); p.stroke(88,58,138); p.strokeWeight(1);
        p.rect(ax,aiSY,aiIW,aiIH,5); p.noStroke();
        const nm=(L.draftItemNames&&L.draftItemNames[key]||key);
        p.fill(178,148,215); p.textSize(10); p.textAlign(p.CENTER,p.CENTER);
        const nm1=nm.length>3?nm.slice(0,3):nm, nm2=nm.length>3?nm.slice(3):'';
        p.text(nm1, ax+aiIW/2, aiSY+(nm2?aiIH/2-7:aiIH/2));
        if(nm2) p.text(nm2, ax+aiIW/2, aiSY+aiIH/2+7);
      });
    }
    // Player NPC name + passiveスキルインジケーター
    if (RUN && RUN.playerNPC !== undefined) {
      p.fill(95, 148, 105); p.textSize(10); p.textAlign(p.LEFT, p.TOP);
      p.text(L.partnerLabel(L.npcNames[RUN.playerNPC]), 16, pY + 50);
      // 扇灯のランタンの灯り（passive）インジケーター
      if (RUN.playerNPC === 1) {
        p.fill(108,172,248,200); p.textSize(9); p.textAlign(p.LEFT,p.TOP);
        p.text(lang==='ja'?'◉ ランタン有効':'◉ Lantern', 16, pY+64);
      }
    }

    // 扇灯のX線透視：カードの相手割り当て数を表示
    if (G.sentoXrayActive && G.phase === 'ASSIGN') {
      G.market.forEach((c, i) => {
        const r = cRect(i);
        const aCount = G.aPool.filter(d => d.card === i).length; // AIの割当数
        p.fill(108,172,248,200); p.noStroke(); p.textSize(13); p.textAlign(p.RIGHT,p.TOP);
        p.text(`相手:${aCount}個`, r.x+r.w-6, r.y+6);
      });
    }

    // Instructions
    const showInstr = ['ASSIGN', 'EFFECT_ANIM', 'SWAP_SELECT', 'ROLLING'].includes(G.phase);
    if (showInstr) {
      let instrTxt = '', instrCol = [135, 145, 182];
      if      (G.phase === 'ROLLING')     { instrTxt = L.rolling;          instrCol = [145, 155, 195]; }
      else if (G.phase === 'EFFECT_ANIM') { instrTxt = L.tapContinue;      instrCol = [215, 185, 65];  }
      else if (G.phase === 'SWAP_SELECT') { instrTxt = L.swapSelectInstr;  instrCol = [215, 165, 50];  }
      else if (G.selSet.size > 0)         { instrTxt = L.instrSel(G.selSet.size); instrCol = [255, 198, 42]; }
      else                                  instrTxt = L.instrNone;
      p.fill(...instrCol); p.textAlign(p.CENTER, p.TOP); p.textSize(13); p.text(instrTxt, CW / 2 - 40, PZ.y + 6);
    }

    // Player dice
    const allUnass = G.pDice.filter(d => d.card === null);
    const keptD = allUnass.filter(d => !d.fresh), freshD = allUnass.filter(d => d.fresh);
    const pdl = pDiceLayout(freshD, keptD);
    pdl.keptBoxes.forEach(box => {
      p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(1.5); p.rect(box.x, box.y, box.w, box.h, 9);
      p.noStroke(); p.fill(215, 172, 50); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(11); p.text(L.keepFull(keptD.length), box.x + box.w / 2, box.y + 2);
    });
    if (pdl.overflow) { p.fill(212, 155, 50); p.textAlign(p.CENTER, p.TOP); p.textSize(12); p.text(`+${allUnass.length - D_MAXCOLS * 2}…`, CW / 2, PZ.y + 72 + (DS + D_GAP + 4) * 2); }
    if (isDragging && dragS && dragE) { p.noFill(); p.stroke(255, 202, 38, 148); p.strokeWeight(1.5); p.rect(Math.min(dragS.x, dragE.x), Math.min(dragS.y, dragE.y), Math.abs(dragE.x - dragS.x), Math.abs(dragE.y - dragS.y)); }

    pdl.positions.forEach((pos, pi2) => {
      const d = pi2 < pdl.kC ? keptD[pi2] : freshD[pi2 - pdl.kC]; if (!d) return;
      const idx = G.pDice.indexOf(d);
      const dv = d.rollF > 0 ? rng(1, 6) : d.val;
      const sc = d.bounceF > 0 ? (1 + d.bounceF * 0.045) : 1;
      const isHighlighted = G.effectHighlights.includes(idx);
      const isSwapTarget  = G.phase === 'SWAP_SELECT';
      const isSwapEligible = isSwapTarget && !pos.isKept;
      const hoverSwap = isSwapEligible && hov(pos.x, pos.y, DS, DS);
      const isSwapAnimating = G.swapAnim && G.swapAnim.active && G.swapAnim.dieIdx === idx;
      const swapPulse = isSwapAnimating ? (Math.sin(G.swapAnim.timer * 0.25) * 0.5 + 0.5) : 0;
      let glowCol = null;
      if (isSwapAnimating)    glowCol = [215, 140 + (swapPulse * 80 | 0), 50];
      else if (d.floored)     glowCol = [65, 215, 128];  // 出目底上げ：緑グロー
      else if (isHighlighted) glowCol = d.val === 6 ? [215, 172, 50] : d.val === 1 ? [215, 80, 80] : null;
      const dieCol = pos.isKept ? [155, 118, 42] : isSwapTarget ? [155, 88, 32] : [58, 108, 192];
      const bounceSc = isSwapAnimating ? (1 + swapPulse * 0.12) * sc : sc;
      drawDie(pos.x, pos.y, dv, DS, dieCol, G.selSet.has(idx) || hoverSwap, false, bounceSc, glowCol);
      if (pos.isKept) { p.noFill(); p.stroke(215, 172, 50); p.strokeWeight(2.5); p.rect(pos.x + 1, pos.y + 1, DS - 2, DS - 2, 7); p.noStroke(); }
      if (isHighlighted && !isSwapAnimating) { p.fill(215, 178, 50, 180); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(10); p.text(d.val === 6 ? '★' : '▼', pos.x + DS / 2, pos.y - 2); }
      // 出目底上げインジケーター（緑の+1↑マーカー）
      if (d.floored && d.rollF === 0) { p.noStroke(); p.fill(65, 215, 128, 220); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(12); p.text('+1↑', pos.x + DS / 2, pos.y - 2); }
      if (hoverSwap) { p.noFill(); p.stroke(215, 142, 50); p.strokeWeight(2.5); p.rect(pos.x - 2, pos.y - 2, DS + 4, DS + 4, 9); p.noStroke(); p.fill(215, 165, 50, 200); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(12); p.text('⇄', pos.x + DS / 2, pos.y - 3); }
    });

    // Effect anim overlay
    if (G.phase === 'EFFECT_ANIM' && G.effectAnimMsgs.length > 0) {
      const prog = clamp(G.effectAnimTimer / EFFECT_ANIM_FRAMES, 0, 1);
      p.fill(0, 0, 0, prog * 120); p.noStroke(); p.rect(0, CARD_Y - 10, CW, CARD_H + 20);
      G.effectAnimMsgs.forEach((msg, i) => {
        p.fill(215, 178, 50, prog * 255); p.textAlign(p.CENTER, p.CENTER); p.textSize(30);

    }

    // Floating texts
    G.floatingTexts.forEach(ft => {
      p.noStroke(); p.fill(ft.col[0], ft.col[1], ft.col[2], ft.alpha);
      p.textAlign(p.CENTER, p.CENTER); p.textSize(ft.size);

    // Action buttons
    if (G.phase === 'ASSIGN') {
      const hC = hov(CW / 2 - 108, CH - 42, 216, 34);
      p.fill(hC ? [58, 148, 78] : [36, 108, 56]); p.rect(CW / 2 - 108, CH - 42, 216, 34, 9);
      p.fill(202, 245, 215); p.textAlign(p.CENTER, p.CENTER); p.textSize(15); p.text(L.confirmBtn, CW / 2, CH - 25);
    }
    if (G.phase === 'TURN_END') {
      const isLast = G.turn >= G.totalTurns;
      const lbl = isLast ? L.stageEndBtn : L.nextBtn;
      const hN = hov(CW / 2 - 108, CH - 42, 216, 34);
      p.fill(hN ? [55, 95, 172] : [36, 65, 138]); p.rect(CW / 2 - 108, CH - 42, 216, 34, 9);
      p.fill(202, 218, 255); p.textAlign(p.CENTER, p.CENTER); p.textSize(15); p.text(lbl, CW / 2, CH - 25);
    }
    if (G.phase === 'TIEBREAK' && G.tb) drawTiebreak();
    if (G.phase === 'CARD_SELECT') drawCardSelectOverlay();
    // 封鎖カード選択オーバーレイ
    if (G.blockadeSelectMode) {
      // 封鎖：画面全体の赤オーバーレイなし・案内バナーのみ
      p.noStroke(); p.fill(16,22,42,220);
      p.rect(CARD_Y-10, TB_H, CW, 38); // カード上部に帯
      p.fill(16,22,42); p.stroke(192,68,68); p.strokeWeight(2);
      p.rect(CW/2-240,CARD_Y-52,480,42,10); p.noStroke();
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(255,168,168); p.textAlign(p.CENTER,p.CENTER); p.textSize(15);
      p.text(lang==='ja'?'🚫 封鎖するカードをクリックしてください':'🚫 Click a card to blockade', CW/2, CARD_Y-31);
      p.textFont('sans-serif');
      // 各カードに🚫マーク＋枠
      for (let i=0; i<G.market.length; i++) {
        const r=cRect(i); const hB=hov(r.x,r.y,r.w,r.h);
        p.noFill(); p.stroke(hB?[255,80,80]:[192,68,68]); p.strokeWeight(hB?3:1.5);
        p.rect(r.x-2,r.y-2,r.w+4,r.h+4,12);
        p.noStroke(); p.fill(hB?[255,100,100]:[192,68,68]); p.textSize(hB?20:16); p.textAlign(p.CENTER,p.CENTER);
        p.text('🚫', r.x+r.w/2, r.y+r.h/2);
      }
    }
    // 六の目ダイス選択オーバーレイ
    if (G.sixSelectMode) {
      p.noStroke(); p.fill(16,22,42,200);
      p.rect(PZ.y-10, 0, CW, 48);
      p.fill(16,22,42); p.stroke(215,178,50); p.strokeWeight(2);
      p.rect(CW/2-220,PZ.y-50,440,42,10); p.noStroke();
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(255,220,80); p.textAlign(p.CENTER,p.CENTER); p.textSize(15);
      p.text(lang==='ja'?'★ 6にするダイスをクリックしてください':'★ Click a die to set to 6', CW/2, PZ.y-29);
      p.textFont('sans-serif');
    }
    // 封印・強化カード選択オーバーレイ
    if (G.sealSelectMode) {
      const isSeal = G.sealSelectMode === 'seal';
      const col = isSeal ? [148,58,218] : [78,148,218];
      const icon = isSeal ? '🔒' : '⚡';
      p.fill(16,22,42); p.stroke(...col); p.strokeWeight(2);
      p.rect(CW/2-240,CARD_Y-52,480,42,10); p.noStroke();
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(...col); p.textAlign(p.CENTER,p.CENTER); p.textSize(15);
      p.text((lang==='ja'?(isSeal?`${icon} 封印するカードをクリック`:`${icon} 強化するカードをクリック`):(isSeal?`${icon} Click card to seal`:`${icon} Click card to enhance`)), CW/2, CARD_Y-31);
      p.textFont('sans-serif');
      for (let i=0;i<G.market.length;i++) {
        const r=cRect(i); const hB=hov(r.x,r.y,r.w,r.h);
        p.noFill(); p.stroke(hB?[...col]:[...col,150]); p.strokeWeight(hB?3:1.5);
        p.rect(r.x-2,r.y-2,r.w+4,r.h+4,12);
        p.noStroke(); p.textSize(hB?22:16); p.textAlign(p.CENTER,p.CENTER);
        p.fill(...col); p.text(icon, r.x+r.w/2, r.y+r.h/2);
      }
    }
    // v0.3.3: スキルパネル（ASSIGN時のみ）
    if (G.phase === 'ASSIGN') drawSkillPanel();
    if (G.phase === 'ASSIGN') { drawSkillTooltip(); drawItemTooltip(); }
    // v0.40: カード詳細ホバーポップアップ
    if (['ASSIGN','ROLLING','EFFECT_ANIM'].includes(G.phase)) drawCardHoverPopup();
    if (G.itemUseDialog) drawItemUseDialog();
    if (G.deckPopup) drawDeckPopup();
    // v0.40: スキルフラッシュ
    if (G.skillFlash && G.skillFlash.alpha > 0) {
      const sf = G.skillFlash;
      p.noStroke(); p.fill(sf.col[0],sf.col[1],sf.col[2],sf.alpha*0.3); p.rect(0,0,CW,CH);
      p.textFont('Mochiy Pop One, sans-serif');
      p.fill(sf.col[0],sf.col[1],sf.col[2],sf.alpha); p.textAlign(p.CENTER,p.CENTER); p.textSize(38);
      p.text(sf.txt, sf.x, sf.y); p.textFont('sans-serif');
    }
    // v0.40: ステージ開始バナー（スキルリセット通知）
    if (G.stageStartBanner > 0 && G.turn === 0) {
      const prog = Math.min(1, G.stageStartBanner / 30);
      const alpha = Math.min(255, G.stageStartBanner * 6);
      p.noStroke(); p.fill(16,22,42,alpha*0.85); p.rect(CW/2-240,CH/2-30,480,60,12);
      p.fill(108,188,148,alpha); p.textAlign(p.CENTER,p.CENTER); p.textSize(14);
      const npcName = RUN ? L.npcNames[RUN.playerNPC] : '';
      p.text(lang==='ja'?`✦ ステージ${RUN?RUN.currentStage:''}開始 — ${npcName}のスキルがリセットされました`:`✦ Stage ${RUN?RUN.currentStage:''} — ${npcName}'s skills reset`, CW/2, CH/2);
    }
    if (helpOpen) drawHelp();
  }

  // ── デッキポップアップ ──
  function drawDeckPopup() {
    const who = G.deckPopup;
    if (!G.pDeckCards) return;
    // 扇灯パッシブ：相手デッキの未使用カード名を表示可能
    const sentoPassive = RUN && RUN.playerNPC === 1;
    const deck = who==='p' ? G.pDeckCards : G.aDeckCards;
    const used = who==='p' ? G.pDeckUsed  : G.aDeckUsed;
    const unusedCards = deck.map((c,i)=>({...c,idx:i})).filter(c=>!used.has(c.idx));
    const usedCards   = deck.map((c,i)=>({...c,idx:i})).filter(c=>used.has(c.idx));
    const pw=640,ph=400,px=CW/2-pw/2,py=CH/2-ph/2;
    p.fill(0,0,0,155); p.noStroke(); p.rect(0,0,CW,CH);
    p.fill(14,18,32); p.stroke(58,82,138); p.strokeWeight(2);
    p.rect(px,py,pw,ph,14); p.noStroke();
    p.textFont('Mochiy Pop One, sans-serif');
    p.fill(who==='p'?[65,188,128]:[182,85,85]); p.textAlign(p.CENTER,p.CENTER); p.textSize(16);
    const deckTitle = L.deckPopupTitle+(who==='p'?'（自分）':'（相手）');
    // 扇灯ランタンラベル
    const showLantern = sentoPassive && who==='a';
    p.text(deckTitle+(showLantern?(' 🔦 '+L.skill_sento_lantern_name):''), CW/2, py+22); p.textFont('sans-serif');
    // 相手デッキで扇灯パッシブなし → カード名を隠す
    const hideNames = (who==='a' && !sentoPassive);
    // 未使用
    p.fill(65,188,128); p.textSize(13); p.textAlign(p.LEFT,p.TOP);
    p.text(L.deckPopupUnused+'（'+unusedCards.length+'）', px+14, py+44);
    // U1: カード枠拡大・特別効果表示
    const cw=110, ch=60, gap=6, cols=Math.floor((pw-20)/(cw+gap));
    unusedCards.forEach((c,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const cx=px+14+col*(cw+gap), cy=py+64+row*(ch+gap);
      const tc=typeCol(c.type);
      p.fill(22,30,52); p.stroke(...tc); p.strokeWeight(1); p.rect(cx,cy,cw,ch,6); p.noStroke();
      if (hideNames) {
        p.fill(65,75,105); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
        p.text('???', cx+cw/2, cy+ch/2);
      } else {
        // カード名（特別カードはspName優先）
        const _dpName = (c.isSpecial && c.spName) ? c.spName : (L.cardNames[c.key] || c.key || '---');
        p.fill(c.isSpecial?[235,215,255]:[188,200,230]); p.textSize(c.isSpecial?10:11); p.textAlign(p.CENTER,p.TOP);
        p.text(_dpName, cx+cw/2, cy+5);
        // 効果
        p.fill(...tc); p.textSize(10);
        const eff=c.type==='income'?L.cardEffect.income(c.val):c.type==='invest'?L.cardEffect.invest():L.cardEffect.instant(c.val);
        p.text(eff, cx+cw/2, cy+20);
        // 特別カード変化効果（名称＋目標値）
        if (c.effect && c.isSpecial) {
          const _dpEffName = (L.specialCardEffectNames && L.specialCardEffectNames[c.effect]) || c.effect;
          const _dpTgt = c.effect==='targetNum' && c.targetVal!=null ? '（'+c.targetVal+'）' : '';
          p.fill(178,148,228); p.textSize(10); p.textAlign(p.CENTER,p.TOP);
          p.text('◆ '+_dpEffName+_dpTgt, cx+cw/2, cy+35);
        }
      }
    });
    // 使用済み
    const usedY = py+64+Math.ceil(unusedCards.length/cols)*(ch+gap)+12;
    p.fill(128,100,158); p.textSize(13); p.textAlign(p.LEFT,p.TOP);
    p.text(L.deckPopupUsed+'（'+usedCards.length+'）', px+14, usedY);
    usedCards.forEach((c,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const cx=px+14+col*(cw+gap), cy=usedY+20+row*(ch+gap);
      if(cy+ch>py+ph-40) return;
      p.fill(22,22,38); p.stroke(55,48,78); p.strokeWeight(1); p.rect(cx,cy,cw,ch,6); p.noStroke();
      const _duName = (c.isSpecial && c.spName) ? c.spName : (L.cardNames[c.key] || c.key || '---');
      p.fill(c.isSpecial?[180,155,200]:[100,95,128]); p.textSize(c.isSpecial?9:11); p.textAlign(p.CENTER,p.TOP);
      p.text(_duName, cx+cw/2, cy+5);
      p.fill(85,80,110); p.textSize(10);
      const eff=c.type==='income'?L.cardEffect.income(c.val):c.type==='invest'?L.cardEffect.invest():L.cardEffect.instant(c.val);
      p.text(eff, cx+cw/2, cy+20);
      if (c.effect && c.isSpecial) {
        const _duEff = (L.specialCardEffectNames && L.specialCardEffectNames[c.effect]) || c.effect;
        p.fill(140,115,175); p.textSize(9); p.text('◆ '+_duEff, cx+cw/2, cy+35);
      }
    });
    const cbx=CW/2-60,cby=py+ph-44;
    const hC=hov(cbx,cby,120,34);
    p.fill(hC?[52,68,112]:[30,42,78]); p.rect(cbx,cby,120,34,8);
    p.fill(175,188,225); p.textAlign(p.CENTER,p.CENTER); p.textSize(14);
    p.text(L.deckPopupClose, CW/2, cby+17);
  }

  // ── v0.3.3: NPCスキルパネル描画 ─────────────────────────────
  // ── v0.40: NPCスキルパネル描画（右下・大型化）──
  function drawSkillPanel() {
    const npcIdx = RUN ? RUN.playerNPC : 0;
    const defs = (NPC_SKILL_DEFS[npcIdx] || []).filter(d => d.type !== 'passive');
    const passiveDefs = (NPC_SKILL_DEFS[npcIdx]||[]).filter(d=>d.type==='passive');
    if (defs.length === 0 && passiveDefs.length === 0) return;

    const btnW = 218, btnH = 46, passH = 28, gap = 5;
    // パネル高さ：ラベル行 + passiveエントリー + activeスキル
    const labelH = 18;
    const panelH = labelH + passiveDefs.length*(passH+3) + (passiveDefs.length>0?4:0) + defs.length*(btnH+gap) - (defs.length>0?gap:0) + 8;
    const r0 = skillBtnRect(0);
    const panelX = r0.x - 4;
    // パネル上端：passiveを内包するためラベル分だけ上にずらす
    const extraTop = labelH + passiveDefs.length*(passH+3) + (passiveDefs.length>0?4:0);
    const panelY = r0.y - extraTop - 8;

    // パネル背景
    p.fill(10,14,28,210); p.stroke(48,60,98); p.strokeWeight(1.5);
    p.rect(panelX, panelY, btnW+8, panelH+8, 10);
    p.noStroke();
    // ラベル（パネル最上部）
    p.fill(175,195,235); p.textFont('Mochiy Pop One, sans-serif'); p.textSize(11); p.textAlign(p.LEFT,p.TOP);
    p.text((L.npcNames[npcIdx]||'')+' '+L.skillLabel, panelX+6, panelY+4);
    p.textFont('sans-serif');

    // passiveスキルをラベルの直下に表示（パネル内に収める）
    passiveDefs.forEach((def, pi) => {
      const pry = panelY + labelH + 2 + pi*(passH+3);
      const hBp = hov(r0.x, pry, btnW, passH);
      p.fill(18,30,22,220); p.stroke(40,110,65); p.strokeWeight(1);
      p.rect(r0.x, pry, btnW, passH, 5); p.noStroke();
      p.fill(0,160,70); p.rect(r0.x, pry, 5, passH, 3,0,0,3);
      p.fill(hBp?[200,255,220]:[90,170,115]); p.textSize(11); p.textAlign(p.LEFT,p.CENTER);
      p.text('P  '+(L[def.nameKey]||def.key), r0.x+10, pry+passH/2);
      p.fill(55,130,75); p.textSize(9); p.textAlign(p.RIGHT,p.CENTER);
      p.text(lang==='ja'?'常時':'passive', r0.x+btnW-8, pry+passH/2);
    });

    defs.forEach((def, i) => {
      const r = skillBtnRect(i);
      const charges = G.skillCharges[def.key];
      const usable  = canUseSkill(def.key);
      const isActive = G.skillActive[def.key];
      const isSelect = G.skillSelectMode && G.skillSelectMode.key === def.key;
      const hB = hov(r.x, r.y, r.w, r.h);

      let bgCol = [18,24,48], borderCol = [42,52,88];
      if (isSelect)      { bgCol=[42,28,72]; borderCol=[178,148,228]; }
      else if (isActive) { bgCol=[28,42,28]; borderCol=[52,192,108]; }
      else if (!usable)  { bgCol=[16,18,28]; borderCol=[32,38,58]; }
      else if (hB)       { bgCol=[32,42,72]; borderCol=[95,118,195]; }

      p.fill(...bgCol); p.stroke(...borderCol); p.strokeWeight(usable?2:1);
      p.rect(r.x, r.y, r.w, r.h, 7); p.noStroke();

      const tCol = def.type==='enhanced' ? [215,165,45] : [78,148,218];
      p.fill(...tCol); p.rect(r.x, r.y, 5, r.h, 3,0,0,3);

      const skillName = L[def.nameKey] || def.key;
      p.fill(usable?[220,225,255]:[95,102,138]); p.textSize(14); p.textAlign(p.LEFT,p.CENTER);
      p.text(skillName, r.x+12, r.y+r.h/2 - (def.type==='enhanced'?7:0));

      if (def.type === 'enhanced') {
        const hasPt = G.pScore >= def.cost;
        p.fill(hasPt?[215,178,50]:[175,85,85]); p.textSize(11); p.textAlign(p.LEFT,p.CENTER);
        p.text(L.skillCostLabel(def.cost), r.x+12, r.y+r.h/2+8);
      }
      if (charges === 0) {
        p.fill(82,88,115); p.textSize(11); p.textAlign(p.RIGHT,p.CENTER);
        p.text(L.skillUsed, r.x+r.w-10, r.y+r.h/2);
      } else if (charges > 0) {
        p.fill(usable?[108,188,148]:[70,90,115]); p.textSize(11); p.textAlign(p.RIGHT,p.CENTER);
        p.text(L.skillCharges(charges), r.x+r.w-10, r.y+r.h/2);
      }
    });

    // 選択モード案内
    if (G.skillSelectMode) {
      const def = G.skillSelectMode.def;
      const msg = def.target==='card'    ? (lang==='ja'?'▶ カードをクリック':'▶ Click a card') :
                  def.target==='die_both'? (lang==='ja'?'▶ 自分のダイスをクリック':'▶ Click your die') :
                  def.target==='die_any' ? (lang==='ja'?'▶ ダイスをクリック':'▶ Click a die') : '';
      if (msg) {
        const by = panelY + panelH + 12;
        p.noStroke(); p.fill(42,28,72,220); p.rect(panelX, by, btnW+8, 32, 8);
        p.fill(200,168,248); p.textSize(12); p.textAlign(p.CENTER,p.CENTER);
        p.text(msg, panelX+(btnW+8)/2, by+16);
      }
    }
  }


  // ── v0.40: カード詳細ホバーポップアップ ──────────────────
  // ── v0.40: カード詳細ホバーポップアップ（改善版）──
  function drawCardHoverPopup() {
    if (!G.market) return;
    let hovCard = null, hovR = null;
    for (let i = 0; i < G.market.length; i++) {
      const r = cRect(i);
      if (hov(r.x, r.y, r.w, r.h)) { hovCard = G.market[i]; hovR = r; break; }
    }
    if (!hovCard && G.specialCard) {
      const r = SC;
      if (hov(r.x, r.y, r.w, r.h)) { hovCard = { ...G.specialCard, isSpecialSlot: true }; hovR = r; }
    }
    if (!hovCard) return;

    const hasEffect = hovCard.effect && hovCard.isSpecial;
    const hasTarget = hasEffect && (hovCard.effect==='targetNum') && hovCard.targetVal!=null;
    const hasPtLine = hasEffect && (hovCard.effect==='ptBonus'||hovCard.effect==='oppPtMinus');
    const pw = 240;
    // EXカードスロット用のph（specialDescsは長めなので動的に）
    const _exDesc = hovCard.isSpecialSlot ? (L.specialDescs&&L.specialDescs[hovCard.effectType]||'') : '';
    const _exDescEst = _exDesc ? Math.max(2, Math.ceil(_exDesc.length/(lang==='ja'?14:26))) : 0;
    const _exPh = 36 + _exDescEst*15 + 14;
    // 通常カードの変化効果用ph
    const _eDescRaw = hasEffect ? ((hovCard.effect&&L.specialCardEffectDescs&&L.specialCardEffectDescs[hovCard.effect])||'') : '';
    const _eDescLines = _eDescRaw ? _eDescRaw.split('\n').length : 0;
    const _baseY = hasTarget ? 102 : 82;
    const _contentEnd = _baseY + _eDescLines*15 + (hasPtLine ? 22 : 0) + 12;
    const ph = hovCard.isSpecialSlot ? Math.max(100, _exPh) : (hasEffect ? Math.max(175, 58+_contentEnd) : 120);
    let px = hovR.x + hovR.w + 8;
    let py = hovR.y;
    if (px + pw > CW - 10) px = hovR.x - pw - 8;
    if (py + ph > CH - 10) py = CH - ph - 10;

    p.fill(12,16,32,240); p.stroke(62,82,138); p.strokeWeight(1.5);
    p.rect(px, py, pw, ph, 10); p.noStroke();

    p.textFont('Mochiy Pop One, sans-serif');
    if (hovCard.isSpecialSlot) {
      p.fill(200,148,255); p.textAlign(p.LEFT,p.TOP); p.textSize(15);
      p.text(L.specialNames[hovCard.effectType]||hovCard.effectType, px+10, py+12);
      p.textFont('sans-serif');
      p.fill(168,128,215); p.textSize(12); p.textAlign(p.LEFT,p.TOP);
      _wrapText(L.specialDescs[hovCard.effectType]||'', px+10, py+36, pw-20, 15, _exDescEst+2);
    } else {
      const tc = typeCol(hovCard.type);
      const _hcName = (hovCard.isSpecial && hovCard.spName) ? hovCard.spName : (L.cardNames[hovCard.key]||hovCard.key);
      p.fill(...tc); p.textAlign(p.LEFT,p.TOP); p.textSize(15);
      p.text(_hcName, px+10, py+12);
      p.textFont('sans-serif');
      const effStr = hovCard.type==='income'?L.cardEffect.income(hovCard.val):
                     hovCard.type==='invest'?L.cardEffect.invest():
                     L.cardEffect.instant(hovCard.val);
      p.fill(175,188,225); p.textSize(13); p.textAlign(p.LEFT,p.TOP);
      p.text(effStr, px+10, py+35);
      // 変化効果（左寄せ・drawMultilineTextをLEFT ALIGNで）
      if (hasEffect) {
        const eName = (L.specialCardEffectNames&&L.specialCardEffectNames[hovCard.effect])||hovCard.effect;
        const eDesc = (L.specialCardEffectDescs&&L.specialCardEffectDescs[hovCard.effect])||'';
        p.noStroke(); p.fill(32,22,52); p.rect(px+8, py+58, pw-16, hasTarget?78:62, 6);
        p.fill(178,148,228); p.textSize(12); p.textAlign(p.LEFT,p.TOP);
        p.text('◆ '+eName, px+14, py+64);
        if (hasTarget) {
          p.fill(215,178,50); p.textSize(13);
          p.text((lang==='ja'?'目標値: ':'Target: ')+hovCard.targetVal, px+14, py+82);
        }
        p.fill(155,128,200); p.textSize(11); p.textAlign(p.LEFT,p.TOP);
        // \nで分割して左寄せ描画
        (eDesc||'').split('\n').forEach((line,li)=>{
          p.text(line, px+14, py+(hasTarget?102:82)+li*15, pw-28, 30);
        });
        // ptBonus / oppPtMinus：eDescの実際の行数直後に表示
        if (hovCard.effect === 'ptBonus' || hovCard.effect === 'oppPtMinus') {

          p.fill(215,190,255); p.textSize(12); p.textAlign(p.LEFT,p.TOP);
          p.text(ptTxt, px+14, _ptY);
        }
      }
      // オーナー
      const owner = hovCard.owner==='p'?L.you:L.opp;
      const oc = hovCard.owner==='p'?[52,192,108]:[182,85,85];
      p.fill(...oc,180); p.textSize(10); p.textAlign(p.RIGHT,p.BOTTOM);
      p.text(owner+(lang==='ja'?'のカード':"'s card"), px+pw-8, py+ph-6);
    }
  }

      p.rect(tx,ty,tw,th,10); p.noStroke();

  function drawTiebreak() {
    const tb = G.tb, rolling = tb.rollF > 0;
    p.fill(0, 0, 0, 162); p.noStroke(); p.rect(0, 0, CW, CH);
    p.fill(16, 22, 38); p.stroke(90, 110, 168); p.strokeWeight(2); p.rect(CW / 2 - 330, CH / 2 - 185, 660, 370, 14);
    p.noStroke(); p.fill(202, 168, 50); p.textAlign(p.CENTER, p.CENTER); p.textSize(19); p.text(L.tbTitle(tb.displayName), CW / 2, CH / 2 - 155);
    const dS = 55, dGap = 10;
    const pN = tb.pD.length, aN = tb.aD.length;
    const maxPerRow = 4;
    const diceY = CH / 2 - 90;
    // プレイヤーダイス（左側・複数行対応）
    const pRows = Math.ceil(pN/maxPerRow);
    const pGW = Math.min(pN,maxPerRow)*(dS+dGap)-dGap;
    const pSX = CW/2-50-pGW;
    tb.pD.forEach((v,i)=>{ const row=Math.floor(i/maxPerRow),col=i%maxPerRow; drawDie(pSX+col*(dS+dGap), diceY+row*(dS+8), rolling?rng(1,6):v, dS, [58,108,192], false, false); });
    p.fill(65,188,125); p.textSize(15); p.textAlign(p.CENTER,p.CENTER);
    if(!rolling) p.text(L.tbYouScore(tb.pt), pSX+pGW/2, diceY-20);
    // AI側ダイス（右側・複数行対応）
    const aGW = Math.min(aN,maxPerRow)*(dS+dGap)-dGap;
    const aSX = CW/2+50;
    tb.aD.forEach((v,i)=>{ const row=Math.floor(i/maxPerRow),col=i%maxPerRow; drawDie(aSX+col*(dS+dGap), diceY+row*(dS+8), rolling?rng(1,6):v, dS, [152,65,65], false, false); });
    p.fill(182,85,85); p.textSize(15); p.textAlign(p.CENTER,p.CENTER);
    if(!rolling) p.text(L.tbOppScore(tb.at), aSX+aGW/2, diceY-20);
    p.fill(148,158,200); p.textSize(24); p.textAlign(p.CENTER,p.CENTER); p.text('VS', CW/2, diceY+dS/2);
    if (tb.showResult) {
      p.textSize(24);
      if      (tb.res === 'p') { p.fill(68, 215, 130); p.text(L.tbWinP,  CW / 2, CH / 2 + 52); }
      else if (tb.res === 'a') { p.fill(212, 82, 82);  p.text(L.tbWinA,  CW / 2, CH / 2 + 52); }
      else                      { p.fill(208, 175, 52); p.text(L.tbAgain, CW / 2, CH / 2 + 52); }
    }
    if (tb.showBtn) {
      const lbl = tb.res === 'again' ? L.tbRetry : L.tbContinue;
      const bx = CW / 2 - 92, by = CH / 2 + 86;
      const hB = hov(bx, by, 184, 40);
      p.fill(hB ? [52, 92, 168] : [34, 64, 135]); p.rect(bx, by, 184, 40, 9);
      p.fill(202, 218, 255); p.textAlign(p.CENTER, p.CENTER); p.textSize(17); p.text(lbl, CW / 2, by + 20);
    }
  }

  // ── STAGE RESULT scene ──
  // ── DRAFT scene ──
  function drawDraft() {
    drawSceneBg('bg_draft', 0.10);
    drawBackBtn(); drawHelpBtn();
    if (helpOpen) { drawHelp(); return; }

    const ds = DS_STATE;
    const isTagPhase  = ds.phase === 'TAG_SELECT';
    const isBidPhase  = ds.phase === 'BID_SELECT';
    const isRevealed  = ['REVEALED','PRIORITY_CHOICE','DONE','TIEBREAK'].includes(ds.phase);
    const showAISlot  = isBidPhase || isRevealed; // TAG_SELECTではAI割当先非表示

    // ── 左サイドパネル（タイトル・フェーズ・Pt・タグを縦積み）──
    // 薄い背景
    p.noStroke(); p.fill(12,16,32,200);
    p.rect(0,0,DRAFT_PANEL_W,CH);
    p.stroke(32,42,72); p.strokeWeight(1); p.line(DRAFT_PANEL_W,0,DRAFT_PANEL_W,CH);
    p.noStroke();

    // タイトル
    p.textFont('Mochiy Pop One, sans-serif');
    p.fill(52,192,108); p.textAlign(p.LEFT,p.TOP); p.textSize(16);
    p.text(ds.isInitialDraft ? L.initialDraftTitle : L.draftSceneTitle, 8, 8);
    p.textFont('sans-serif');

    // フェーズ
    const phaseTxt = isTagPhase ? L.draftTagSelectTitle : isBidPhase ? L.draftBidPhaseTitle : '';
    if (phaseTxt) {
      p.fill(175,185,220); p.textSize(10); p.textAlign(p.LEFT,p.TOP);
      // 長い文字列は折り返して表示
      const phLines = phaseTxt.split(/(.{10})/g).filter(Boolean);
      phLines.forEach((l,i)=>p.text(l,8,30+i*14));
    }

    // Pt残り
    const ptUsed = Object.values(ds.playerBids).reduce((s,v)=>s+v,0);
    const ptRemain = ds.playerPt - ptUsed;
    p.fill(215,178,50); p.textSize(13); p.textAlign(p.LEFT,p.TOP);
    p.text(L.draftPtRemain(ptRemain), 8, 72);

    // プレイヤータグ（2列表示・あなた（NPC名）のタグ）
    if (!isRevealed) {
      const remTags = ds.playerTags.filter(t=>!t.used);
      const pNpcName = RUN && RUN.playerNPC !== undefined ? L.npcNames[RUN.playerNPC] : '';
      // ラベル：「あなた（茶々）のタグ」
      p.fill(65,188,128); p.textSize(10); p.textAlign(p.LEFT,p.TOP);
      p.text(lang==='ja'?`あなた（${pNpcName}）`:`You (${pNpcName})`, 8, 92);
      p.fill(148,162,205); p.textSize(9); p.text(lang==='ja'?'のタグ残り:':'tags left:', 8, 103);
      remTags.forEach((t,ti)=>{
        const col=ti%2, row=Math.floor(ti/2);
        const tx=8+col*58, ty=116+row*24;
        const tc=t.mult>=2?[168,88,218]:[58,108,195];
        p.fill(...tc); p.rect(tx,ty,52,18,4);
        p.fill(230,240,255); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
        p.text(t.mult>=2?'×2.0':'×1.5', tx+26, ty+9);
      });

      // 区切り線
      const sepY = 116 + Math.ceil(ds.playerTags.length/2)*24 + 6;
      p.stroke(42,52,82); p.strokeWeight(1); p.line(4, sepY, DRAFT_PANEL_W-4, sepY); p.noStroke();

      // AIタグ（2列表示・相手（NPC名）のタグ）
      const allAITags = ds.aiTagsAvail;
      const aiNpcName = RUN && RUN.aiNPC !== undefined ? L.npcNames[RUN.aiNPC] : '';
      const aiCharName = L.aiCharNames ? L.aiCharNames[CFG.aiChar] : '';
      const aiY0 = sepY + 18;
      p.fill(182,85,85); p.textSize(10); p.textAlign(p.LEFT,p.TOP);
      p.text(lang==='ja'?`相手（${aiNpcName}）`:`Opp (${aiNpcName})`, 8, aiY0);
      p.fill(148,90,210); p.textSize(9); p.text(lang==='ja'?'のタグ残り:':'tags left:', 8, aiY0+11);
      allAITags.forEach((t,ti)=>{
        const col=ti%2, row=Math.floor(ti/2);
        const tx=8+col*58, ty=aiY0+24+row*24;
        const tc=t.mult>=2?[118,38,188]:[28,68,155];
        p.fill(...tc); p.rect(tx,ty,52,18,4);
        p.fill(215,225,255); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
        p.text(t.mult>=2?'A×2.0':'A×1.5', tx+26, ty+9);
      });
    }

    // ── スロットグリッド ──
    ds.slots.forEach((slot,i)=>{
      const r=draftSlotRect(i);
      const bid=ds.playerBids[slot.id]||0;
      const aiBid=ds.aiBids[slot.id]||0;
      const winner=ds.winners[slot.id];
      const tm=ds.slotTagMap[slot.id]||{};
      const pMult=tm.pMult||null;
      const aMult=tm.aMult||null;
      const isFixed=['priority','dice','special'].includes(slot.kind);
      const hB=hov(r.x,r.y,DRAFT_SLOT_W,DRAFT_SLOT_H);

      // 背景
      let bgCol=[16,22,42],borderCol=[38,52,82];
      if(winner==='p'&&isRevealed){bgCol=[16,42,26];borderCol=[52,192,108];}
      else if(winner==='a'&&isRevealed){bgCol=[38,16,16];borderCol=[192,68,68];}
      else if(pMult){borderCol=pMult>=2?[168,88,218]:[58,108,195];}
      else if(hB&&!isRevealed){bgCol=[22,30,52];borderCol=[72,96,148];}
      p.fill(...bgCol); p.stroke(...borderCol); p.strokeWeight(isFixed?2:1.5);
      p.rect(r.x,r.y,DRAFT_SLOT_W,DRAFT_SLOT_H,10); p.noStroke();

      // 種別ストライプ
      const sc=slot.kind==='priority'?[215,178,50]:slot.kind==='dice'?[78,132,218]:slot.kind==='special'?[168,88,218]:[88,100,138];
      p.fill(...sc); p.rect(r.x,r.y,DRAFT_SLOT_W,4,10,10,0,0);

      // スロット名（タグボタンの下）
      p.fill(210,220,250); p.textAlign(p.CENTER,p.TOP); p.textSize(16);
      p.textFont('Mochiy Pop One, sans-serif');
      p.text(slot.name(), r.x+DRAFT_SLOT_W/2, r.y+32); p.textFont('sans-serif');

      // 説明文（\n対応・手動multiline）
      p.fill(185,198,235); p.textSize(11); p.textAlign(p.CENTER,p.TOP);
      drawMultilineText(slot.desc(), r.x+DRAFT_SLOT_W/2, r.y+55, 18);

      // 追加情報（種別固有の効果表示）
      if(slot.kind==='dice'){
        p.fill(108,172,248); p.textSize(13); p.textAlign(p.CENTER,p.TOP);
        p.text('ダイス +1個/turn', r.x+DRAFT_SLOT_W/2, r.y+94);
      } else if(slot.kind==='special'&&slot.card){
        const tc=typeCol(slot.card.type);
        p.fill(...tc); p.textSize(13); p.textAlign(p.CENTER,p.TOP);
        const eff=slot.card.type==='income'?L.cardEffect.income(slot.card.val):slot.card.type==='invest'?L.cardEffect.invest():L.cardEffect.instant(slot.card.val);
        p.text(eff, r.x+DRAFT_SLOT_W/2, r.y+94);
        // 変化効果（2つ目の効果）
        if(slot.card.effect){
          const effName = (L.specialCardEffectNames&&L.specialCardEffectNames[slot.card.effect])||slot.card.effect;
          const effDesc = (L.specialCardEffectDescs&&L.specialCardEffectDescs[slot.card.effect])||'';
          p.fill(178,148,228); p.textSize(11); p.textAlign(p.CENTER,p.TOP);
          p.text('◆ '+effName, r.x+DRAFT_SLOT_W/2, r.y+112);
          p.fill(158,135,205); p.textSize(10); p.textAlign(p.CENTER,p.TOP);
          drawMultilineText(effDesc, r.x+DRAFT_SLOT_W/2, r.y+126, 14);
        }
      }
      // アイテムはdesc()で\n改行済みのため追加レンダリング不要

      // 入札UI（スロット下部）
      const bidY=r.y+DRAFT_SLOT_H-60;
      p.fill(18,24,42); p.rect(r.x+6,bidY,DRAFT_SLOT_W-12,50,6);
      if(!isRevealed){
        const btnW=28,btnH=24,mX=r.x+10,pX=r.x+DRAFT_SLOT_W-38,bY=bidY+8;
        const hM=hov(mX,bY,btnW,btnH),hP=hov(pX,bY,btnW,btnH);
        p.fill(hM?[55,72,112]:[30,42,78]); p.rect(mX,bY,btnW,btnH,4);
        p.fill(hP?[55,72,112]:[30,42,78]); p.rect(pX,bY,btnW,btnH,4);
        p.fill(175,188,225); p.textSize(18); p.textAlign(p.CENTER,p.CENTER);
        p.text('−',mX+btnW/2,bY+btnH/2); p.text('+',pX+btnW/2,bY+btnH/2);
        const effBid=pMult?Math.round(bid*pMult):bid;
        p.fill(isBidPhase?[215,220,248]:[108,120,158]); p.textSize(22); p.textAlign(p.CENTER,p.CENTER);
        p.text(bid, r.x+DRAFT_SLOT_W/2, bY+btnH/2);
        if(pMult){
          p.fill(pMult>=2?[200,140,255]:[140,180,255]); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
          p.text('→ '+effBid+'pt (×'+pMult+')', r.x+DRAFT_SLOT_W/2, bidY+42);
        } else {
          p.fill(58,70,105); p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
          p.text(L.draftBidLabel, r.x+DRAFT_SLOT_W/2, bidY+42);
        }
      } else {
        const effBid=ds.effectivePBids?(ds.effectivePBids[slot.id]||bid):bid;
        p.fill(65,188,128); p.textSize(14); p.textAlign(p.LEFT,p.CENTER);
        p.text(L.draftBidLabel+': '+effBid+'pt', r.x+10, bidY+18);
        p.fill(182,85,85); p.textAlign(p.LEFT,p.CENTER);
        p.text(L.draftOppBidLabel+': '+aiBid+'pt', r.x+10, bidY+36);
        if(winner&&winner!=='tie'){
          const wc=winner==='p'?[52,192,108]:[192,68,68];
          const wl=winner==='p'?L.draftWonLabel:L.draftLostLabel;
          p.fill(...wc); p.rect(r.x+DRAFT_SLOT_W-62,r.y+34,56,20,6);

          p.text(wl, r.x+DRAFT_SLOT_W-34, r.y+44);
        }
      }

      // プレイヤータグボタン（スロット左上）
      const pbr=draftTagBtnRect(i,'p');
      const hasPTag=!!pMult;
      const canAssign=ds.playerTags.filter(t=>!t.used).length>0&&!hasPTag;
      p.fill(hasPTag?(pMult>=2?[148,58,218]:[38,88,175]):(hB&&canAssign&&isTagPhase?[55,72,125]:[24,32,58]));
      p.stroke(hasPTag?(pMult>=2?[200,120,255]:[90,150,255]):[48,62,100]); p.strokeWeight(hasPTag?2:1);
      p.rect(pbr.x,pbr.y,pbr.w,pbr.h,4); p.noStroke();
      p.fill(hasPTag?[235,248,255]:(canAssign&&isTagPhase?[155,175,215]:[55,65,90]));
      p.textSize(11); p.textAlign(p.CENTER,p.CENTER);
      p.text(hasPTag?'P×'+pMult:(canAssign&&isTagPhase?'タグ':'−'), pbr.x+pbr.w/2, pbr.y+pbr.h/2);

      // AIタグ：BID_SELECT以降のみ割当先を表示、TAG_SELECTは枚数のみ

  p.mousePressed = function () {
    if (scene === 'GAME' && ['ASSIGN', 'SWAP_SELECT'].includes(G.phase) && !helpOpen) {
      dragS = { x: p.mouseX, y: p.mouseY }; dragE = { x: p.mouseX, y: p.mouseY }; isDragging = false;
    }
    if (scene === 'TITLE') EGG.onPress(p.mouseX, p.mouseY);
    // DRAFT D&D: タグのドラッグ開始
    if (scene === 'DRAFT' && DS_STATE.phase === 'TAG_SELECT') {
      const ds = DS_STATE;
      let tx = 90;
      const remTags = ds.playerTags.filter(t=>!t.used);
      remTags.forEach(t=>{
        if (hov(tx,44,40,18)) {
          ds.dragTag = { mult:t.mult, tagRef:t, active:true };
          ds.dragX = p.mouseX; ds.dragY = p.mouseY;
        }
        tx+=46;
      });
    }
  };

  p.mouseDragged = function () {
    if (scene === 'TITLE') return; if (helpOpen) return;
    // DRAFT D&D更新
    if (scene === 'DRAFT' && DS_STATE.dragTag && DS_STATE.dragTag.active) {
      DS_STATE.dragX = p.mouseX; DS_STATE.dragY = p.mouseY; return;
    }
    if (!dragS) return;
    dragE = { x: p.mouseX, y: p.mouseY };
    const dx = dragE.x - dragS.x, dy = dragE.y - dragS.y;
    if (Math.sqrt(dx * dx + dy * dy) > 14) isDragging = true;
  };

  p.mouseWheel = function (event) {
    if (helpOpen) {
      helpScrollY = Math.max(0, helpScrollY + event.delta * 0.6);
      return false; // prevent page scroll
    }
  };

  // ── タッチ操作対応 ──────────────────────────────────────────
  let _lastTouchTime = 0;
  const _TOUCH_DEBOUNCE = 280; // ms: 二重タップ防止

  p.touchStarted = function () {
    return false; // スクロール等デフォルト動作を抑制
  };

  p.touchMoved = function () {
    return false; // タッチ中のページスクロールを抑制
  };

  p.touchEnded = function () {
    const now = Date.now();
    if (now - _lastTouchTime < _TOUCH_DEBOUNCE) return false;
    _lastTouchTime = now;
    // タッチ座標をmouseX/Yに反映してmouseReleasedを実行
    p.mouseReleased();
    return false;
  };

  p.mouseReleased = function () {
    // ── チュートリアルヒントの閉じるボタン ──
    if (!tutorialShown && scene === 'GAME' && G.phase === 'ASSIGN' && G.turn === 1 && RUN && RUN.currentStage === 1) {
      const _tw=320, _th=4*52+24, _tx=16, _ty=(CH-_th)/2-20;
      const _bx=_tx+_tw-72, _by2=_ty+_th-32;
      if (hov(_bx, _by2, 64, 24)) { tutorialShown=true; return; }
    }
    // ── Help overlay ──
    if (helpOpen) {
      const hbx=HELP.bx(),hby=HELP.by(),hbw=HELP.bw,hbh=HELP.bh;
      const cbx=CW/2-58, cby=hby+hbh-48;
      if(hov(cbx,cby,116,36)){helpOpen=false;helpScrollY=0;return;}
      const sbw=HELP.sbw,sbx=hbx+8,cty=HELP.cty();
      for(let i=0;i<L.helpTabs.length;i++){if(hov(sbx,cty+i*44,sbw,40)){helpTab=i;helpScrollY=0;return;}}
      if(!hov(hbx,hby,hbw,hbh)){helpOpen=false;helpScrollY=0;return;}
      return;
    }

    // ── Help/Back buttons (most scenes) ──
    if (scene !== 'TITLE' && scene !== 'STAGE_RESULT' && scene !== 'RUN_RESULT') {
      if (hov(HELP_BTN.x, HELP_BTN.y, HELP_BTN.w, HELP_BTN.h)) { helpOpen = true; return; }
    }
    if (hov(BACK_BTN.x, BACK_BTN.y, BACK_BTN.w, BACK_BTN.h) && scene !== 'TITLE') {
      if (scene === 'CONFIG')       { EGG.reset(); scene = 'TITLE'; return; }
      if (scene === 'NPC_SELECT')   { scene = 'CONFIG'; return; }
      if (scene === 'GAME')         { gaEvent('run_quit', { scene: 'game', stage: RUN&&RUN.currentStage||1, turn: G&&G.turn||1 }); scene = 'CONFIG'; return; }
      if (scene === 'STAGE_RESULT') { gaEvent('run_quit', { scene: 'stage_result', stage: RUN&&RUN.currentStage||1, turn: G&&G.turn||1 }); EGG.reset(); scene = 'TITLE'; return; }
      if (scene === 'DRAFT')        { gaEvent('run_quit', { scene: 'draft', stage: RUN&&RUN.currentStage||1, turn: 0 }); EGG.reset(); scene = 'TITLE'; return; }
      if (scene === 'RUN_RESULT')   { EGG.reset(); scene = 'TITLE'; return; }
    }

    // ── TITLE ──
    if (scene === 'TITLE') {
      if (EGG.onRelease(p.mouseX, p.mouseY)) return; if (EGG.heldIdx >= 0) return;
      if (hov(14, 8, 80, 26)) { setLang('ja'); return; }
      if (hov(14, 36, 80, 26)) { setLang('en'); return; }
      if (hov(CW / 2 - 150, CH - 112, 300, 56)) { scene = 'CONFIG'; return; }
      return;
    }

    // ── CONFIG ──
    if (scene === 'CONFIG') {
      const cbw = 136, cbh = 54, cgap = 12, csx = CFG_RX + (CFG_RW - 2 * cbw - cgap) / 2;
      for (let i = 0; i < 4; i++) {
        const row = Math.floor(i / 2), col = i % 2;
        const bx = csx + col * (cbw + cgap), by = 82 + row * (cbh + cgap);
        if (hov(bx, by, cbw, cbh)) { CFG.aiChar = i; return; }
      }
      const bwL = cfgRowBtnW(TURN_OPTIONS);
      TURN_OPTIONS.forEach((v, i) => { if (hov(CFG_LX + i * (bwL + 10), 100, bwL, 36)) CFG.turns = v; });
      const midX = CFG_LX + CFG_LW / 2;
      if (hov(midX - 80, 190, 46, 36)) CFG.pDice = clamp(CFG.pDice - 1, 1, 10);
      if (hov(midX + 34, 190, 46, 36)) CFG.pDice = clamp(CFG.pDice + 1, 1, 10);
      if (hov(midX - 80, 264, 46, 36)) CFG.aDice = clamp(CFG.aDice - 1, 1, 10);
      if (hov(midX + 34, 264, 46, 36)) CFG.aDice = clamp(CFG.aDice + 1, 1, 10);
      const bwC = cfgRowBtnW(CARD_OPTIONS);
      CARD_OPTIONS.forEach((v, i) => { if (hov(CFG_LX + i * (bwC + 10), 340, bwC, 36)) CFG.marketCards = v; });
      const bwK = Math.floor((CFG_LW - 10 * 3) / 4);
      [0, 1, 2, 3].forEach(i => { if (hov(CFG_LX + i * (bwK + 10), 418, bwK, 36)) CFG.keepLimit = i; });
      const bwS = cfgRowBtnW(STAGE_OPTIONS);
      STAGE_OPTIONS.forEach((v, i) => { if (hov(CFG_LX + i * (bwS + 10), 510, bwS, 36)) CFG.stages = v; });
      if (hov(CFG_LX, 612, CFG_LW, 50)) { scene = 'NPC_SELECT'; return; }
      return;
    }

    // ── NPC SELECT ──
    if (scene === 'NPC_SELECT') {
      for (let i = 0; i < 4; i++) {
        const cx = NPC_CARD_START_X + i * (NPC_CARD_W + NPC_CARD_GAP);
        if (hov(cx, NPC_CARD_Y, NPC_CARD_W, NPC_CARD_H)) { selectedNPC = i; return; }
      }
      const btnX = CW / 2 - 120, btnY = CH - 80;
      if (hov(btnX, btnY, 240, 50)) {

        this.words.push({ txt, ax, ay, cx, cy, x: cx, y: cy, ha, va, sz, col, font: font || 'sans', hitR: Math.max(28, tw / 2 + 4), vx: 0, vy: 0, va2: 0, angle: 0, alive: true });
      };
      addW('日本語', 18, 22, 'left', 'center', 14, lang === 'ja' ? [215, 178, 48] : [88, 96, 128], 'mochiy');
      addW('English', 18, 50, 'left', 'center', 14, lang === 'en' ? [215, 178, 48] : [88, 96, 128], 'mochiy');
      const tw = this._mw(L.gameTitle, 64, 'mochiy'); this.titleHitW = Math.max(tw + 60, 400);
      addW(L.gameTitle, CW / 2, 160, 'center', 'center', 64, [52, 192, 108], 'mochiy');
      L.titleSummary.forEach((line, i) => addW(line, CW / 2, 250 + i * 32, 'center', 'center', 17, [165, 175, 210], 'sans'));
      addW(L.startBtn, CW / 2, 380, 'center', 'center', 22, [205, 248, 218], 'mochiy');
      addW(L.version, CW - 12, CH - 8, 'right', 'bottom', 11, [58, 72, 105], 'sans');
      addW(L.eggPull, CW / 2, CH - 18, 'center', 'center', 14, [165, 130, 50], 'sans');
    },
    isOnTitle(mx, my) { const hw = this.titleHitW / 2; return mx > CW / 2 - hw && mx < CW / 2 + hw && my > 120 && my < 200; },
    spawnDieAt(idx) { const pos = this.SPAWN[idx]; this.dice[idx] = { x: pos.x, y: pos.y, vx: 0, vy: 0, val: rng(1, 6), angle: 0, angVel: 0, state: 'waiting', respawnTimer: 0, anchor: { x: pos.x, y: pos.y }, idx }; },
    activate() { this.buildWords(); this.dice = [null, null]; this.spawnDieAt(0); this.spawnDieAt(1); },
    spawnParts(x, y, col) { for (let i = 0; i < 8; i++) { const a = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 5; this.particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1, life: 1, col }); } },
    update() {
      this.glow = (this.glow + 0.06) % (Math.PI * 2);
      this.dice.forEach((die, idx) => {
        if (!die) return;
        if (die.state === 'respawning') { die.respawnTimer--; if (die.respawnTimer <= 0) this.spawnDieAt(idx); return; }
        if (die.state === 'held') { die.x = p.mouseX; die.y = p.mouseY; die.angle = Math.atan2(die.y - die.anchor.y, die.x - die.anchor.x) * 0.3; return; }
        if (die.state === 'flying') {
          die.vy += 0.04; die.x += die.vx; die.y += die.vy; die.angle += die.angVel; die.angVel *= 0.98;
          const R = 27;
          if (die.x < R) { die.x = R; die.vx = Math.abs(die.vx) * 0.80; this.spawnParts(die.x, die.y, [220, 180, 60]); }
          if (die.x > CW - R) { die.x = CW - R; die.vx = -Math.abs(die.vx) * 0.80; this.spawnParts(die.x, die.y, [220, 180, 60]); }
          if (die.y < R) { die.y = R; die.vy = Math.abs(die.vy) * 0.80; }
          if (die.y > CH + 80) { die.state = 'respawning'; die.respawnTimer = 20; return; }
          const spd = Math.sqrt(die.vx ** 2 + die.vy ** 2);
          if (spd > 0.5) {
            this.words.forEach(w => {
              if (!w.alive) return;
              const dx = die.x - w.cx, dy = die.y - w.cy, dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < w.hitR + R) {
                const nx = dx / dist, ny = dy / dist;
                w.vx = nx * spd * 0.9 + die.vx * 0.35 + (Math.random() - 0.5) * 2;
                w.vy = ny * spd * 0.9 + die.vy * 0.35 - 1.5; w.va2 = (Math.random() - 0.5) * 0.22; w.alive = false;
                this.spawnParts(w.cx, w.cy, w.col); die.vx -= nx * spd * 0.2; die.vy -= ny * spd * 0.2; die.angVel += (Math.random() - 0.5) * 0.6;
              }
            });
          }
          if (this.words.length > 0 && this.words.every(w => !w.alive)) this.thankYou = true;
        }
      });
      this.words.filter(w => !w.alive).forEach(w => { w.vy += 0.15; w.vx *= 0.99; w.x += w.vx; w.y += w.vy; w.angle += w.va2; });
      this.particles = this.particles.filter(pt => { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.07; pt.life -= 0.033; return pt.life > 0; });
      if (this.thankYou) { this.tyAlpha = Math.min(255, this.tyAlpha + 3.5); this.tyScale = Math.min(1, this.tyScale + 0.035); }
    },
    drawWords() {
      this.words.forEach(w => {
        p.push(); p.noStroke();
        if (w.alive) {
          p.fill(w.col[0], w.col[1], w.col[2]);
          p.textAlign(w.ha === 'left' ? p.LEFT : w.ha === 'right' ? p.RIGHT : p.CENTER, w.va === 'top' ? p.TOP : w.va === 'bottom' ? p.BOTTOM : p.CENTER);
          p.textSize(w.sz); p.textFont(w.font === 'mochiy' ? 'Mochiy Pop One, sans-serif' : 'sans-serif');
          p.text(w.txt, w.ax, w.ay); p.textFont('sans-serif');
        } else {
          p.translate(w.x, w.y); p.rotate(w.angle); p.fill(w.col[0], w.col[1], w.col[2], 100);
          p.textAlign(p.CENTER, p.CENTER); p.textSize(w.sz); p.textFont(w.font === 'mochiy' ? 'Mochiy Pop One, sans-serif' : 'sans-serif');
          p.text(w.txt, 0, 0); p.textFont('sans-serif');
        }
        p.pop();
      });
    },
    drawDice() {
      const PIPSD = { 1: [[0,0]], 2: [[-9,-9],[9,9]], 3: [[-9,-9],[0,0],[9,9]], 4: [[-9,-9],[9,-9],[-9,9],[9,9]], 5: [[-9,-9],[9,-9],[0,0],[-9,9],[9,9]], 6: [[-9,-8],[9,-8],[-9,0],[9,0],[-9,8],[9,8]] };
      this.dice.forEach(die => {
        if (!die || die.state === 'respawning') return;
        const isW = die.state === 'waiting', isH = die.state === 'held';
        if (isH) {
          const ax = die.anchor.x, ay = die.anchor.y, tension = Math.min(Math.sqrt((die.x - ax) ** 2 + (die.y - ay) ** 2) / 160, 1);
          const r = Math.round(180 + 75 * tension), g2 = Math.round(120 - 80 * tension);
          const ang = Math.atan2(die.y - ay, die.x - ax), fw = 11;
          p.stroke(r, g2, 40, 200); p.strokeWeight(2.5);
          p.line(ax + Math.cos(ang + Math.PI / 2) * fw, ay + Math.sin(ang + Math.PI / 2) * fw, die.x, die.y);
          p.line(ax + Math.cos(ang - Math.PI / 2) * fw, ay + Math.sin(ang - Math.PI / 2) * fw, die.x, die.y);
          p.noStroke(); p.fill(r, g2, 40, 180); p.ellipse(ax, ay, 12, 12);
        }
        p.push(); p.translate(die.x, die.y); p.rotate(die.angle);
        if (isW) { const pulse = Math.sin(this.glow * 2) * 0.5 + 0.5; p.noStroke(); p.fill(215, 178, 50, pulse * 80); p.ellipse(0, 0, 72 + pulse * 16, 72 + pulse * 16); }
        p.noStroke(); p.fill(0, 0, 0, 60); p.rect(3, 3, 54, 54, 9);
        p.stroke(isW ? [255, 215, 80] : isH ? [255, 80, 80] : [195, 55, 55]); p.strokeWeight(2.5);
        p.fill(isW ? [212, 165, 45] : isH ? [185, 55, 55] : [195, 55, 55]); p.rect(-27, -27, 54, 54, 9);
        p.noStroke(); p.fill(255, 240, 240); (PIPSD[die.val] || []).forEach(([px, py]) => p.ellipse(px, py, 8, 8));
        p.pop();
      });
      this.dice.forEach(die => {
        if (!die || die.state !== 'respawning') return;
        const prog = die.respawnTimer / 20, pos = this.SPAWN[die.idx];
        p.noStroke(); p.fill(215, 178, 50, 120 * prog); p.ellipse(pos.x, pos.y, 22 * prog, 22 * prog);
      });
    },
    drawParticles() { this.particles.forEach(pt => { p.noStroke(); p.fill(pt.col[0], pt.col[1], pt.col[2], pt.life * 200); p.ellipse(pt.x, pt.y, 7 * pt.life, 7 * pt.life); }); },
    drawThankYou() {
      if (!this.thankYou) return;
      p.push(); p.translate(CW / 2, CH / 2); p.scale(this.tyScale); p.noStroke();
      for (let r = 5; r > 0; r--) p.fill(215, 178, 50, this.tyAlpha * (r / 5) * 0.18), p.ellipse(0, 0, r * 180, r * 80);
      p.textFont('Mochiy Pop One, sans-serif'); p.fill(215, 178, 50, this.tyAlpha); p.textAlign(p.CENTER, p.CENTER); p.textSize(56); p.text('Thank you for playing!', 0, 0); p.textFont('sans-serif'); p.pop();
    },
    onPress(mx, my) {
      if (this.thankYou) return false;
      if (!this.words.length) { if (this.isOnTitle(mx, my)) { this.activate(); return true; } return false; }
      if (this.heldIdx < 0) {
        let bestDist = 9999, bestIdx = -1;
        this.dice.forEach((die, idx) => { if (!die || die.state !== 'waiting') return; const dx = mx - die.x, dy = my - die.y, dist = Math.sqrt(dx * dx + dy * dy); if (dist < 40 && dist < bestDist) { bestDist = dist; bestIdx = idx; } });
        if (bestIdx >= 0) { this.dice[bestIdx].state = 'held'; this.heldIdx = bestIdx; return true; }
      }
      return false;
    },
    onRelease(mx, my) {
      if (this.heldIdx < 0) return false;
      const die = this.dice[this.heldIdx]; if (!die) { this.heldIdx = -1; return false; }
      const ax = die.anchor.x, ay = die.anchor.y, dx = ax - mx, dy = ay - my, dist = Math.sqrt(dx * dx + dy * dy);
      const speed = clamp(dist * 0.18, 7, 50);
      if (dist > 2) { die.vx = (dx / dist) * speed; die.vy = (dy / dist) * speed; }
      else { die.vx = (Math.random() - 0.5) * 7; die.vy = -7; }
      die.angVel = die.vx * 0.06; die.val = rng(1, 6); die.state = 'flying'; this.heldIdx = -1; return true;
    }
  };

  p.setup = function () {
    p.createCanvas(CW, CH).parent('gc'); p.pixelDensity(1);

    // Load AI character images
    const aiPaths = ['character_elder', 'character_stella', 'character_shadow', 'character_noir'];
    aiPaths.forEach((name, i) => {
      p.loadImage('./assets/' + name + '.png',
        img => { charImgs[i] = img; },
        ()  => { charImgs[i] = null; }
      );
    });

    // Load NPC partner images
    const npcPaths = ['npc_chacha', 'npc_sento', 'npc_fukuya', 'npc_nana'];
    npcPaths.forEach((name, i) => {
      p.loadImage('./assets/' + name + '.png',
        img => { npcImgs[i] = img; },
        ()  => { npcImgs[i] = null; }
      );
    });
    // Load background images (ファイルがなければフォールバック)
    BG_KEYS.forEach(key => {
      p.loadImage('./assets/' + key + '.png',
        img => { bgImgs[key] = img; bgLoaded[key] = true; },
        ()  => { bgImgs[key] = null; }
      );
    });
  };

  p.draw = function () {
    if (scene === 'GAME') updateGame();
    if      (scene === 'TITLE')        drawTitle();
    else if (scene === 'CONFIG')       drawConfig();
    else if (scene === 'NPC_SELECT')   drawNPCSelect();
    else if (scene === 'GAME')         drawGame();
    else if (scene === 'DRAFT')        drawDraft();
    else if (scene === 'STAGE_RESULT') drawStageResult();
    else if (scene === 'RUN_RESULT')   drawRunResult();
  };

}, 'gc');
</script>
